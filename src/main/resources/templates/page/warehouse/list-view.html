<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Kho hàng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #000; margin: 0; padding: 40px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 600; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .btn { display: inline-block; padding: 10px 20px; text-decoration: none; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid #000; transition: all 0.2s ease; }
        .btn-black { background-color: #000; color: #fff; }
        .btn-black:hover { background-color: #333; }
        table { width: 100%; border-collapse: collapse; border-top: 2px solid #000; border-bottom: 2px solid #000; }
        th, td { padding: 16px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #666; }
        tr:hover { background-color: #f9f9f9; }
        .link { color: #000; font-weight: 600; text-decoration: underline; text-underline-offset: 4px; }
        .link:hover { color: #666; }
        .status { padding: 4px 8px; font-size: 12px; font-weight: 600; border: 1px solid #000; text-transform: uppercase; }
        .status.active { background-color: #000; color: #fff; }
        .status.inactive { background-color: #fff; color: #000; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-actions">
        <h1>Kho Hàng</h1>
        <a th:href="@{/wh/warehouses/add}" class="btn btn-black">+ Thêm Kho Mới</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Tên Kho</th>
            <th>Địa Chỉ</th>
            <th>Trạng Thái</th>
            <th>Quản Lý</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="wh : ${warehouses}">
            <td th:text="${wh.id}"></td>
            <td>
                <a class="link" th:href="@{/wh/warehouses/{id}/detail(id=${wh.id})}" th:text="${wh.name}"></a>
            </td>
            <td th:text="${wh.address}"></td>
            <td>
                        <span th:classappend="${wh.active ? 'status active' : 'status inactive'}"
                              th:text="${wh.active ? 'Hoạt động' : 'Tạm dừng'}"></span>
            </td>
            <td th:text="${wh.managerName}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(warehouses)}">
            <td colspan="5" style="text-align: center; padding: 40px; color: #666;">Không có dữ liệu.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
