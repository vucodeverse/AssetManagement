<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Kho Hàng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #000; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2px solid #000; padding-bottom: 16px; margin-bottom: 32px; }
        h1 { font-size: 24px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .badge { padding: 4px 10px; font-size: 12px; font-weight: 600; border: 1px solid #000; text-transform: uppercase; }
        .badge.active { background-color: #000; color: #fff; }
        .badge.inactive { background-color: #fff; color: #000; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 40px; }
        .info-card { border: 1px solid #eaeaea; padding: 16px; }
        .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 6px; }
        .value { font-size: 15px; }
        .actions { display: flex; gap: 12px; margin-bottom: 40px; flex-wrap: wrap; }
        .btn { display: inline-block; padding: 10px 20px; font-size: 13px; font-weight: 600; text-transform: uppercase; border: 1px solid #000; text-decoration: none; cursor: pointer; transition: background 0.15s; }
        .btn-black { background-color: #000; color: #fff; }
        .btn-black:hover { background-color: #333; }
        .btn-white { background-color: #fff; color: #000; }
        .btn-white:hover { background-color: #f0f0f0; }
        /* Racks table */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-top: 2px solid #000; padding-top: 24px; }
        .section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 13px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
        th { font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: #666; font-size: 11px; border-bottom: 1px solid #000; }
        tr:hover td { background-color: #fafafa; }
        .link { color: #000; font-weight: 600; text-decoration: underline; text-underline-offset: 3px; }
        .link:hover { color: #555; }
        .empty-state { text-align: center; padding: 32px; color: #999; font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 th:text="'Kho #' + ${warehouse.id}">KHO #1</h1>
        <span th:classappend="${warehouse.active ? 'badge active' : 'badge inactive'}"
              th:text="${warehouse.active ? 'Đang Hoạt Động' : 'Tạm Dừng'}"></span>
    </div>

    <div class="info-grid">
        <div class="info-card">
            <div class="label">Tên Kho Hàng</div>
            <div class="value" th:text="${warehouse.name}">—</div>
        </div>
        <div class="info-card">
            <div class="label">Địa Chỉ</div>
            <div class="value" th:text="${warehouse.address}">—</div>
        </div>
        <div class="info-card" style="grid-column: span 2;">
            <div class="label">Quản Lý Trực Tiếp</div>
            <div class="value" th:text="${warehouse.managerName}">—</div>
        </div>
    </div>

    <div class="actions">
        <a th:href="@{/wh/warehouses}" class="btn btn-white">← Quay Lại</a>
        <a th:href="@{/wh/warehouses/{id}/edit(id=${warehouse.id})}" class="btn btn-black">Chỉnh Sửa</a>
        <form th:action="@{/wh/warehouses/{id}/active(id=${warehouse.id})}" method="post" style="margin:0;">
            <button th:if="${!warehouse.active}" type="submit" class="btn btn-black">Kích Hoạt</button>
        </form>
    </div>

    <!-- Rack list -->
    <div class="section-header">
        <span class="section-title">Danh Sách Kệ (<span th:text="${racks.size()}">0</span>)</span>
        <a th:href="@{/wh/warehouses/{id}/racks/add(id=${warehouse.id})}" class="btn btn-black">+ Thêm Kệ</a>
    </div>
    <table>
        <thead>
        <tr>
            <th>Tên Kệ</th>
            <th>Mô Tả</th>
            <th>Số Tầng</th>
            <th>Trạng Thái</th>
            <th>Thao Tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="rack : ${racks}">
            <td>
                <a class="link"
                   th:href="@{/wh/warehouses/{whId}/racks/{rackId}/shelves(whId=${warehouse.id},rackId=${rack.id})}"
                   th:text="${rack.name}"></a>
            </td>
            <td th:text="${rack.description != null ? rack.description : '—'}"></td>
            <td th:text="${rack.shelfCount}"></td>
            <td>
                <span th:classappend="${rack.active ? 'badge active' : 'badge inactive'}"
                      th:text="${rack.active ? 'Hoạt động' : 'Dừng'}"></span>
            </td>
            <td style="display:flex; gap:8px; align-items:center;">
                <a class="link" th:href="@{/wh/warehouses/{whId}/racks/{rackId}/edit(whId=${warehouse.id},rackId=${rack.id})}">Sửa</a>
                <span>|</span>
                <form th:action="@{/wh/warehouses/{whId}/racks/{rackId}/delete(whId=${warehouse.id},rackId=${rack.id})}"
                      method="post" style="margin:0;" onsubmit="return confirm('Xoá kệ này?')">
                    <button type="submit" style="background:none;border:none;color:#000;font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:3px;font-family:inherit;">Xoá</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(racks)}">
            <td colspan="5" class="empty-state">Chưa có kệ nào. Nhấn "+ Thêm Kệ" để bắt đầu.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
