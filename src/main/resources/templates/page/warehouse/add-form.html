<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm Kho Mới</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #000; margin: 0; padding: 40px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 24px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #000; padding-bottom: 16px; margin-bottom: 32px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; color: #666; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #000; font-size: 15px; font-family: 'Inter', sans-serif; background-color: #fff; box-sizing: border-box; }
        input[type="text"]:focus, select:focus { outline: none; border-width: 2px; padding: 11px; }
        .error-message { color: #000; font-size: 13px; font-weight: 600; margin-top: 8px; display: block; border-left: 2px solid #000; padding-left: 8px; }
        .form-actions { display: flex; gap: 16px; margin-top: 40px; }
        .btn { padding: 12px 24px; font-size: 14px; font-weight: 600; text-transform: uppercase; cursor: pointer; border: 1px solid #000; text-decoration: none; text-align: center; }
        .btn-submit { background-color: #000; color: #fff; flex: 1; }
        .btn-cancel { background-color: #fff; color: #000; padding: 12px 32px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Thêm Kho Mới</h1>

    <form th:action="@{/wh/warehouses/add}" th:object="${warehouse}" method="post">

        <div class="form-group">
            <label for="name">Tên Kho Hàng</label>
            <input type="text" id="name" th:field="*{name}" placeholder="Nhập tên kho..." />
            <span class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Lỗi tên kho</span>
        </div>

        <div class="form-group">
            <label for="address">Địa Chỉ</label>
            <input type="text" id="address" th:field="*{address}" placeholder="Nhập địa chỉ chi tiết..." />
            <span class="error-message" th:if="${#fields.hasErrors('address')}" th:errors="*{address}">Lỗi địa chỉ</span>
        </div>

        <div class="form-group">
            <label for="managerId">Quản Lý Trực Tiếp</label>
            <select id="managerId" th:field="*{managerId}">
                <option value="0">-- Chọn Quản Lý --</option>
                <option th:each="entry : ${warehouseStaffs}"
                        th:value="${entry.key}"
                        th:text="${entry.value}">
                </option>
            </select>
            <span class="error-message" th:if="${#fields.hasErrors('managerId')}" th:errors="*{managerId}">Lỗi chọn quản lý</span>
        </div>

        <div class="form-actions">
            <a th:href="@{/wh/warehouses}" class="btn btn-cancel">Hủy</a>
            <button type="submit" class="btn btn-submit">Xác Nhận Tạo</button>
        </div>
    </form>
</div>
</body>
</html>
