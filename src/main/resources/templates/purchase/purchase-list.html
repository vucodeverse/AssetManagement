<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/director-layout}">
<!--~{}: link -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Request Management - Procurex</title>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/purchase/purchase-list.css}">
    </th:block>

</head>

<body>
    <th:block layout:fragment="content">

        <div class="purchase-content-wrapper">
            <form id="filterForm"
                  method="get"
                  th:action="@{/director/purchase/search-filter}"
                  th:object="${searchAndFilter}">

                <header class="top-bar">
                    <h1>PURCHASE REQUEST MANAGEMENT</h1>
                    <div class="top-actions">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text"
                                   placeholder="Search by PR ID..."
                                   th:field="*{keyword}">
                        </div>
                    </div>
                </header>

                <section class="filters-bar">
                    <div class="filter-group">

                        <select id="statusFilter" th:field="*{status}">
                            <option value="">Status: All</option>
                            <option th:each="s : ${status}"
                                    th:value="${s}"
                                    th:text="${s}">
                            </option>
                        </select>

                        <select id="priorityFilter" th:field="*{priority}">
                            <option value="">Priority: All</option>
                            <option th:each="pi : ${priorities}"
                                    th:value="${pi}"
                                    th:text="${pi}">
                            </option>
                        </select>

                        <input type="date" th:field="*{from}">
                        <input type="date" th:field="*{to}">

                        <button type="submit">APPLY</button>
                        <a class="btn-reset" th:href="@{/director/purchases}">RESET</a>
                    </div>
                </section>
            </form>


            <!-- Data Table Section -->
            <div class="table-container">
                <table class="data-table" id="purchaseTO">
                    <thead>
                        <tr>
                            <th>PR ID </th>
                            <th>STATUS </th>
                            <th>CREATOR </th>
                            <th>NEEDED DATE</th>
                            <th>PRIORITY </th>
                            <th>CREATED AT </th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${purchases}">

                            <td th:text="'PR-' + ${p.id}"></td>
                            <td th:text="${p.status}"></td>
                            <td th:text="${p.createdByUser}"></td>
                            <td th:text="${#temporals.format(p.neededByDate,'dd-MM-yyyy')}"></td>
                            <td th:text="${p.priority}"></td>
                            <td th:text="${#temporals.format(p.createdAt,'dd-MM-yyyy')}"></td>
                            <td class="cell-actions">
                                <form method="post" th:action="@{/director/purchases/{id}(id=${p.id})}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" name="actions" value="a" class="btn-approve">APPROVE</button>
                                    <button type="submit" name="actions" value="r" class="btn-reject">REJECT</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </th:block>


    <th:block layout:fragment="extra-js">
        <script th:src="@{/js/purchase/pr-list.js}"></script>
    </th:block>
</body>

</html>
