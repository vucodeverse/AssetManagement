<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main-layout}">

<head>
    <title>New Purchase Request</title>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/purchase/purchase-form.css}">
    </th:block>
</head>

<body>
    <th:block layout:fragment="content">
        <div class="pr-container">
            <div class="breadcrumb">
                <a th:href="@{/purchase-staff/dashboard}">DASHBOARD</a> /
                <a th:href="@{/purchase-staff/purchases}">PURCHASES</a> /
                <span class="active">NEW REQUEST</span>
            </div>
            <!-- Tiêu đề -->
            <header class="pr-header">
                <div class="header-left">
                    <h1>NEW PURCHASE REQUEST</h1>
                    <p>Submit a new request for asset procurement.</p>
                </div>

                <div class="header-right">
                    <button type="button" class="btn-outline">GUIDELINES</button>
                </div>
            </header>

            <!-- BIỂU MẪU -->
            <form th:action="@{/purchase-staff/purchases/create}" th:object="${purchaseCreateRequest}" method="post">

                <!-- hidden purchaseId cho update draft -->
                <input type="hidden" th:field="*{purchaseId}">

                <!-- Phần thông tin chung -->
                <section class="form-section">
                    <h2 class="section-title">GENERAL INFORMATION</h2>

                    <div class="form-grid">
                        <!-- reason -->
                        <div class="form-group">
                            <label>REQUEST REASON</label>
                            <input type="text" th:field="*{reason}" placeholder="E.g. Office expansion Q4">
                            <div class="field-error" th:if="${#fields.hasErrors('reason')}" th:errors="*{reason}"></div>
                        </div>

                        <!-- neededByDate -->
                        <div class="form-group">
                            <label>NEEDED BY DATE</label>
                            <input type="date" th:field="*{neededByDate}">
                            <div class="field-error" th:if="${#fields.hasErrors('neededByDate')}"
                                th:errors="*{neededByDate}"></div>
                        </div>

                        <!-- priority  -->
                        <div class="form-group">
                            <label>PRIORITY</label>
                            <select th:field="*{priority}">
                                <option value="">-- Select --</option>
                                <option th:each="p: ${T(edu.fpt.groupfive.common.Priority).values()}" th:value="${p}"
                                    th:text="${p}"></option>
                            </select>
                            <div class="field-error" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}">
                            </div>
                        </div>

                        <!-- note -->
                        <div class="form-group full-width">
                            <label>ADDITIONAL NOTE</label>
                            <textarea th:field="*{purchaseNote}"
                                placeholder="Provide extra context for the procurement team..."></textarea>
                            <div class="field-error" th:if="${#fields.hasErrors('purchaseNote')}"
                                th:errors="*{purchaseNote}"></div>
                        </div>
                    </div>
                </section>

                <!-- Phần chi tiết các mặt hàng -->
                <section class="form-section">
                    <h2 class="section-title">PURCHASE REQUEST DETAILS</h2>

                    <div class="table-container">
                        <table class="pr-table">
                            <thead>
                                <tr>
                                    <th>ASSET TYPE NAME</th>
                                    <th>QTY</th>
                                    <th>EST.PRICE(VNĐ)</th>
                                    <th>SPECIFICATION REQUIREMENT</th>
                                    <th>ITEM NOTE</th>
                                    <th></th>
                                </tr>
                            </thead>

                            <tbody>
                                <tr th:each="d, stat : *{purchaseRequestDetailCreateRequests}">
                                    <!-- Asset Type -->
                                    <td>
                                        <select class="input-prem"
                                            th:field="*{purchaseRequestDetailCreateRequests[__${stat.index}__].typeId}">
                                            <option value="">Select asset type...</option>
                                            <option th:each="a : ${assetTypes}" th:value="${a.typeId}"
                                                th:text="${a.typeName}">
                                            </option>
                                        </select>

                                        <div class="field-error"
                                            th:if="${#fields.hasErrors('purchaseRequestDetailCreateRequests[' + stat.index + '].typeId')}"
                                            th:errors="*{purchaseRequestDetailCreateRequests[__${stat.index}__].typeId}">
                                        </div>
                                    </td>

                                    <!-- Quantity -->
                                    <td>
                                        <input type="number" min="1" class="input-prem"
                                            th:field="*{purchaseRequestDetailCreateRequests[__${stat.index}__].quantity}" />

                                        <div class="field-error"
                                            th:if="${#fields.hasErrors('purchaseRequestDetailCreateRequests[' + stat.index + '].quantity')}"
                                            th:errors="*{purchaseRequestDetailCreateRequests[__${stat.index}__].quantity}">
                                        </div>
                                    </td>

                                    <!-- Estimate Price -->
                                    <td>
                                        <input type="number" step="0.01" min="0" class="input-prem"
                                            th:field="*{purchaseRequestDetailCreateRequests[__${stat.index}__].estimatePrice}" />

                                        <div class="field-error"
                                            th:if="${#fields.hasErrors('purchaseRequestDetailCreateRequests[' + stat.index + '].estimatePrice')}"
                                            th:errors="*{purchaseRequestDetailCreateRequests[__${stat.index}__].estimatePrice}">
                                        </div>
                                    </td>

                                    <!-- Specification Requirement -->
                                    <td>
                                        <input type="text" class="input-prem"
                                            th:field="*{purchaseRequestDetailCreateRequests[__${stat.index}__].specificationRequirement}" />

                                        <div class="field-error"
                                            th:if="${#fields.hasErrors('purchaseRequestDetailCreateRequests[' + stat.index + '].specificationRequirement')}"
                                            th:errors="*{purchaseRequestDetailCreateRequests[__${stat.index}__].specificationRequirement}">
                                        </div>
                                    </td>

                                    <!-- Purchase Detail Note -->
                                    <td>
                                        <input type="text" class="input-prem"
                                            th:field="*{purchaseRequestDetailCreateRequests[__${stat.index}__].purchaseDetailNote}" />

                                        <div class="field-error"
                                            th:if="${#fields.hasErrors('purchaseRequestDetailCreateRequests[' + stat.index + '].purchaseDetailNote')}"
                                            th:errors="*{purchaseRequestDetailCreateRequests[__${stat.index}__].purchaseDetailNote}">
                                        </div>
                                    </td>

                                    <!-- Xóa dòng -->
                                    <td>
                                        <button type="submit" class="btn-remove" name="remove" th:value="${stat.index}"
                                            title="Remove item">
                                            &times;
                                        </button>
                                    </td>

                                </tr>
                            </tbody>
                        </table>

                        <!-- Thêm mặt hàng mới -->
                        <button type="submit" class="btn-add-row" name="addDetail" value="true">+ ADD NEW ITEM</button>
                    </div>
                </section>

                <!-- Các nút điều hướng cuối -->
                <footer class="pr-footer">
                    <div class="footer-left">
                        <p>* Required fields for submission.</p>
                    </div>

                    <div class="footer-right">
                        <button type="button" class="btn-text" onclick="history.back()">CANCEL</button>

                        <button type="submit" class="btn-outline" name="actions" value="draft">SAVE AS DRAFT</button>

                        <button type="submit" class="btn-solid" name="actions" value="save">SUBMIT REQUEST</button>
                    </div>
                </footer>

            </form>

        </div>
    </th:block>
</body>

</html>
