<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

    <aside class="sidebar" th:fragment="sidebar(activeMenu, activeSub)">
        <div class="sidebar-logo">
            <i class="fas fa-cube"></i> <span>PROCUREX</span>
        </div>

        <nav class="sidebar-nav">
            <!-- PHẦN ĐIỀU HƯỚNG -->
            <div class="nav-group">
                <div class="nav-group-title">Chính</div>
                <a class="nav-item" th:href="@{/purchase-staff/dashboard}"
                    th:classappend="${activeMenu}=='dashboard' ? ' active' : ''">
                    <i class="fas fa-th-large"></i> TRANG CHỦ
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-group-title">Mua sắm</div>
                <a class="nav-item" th:href="@{/purchases}"
                    th:classappend="${activeMenu}=='approval' and ${activeSub}=='pr' ? ' active' : ''">
                    <i class="fas fa-shopping-cart"></i> YÊU CẦU MUA SẮM
                </a>

                <a class="nav-item" th:href="@{/quotations}"
                    th:classappend="${activeMenu}=='approval' and ${activeSub}=='qt' ? ' active' : ''">
                    <i class="fas fa-file-invoice"></i> BÁO GIÁ
                </a>

                <a class="nav-item" th:href="@{/purchase-orders}" th:classappend="${activeMenu}=='po' ? ' active' : ''">
                    <i class="fas fa-file-invoice-dollar"></i> ĐƠN ĐẶT HÀNG
                </a>
            </div>
        </nav>

        <div class="sidebar-user">
            <div class="user-avatar" th:text="${userInitials} ?: 'SM'">SM</div>
            <div class="user-info">
                <span class="user-name" th:text="${userName} ?: 'Nhân Viên'">Nhân Viên</span>
                <span class="user-role" th:text="${userRole} ?: 'Nhân Viên Mua Sắm'">Nhân Viên Mua Sắm</span>
            </div>
            <div class="user-actions">
                <a th:href="@{/logout}" class="action-btn logout-btn" title="Đăng xuất">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </div>
    </aside>

</body>

</html>
