<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

    <aside class="sidebar" th:fragment="sidebar(activeMenu, activeSub)">
        <div class="sidebar-logo">
            <i class="fas fa-building"></i> <span>PHÒNG BAN</span>
        </div>

        <nav class="sidebar-nav">
            <!-- PHẦN ĐIỀU HƯỚNG -->
            <div class="nav-group">
                <div class="nav-group-title">QUẢN TRỊ</div>
                <a class="nav-item" th:href="@{/department/dashboard}"
                    th:classappend="${activeMenu}=='dashboard' ? ' active' : ''">
                    <i class="fas fa-th-large"></i> TỔNG QUAN
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-group-title">DỊCH VỤ</div>
                <a class="nav-item" th:href="@{/department/allocation-request/list}"
                   th:classappend="${activeMenu}=='allocation' ? ' active' : ''">
                    <i class="fas fa-plus-circle"></i> YÊU CẦU CẤP PHÁT
                </a>

                <a class="nav-item" th:href="@{/department/return-request/list}"
                   th:classappend="${activeMenu}=='return' ? ' active' : ''">
                    <i class="fas fa-undo-alt"></i> YÊU CẦU TRẢ
                </a>
            </div>
        </nav>

        <div class="sidebar-user">
            <div class="user-avatar" th:text="${userInitials} ?: 'DM'">DM</div>
            <div class="user-info">
                <span class="user-name" th:text="${userName} ?: 'Trưởng Phòng'">Trưởng Phòng</span>
                <span class="user-role" th:text="${userRole} ?: 'Quản Lý Phòng Ban'">Quản Lý Phòng Ban</span>
            </div>
            <div class="user-actions">
                <a th:href="@{/logout}" class="action-btn logout-btn" title="Đăng xuất">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </div>
    </aside>

</body>

</html>
