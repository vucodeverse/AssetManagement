<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

    <aside th:fragment="sidebar(activeMenu, activeSub)" class="sidebar">

        <div class="sidebar-logo">
            <i class="fas fa-building"></i> <span>PHÒNG BAN</span>
        </div>

        <nav class="sidebar-nav">

            <!-- DASHBOARD -->
            <a th:href="@{/department/dashboard}" th:classappend="${activeMenu == 'dashboard'} ? 'active'"
                class="nav-item">
                <i class="fas fa-th-large"></i> TỔNG QUAN
            </a>

            <a th:href="@{/department/assets}" th:classappend="${activeMenu == 'asset'} ? 'active' : ''"
                class="nav-item">
                <i class="fas fa-th-large"></i> TÀI SẢN BỘ PHẬN
            </a>


            <!-- ALLOCATION -->
            <a th:href="@{/department/allocation-request/list}"
                th:classappend="${activeMenu == 'allocation'} ? 'active'" class="nav-item">
                <i class="fas fa-box"></i> YÊU CẦU PHÂN BỔ
            </a>

            <!-- RETURN -->
            <a th:href="@{/department/return-request/list}" th:classappend="${activeMenu == 'return'} ? 'active'"
                class="nav-item">
                <i class="fas fa-undo"></i> YÊU CẦU TRẢ
            </a>

            <!-- TRANSFER  -->
            <a th:href="@{/transfer-requests/incoming}" th:classappend="${activeMenu == 'transfer'} ? 'active'"
                class="nav-item">
                <i class="fas fa-exchange-alt"></i>YÊU CẦU ĐIỀU CHUYỂN
            </a>
        </nav>

        <!--    khối thông tin-->
        <div class="sidebar-user">
            <div class="user-avatar" th:text="${userInitials} ?: 'DP'">DP</div>
            <div class="user-info">
                <span class="user-name" th:text="${userName} ?: 'Trưởng phòng ban'">Trưởng phòng ban</span>
                <span class="user-role" th:text="${userRole} ?: 'Trưởng phòng'">Trưởng phòng</span>
            </div>
            <div class="user-actions">
                <a th:href="@{/logout}" class="action-btn logout-btn" title="Đăng xuất">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </div>


    </aside>

</body>

</html>
