<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Warehouse Sidebar</title>
</head>
<div class="sidebar" th:fragment="sidebar(activeMenu, activeSub)">

    <!-- Logo -->
    <div class="sidebar-logo">
        <a th:href="@{/wh/config/zones}" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:10px;">
            <i class="fa-solid fa-warehouse" style="font-size:20px;"></i>
            <span>PROCUREX <span style="color:#3b82f6; font-weight:900;">WH</span></span>
        </a>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">

        <!-- Tổng quan -->
        <a th:href="@{/wh/dashboard}"
           th:classappend="${activeMenu == 'dashboard'} ? ' active'"
           class="nav-item">
            <i class="fa-solid fa-chart-line"></i>
            <span>Tổng quan</span>
        </a>

        <!-- Master data -->
        <div class="nav-group-title" style="margin-top:16px;">Cấu hình</div>

        <a th:href="@{/wh/config/zones}"
           th:classappend="${activeMenu == 'zones'} ? ' active'"
           class="nav-item">
            <i class="fa-solid fa-boxes-stacked"></i>
            <span>Quản lý Zone</span>
        </a>

        <a th:href="@{/wh/config/capacities}"
           th:classappend="${activeMenu == 'capacities'} ? ' active'"
           class="nav-item">
            <i class="fa-solid fa-ruler-combined"></i>
            <span>Định mức Sức chứa</span>
        </a>

        <!-- Nghiệp vụ -->
        <div class="nav-group-title" style="margin-top:16px;">Nghiệp vụ</div>

        <a th:href="@{/wh/inbound/po}"
           th:classappend="${activeMenu == 'inbound'} ? ' active'"
           class="nav-item">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
            <span>Nhập kho</span>
        </a>

        <div th:if="${activeMenu == 'inbound'}" class="sub-nav">
            <a th:href="@{/wh/inbound/po}"
               th:classappend="${activeSub == 'inbound-po'} ? ' active'"
               class="sub-item">Mua mới (PO)</a>
            <a th:href="@{/wh/inbound/receipts}"
               th:classappend="${activeSub == 'inbound-receipts'} ? ' active'"
               class="sub-item">Lịch sử Phiếu nhập</a>
            <a th:href="@{/wh/inbound/return}"
               th:classappend="${activeSub == 'inbound-return'} ? ' active'"
               class="sub-item">Thu hồi</a>
        </div>

        <a th:href="@{/wh/outbound}"
           th:classappend="${activeMenu == 'outbound'} ? ' active'"
           class="nav-item">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            <span>Xuất kho Cấp phát</span>
        </a>

        <!-- Tra cứu -->
        <div class="nav-group-title" style="margin-top:16px;">Tra cứu</div>

        <a th:href="@{/wh/locator}"
           th:classappend="${activeMenu == 'locator'} ? ' active'"
           class="nav-item">
            <i class="fa-solid fa-magnifying-glass-location"></i>
            <span>Tìm vị trí tài sản</span>
        </a>

        <a th:href="@{/wh/ledger}"
           th:classappend="${activeMenu == 'ledger'} ? ' active'"
           class="nav-item">
            <i class="fa-solid fa-book-open"></i>
            <span>Sổ cái giao dịch</span>
        </a>

        <a th:href="@{/transfer-requests/warehouse}"
           th:classappend="${activeMenu == 'transfer'} ? 'active'"
           class="nav-item">
            <i class="fas fa-warehouse"></i> ĐIỀU CHUYỂN
        </a>

    </nav>

    <!-- Footer: user info + logout -->
    <div class="sidebar-user">
        <div class="user-avatar" sec:authentication="name" th:text="${#strings.substring(#authentication.name, 0, 2).toUpperCase()}">WH</div>
        <div class="user-info">
            <span class="user-name" sec:authentication="name">Warehouse</span>
            <span class="user-role">Nhân viên kho</span>
        </div>
        <div class="user-actions">
            <form th:action="@{/logout}" method="get" style="margin:0;">
                <button type="submit" class="action-btn logout-btn" title="Đăng xuất"
                        style="background:none; border:none; cursor:pointer;">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </form>
        </div>
    </div>

</div>
</html>
