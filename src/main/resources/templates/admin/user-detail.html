<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản lý người dùng</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>

    <link rel="stylesheet" th:href="@{/css/admin/user-detail.css}">

</head>

<body>

<div class="sidebar">
    <h4 class="text-center mb-4">Admin Panel</h4>
    <div class="sidebar-nav">
        <a href="/admin/dashboard"><i class="fas fa-chart-line mr-2"></i> Trang tổng quan</a>
        <a href="/admin/users" class="active"><i class="fas fa-users mr-2"></i> Quản lí người dùng</a>
        <a href="/admin/departments"><i class="fas fa-building mr-2"></i> Quản lí phòng ban</a>
    </div>
    <div class="sidebar-user">
        <div class="user-avatar">A</div>
        <div class="user-info">
            <span class="user-name">Administrator</span>
            <span class="user-role">Admin</span>
        </div>
        <a th:href="@{/logout}" class="logout-link" title="Đăng xuất">
            <i class="fas fa-sign-out-alt"></i>
        </a>
    </div>
</div>

<div class="content">

    <a th:href="@{/admin/users}" style="text-decoration: none;">
        <h2 class="header-title"><i class="fas fa-users"></i> Quản lí người dùng</h2>
    </a>

    <hr/>

    <div class="form-container mx-auto" style="max-width: 850px">
        <!-- ===== TITLE ===== -->
        <h3 class="text-center mb-4">

            <span th:if="${isEditMode}">Cập nhật người dùng</span>
            <span th:unless="${isEditMode}">
                <span th:if="${canEdit}">Thêm người dùng</span>
                <span th:unless="${canEdit}">Chi tiết người dùng</span>
            </span>

        </h3>

        <!-- ===== FORM ===== -->
        <form th:action="${isEditMode} ? @{/admin/user/update} : @{/admin/user/create}"
              th:object="${user}"
              method="post">

            <!-- ===== USER ID ===== -->
            <div class="form-group" th:if="${isEditMode}">
                <div class="alert alert-info">
                    <b>ID người dùng:</b>
                    <span th:text="${user.userId}"></span>
                    <input type="hidden" th:field="*{userId}">
                </div>
            </div>

            <!-- ===== USERNAME ===== -->
            <div class="form-group">

                <label>Tên đăng nhập</label>

                <input type="text"
                       class="form-control"
                       th:field="*{username}"
                       th:readonly="${isEditMode}"
                       th:disabled="${!canEdit}">

                <span class="error-message"
                      th:if="${#fields.hasErrors('username')}"
                      th:errors="*{username}">
            </span>

            </div>

            <!-- ===== PASSWORD ===== -->
            <div class="form-group" th:if="${canEdit}">

                <label>Mật khẩu</label>

                <input type="password"
                       class="form-control"
                       th:field="*{password}">

                <span class="error-message"
                      th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}">
            </span>

            </div>

            <!-- ===== NAME ===== -->
            <div class="row">

                <div class="col-md-6 form-group">
                    <label>Họ</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{firstName}"
                           th:disabled="${!canEdit}">
                    <span class="error-message"
                          th:if="${#fields.hasErrors('firstName')}"
                          th:errors="*{firstName}">
                </span>
                </div>

                <div class="col-md-6 form-group">
                    <label>Tên</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{lastName}"
                           th:disabled="${!canEdit}">
                    <span class="error-message"
                          th:if="${#fields.hasErrors('lastName')}"
                          th:errors="*{lastName}">
                </span>
                </div>
            </div>

            <!-- ===== EMAIL / PHONE ===== -->
            <div class="row">

                <div class="col-md-6 form-group">

                    <label>Email</label>

                    <input type="email"
                           class="form-control"
                           th:field="*{email}"
                           th:disabled="${!canEdit}">

                    <span class="error-message"
                          th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}">
                </span>

                </div>

                <div class="col-md-6 form-group">

                    <label>Số điện thoại</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{phoneNumber}"
                           th:disabled="${!canEdit}">

                    <span class="error-message"
                          th:if="${#fields.hasErrors('phoneNumber')}"
                          th:errors="*{phoneNumber}">
                </span>

                </div>

            </div>

            <!-- ===== ROLE / DEPARTMENT ===== -->
            <div class="row">

                <div class="col-md-6 form-group">

                    <label>Vai trò</label>

                    <select class="form-control"
                            th:field="*{role}"
                            th:disabled="${!canEdit}">

                        <option value="">Chọn vai trò</option>

                        <option th:each="r : ${roles}"
                                th:value="${r}"
                                th:text="${r.displayName}">
                        </option>

                    </select>

                    <span class="error-message"
                          th:if="${#fields.hasErrors('role')}"
                          th:errors="*{role}">
                </span>

                </div>

                <div class="col-md-6 form-group">

                    <label>Phòng ban</label>

                    <select class="form-control"
                            th:field="*{departmentId}"
                            th:disabled="${!canEdit}">

                        <option value="">Chọn phòng ban</option>

                        <option th:each="d : ${departments}"
                                th:value="${d.departmentId}"
                                th:text="${d.departmentName}">
                        </option>

                    </select>

                    <span class="error-message"
                          th:if="${#fields.hasErrors('departmentId')}"
                          th:errors="*{departmentId}">
                </span>

                </div>

            </div>

            <!-- ===== STATUS ===== -->
            <div class="form-group mt-3">

                <label>Trạng thái tài khoản</label>

                <div class="mt-2">

                    <div class="custom-control custom-radio custom-control-inline">
                        <input type="radio"
                               id="statusActive"
                               th:field="*{status}"
                               value="ACTIVE"
                               class="custom-control-input"
                               th:disabled="${!canEdit}">
                        <label class="custom-control-label" for="statusActive">
                            Hoạt động
                        </label>
                    </div>

                    <div class="custom-control custom-radio custom-control-inline">
                        <input type="radio"
                               id="statusInactive"
                               th:field="*{status}"
                               value="INACTIVE"
                               class="custom-control-input"
                               th:disabled="${!canEdit}">
                        <label class="custom-control-label" for="statusInactive">
                            Ngừng hoạt động
                        </label>
                    </div>

                </div>

                <span class="error-message d-block"
                      th:if="${#fields.hasErrors('status')}"
                      th:errors="*{status}">
            </span>

            </div>

            <!-- ===== Hiển thị riêng cho CREATED / UPDATED ===== -->
            <div class="row" th:if="${!canEdit}">
                <!--            Ngày tạo-->
                <div class="col-md-6 form-group">
                    <label>Ngày tạo</label>
                    <input type="text"
                           class="form-control"
                           th:value="${#temporals.format(user.createdDate,'dd/MM/yyyy HH:mm')}"
                           readonly>
                </div>
                <!--            Ngày cập nhật-->
                <div class="col-md-6 form-group">
                    <label>Cập nhật</label>
                    <input type="text"
                           class="form-control"
                           th:value="${#temporals.format(user.updatedDate,'dd/MM/yyyy HH:mm')}"
                           readonly>
                </div>

            </div>

            <!-- ===== BUTTON ===== -->
            <div class="text-center mt-4">

                <button class="btn btn-primary px-4"
                        type="submit"
                        th:if="${canEdit}">

                    <span th:if="${isEditMode}">Cập nhật</span>
                    <span th:unless="${isEditMode}">Lưu</span>

                </button>

                <a class="btn btn-outline-secondary px-4 ml-2"
                   th:href="@{/admin/users}">
                    Quay lại
                </a>

            </div>

        </form>

    </div>
</div>

</body>
</html>
