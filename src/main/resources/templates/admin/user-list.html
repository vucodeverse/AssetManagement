<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Quản Lý Người Dùng</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
    <script src="https://code.jquery.com/jquery-3.5.1.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap4.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap4.min.css">

    <link rel="stylesheet" th:href="@{/css/admin/user-list.css}">
</head>
<body>

<div class="sidebar">
    <h4 class="text-center mb-4">Quản lý</h4>
    <div class="sidebar-nav">
        <a href="/admin/dashboard"><i class="fas fa-chart-line mr-2"></i> Trang tổng quan</a>
        <a href="/admin/users" class="active"><i class="fas fa-users mr-2"></i> Quản lí người dùng</a>
        <a href="/admin/departments"><i class="fas fa-building mr-2"></i> Quản lí phòng ban</a>
    </div>
    <div class="sidebar-user">
        <div class="user-avatar">A</div>

        <div class="user-info">
            <span class="user-name">Administrator</span>
            <span class="user-role">Admin</span>
        </div>

        <a th:href="@{/logout}" class="logout-link" title="Đăng xuất">
            <i class="fas fa-sign-out-alt"></i>
        </a>
    </div>
</div>

<div class="content">

    <a th:href="@{/admin/users}" style="text-decoration: none;">
        <h2 class="header-title"><i class="fas fa-users"></i> Quản lí người dùng</h2>
    </a>

    <hr/>

    <div class="card-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a th:href="@{/admin/user/add}" class="btn btn-primary">
                <i class="fas fa-user-plus"></i> Thêm người dùng
            </a>

            <form th:action="@{/admin/users}" method="get" class="form-inline">
                <!--                Filter theo status-->
                <label>
                    <select name="status" class="form-control mr-2 border-primary">
                        <option value="">Trạng thái</option>
                        <option th:each="st : ${T(edu.fpt.groupfive.common.UserStatus).values()}"
                                th:value="${st.name()}"
                                th:text="${st.description}">
                        </option>
                    </select>
                </label>

                <!--                Filter theo department-->
                <label>
                    <select name="departmentId" class="form-control mr-2 border-primary">
                        <option value="">Phòng ban</option>
                        <option th:each="d : ${departments}"
                                th:value="${d.departmentId}"
                                th:text="${d.departmentName}"
                                th:selected="${departmentId == d.departmentId}">
                        </option>
                    </select>
                </label>

                <!--                Filter theo role-->
                <label>
                    <select name="role" class="form-control mr-2 border-primary">
                        <option value="">Vai trò</option>
                        <option th:each="r : ${roles}"
                                th:value="${r}"
                                th:text="${r.displayName}"
                                th:selected="${role != null and r == role}">
                        </option>
                    </select>
                </label>

                <!--                Chỗ tìm kiếm-->
                <div class="input-group">
                    <label>
                        <input type="text"
                               name="keyword"
                               class="form-control border-primary"
                               placeholder="Tìm kiếm..."
                               th:value="${keyword}">
                    </label>
                    <!--                    Nút kích hoạt-->
                    <div class="input-group-append">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <table id="userTable" class="table table-bordered table-hover shadow-sm bg-white">
            <thead>
            <tr>
                <th>Tên đăng nhập</th>
                <th>Họ và tên</th>
                <th>Email</th>
                <th>Trạng thái</th>
                <th>Vai trò</th>
                <th>Thời điểm tạo</th>
                <th style="width: 150px">Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="x : ${users}">
                <td th:text="${x.username}" class="font-weight-bold"></td>
                <td th:text="${x.firstName + ' ' + x.lastName}"></td>
                <td th:text="${x.email}"></td>
                <td>
                    <span
                        th:classappend="${x.status.name() == 'ACTIVE' ?
                        'badge badge-success' : 'badge badge-secondary'}"
                        th:text="${x.status.getDescription()}">
                    </span>
                </td>
                <!--                Role-->
                <td th:text="${x.role.displayName}"></td>
                <td th:text="${#temporals.format(x.createdDate,'dd/MM/yyyy HH:mm')}"></td>
                <!--                Nút action-->
                <td>
                    <div th:if="${x.role.name != 'ADMIN'}">
                        <a th:href="@{'/admin/user/detail/' + ${x.userId}}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="far fa-eye"></i>
                        </a>
                        <a th:href="@{/admin/user/edit/{id}(id=${x.userId}, page=${currentPage})}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a th:href="@{/admin/user/delete/{id}(id=${x.userId}, page=${currentPage})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Bạn có chắc chắn muốn dừng hoạt động người này không?');">
                            <i class="far fa-trash-alt"></i>
                        </a>
                    </div>
                </td>
            </tr>

            <tr th:if="${users == null or users.isEmpty()}">
                <td colspan="6" class="text-center">Không tìm thấy người dùng nào.</td>
            </tr>

            </tbody>

        </table>

        <nav th:if="${totalPages > 0}">
            <ul class="pagination pagination-sm justify-content-center mt-4">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/admin/users(
                       page=${currentPage - 1},
                       status=${status},
                       role=${role},
                       departmentId=${departmentId},
                       keyword=${keyword})}">
                        <
                    </a>
                </li>

                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/admin/users(
                       page=${i},
                       status=${status},
                       role=${role},
                       departmentId=${departmentId},
                       keyword=${keyword})}"
                       th:text="${i + 1}">
                    </a>
                </li>

                <li class="page-item"
                    th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/admin/users(
                       page=${currentPage + 1},
                       status=${status},
                       role=${role},
                       departmentId=${departmentId},
                       keyword=${keyword})}">
                        >
                    </a>
                </li>
            </ul>
        </nav>

    </div>
</div>

<script>

    $(document).ready(function () {

        $('#userTable').DataTable({

            paging: false,
            lengthChange: false,
            searching: false,
            info: false,

            ordering: true,

            columnDefs: [
                {orderable: false, targets: [6]}
            ]
        });

    });

</script>

</body>
</html>
