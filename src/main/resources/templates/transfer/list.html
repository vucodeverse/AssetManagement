
<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">

  <title>Danh sách điều chuyển</title>
  <th:block layout:fragment="extra-css">
    <link rel="stylesheet" th:href="@{/css/transfer/transfer-list.css}">
  </th:block>
</head>
<body>
<th:block layout:fragment="content">
  <div class="container">
    <h1 th:text="${role == 'DEPARTMENT_MANAGER'} ? 'Danh sách lệnh điều chuyển' : 'Danh sách lệnh cần xử lý kho'"></h1>
    <div th:if="${message}" class="alert alert-success">[[${message}]]</div>
    <div th:if="${error}" class="alert alert-danger">[[${error}]]</div>

    <table class="table table-bordered">
      <thead>
      32
      <th>ID</th>
      <th>Từ phòng ban</th>
      <th>Đến phòng ban</th>
      <th>Lý do</th>
      <th>Ngày tạo</th>
      <th>Trạng thái</th>
      <th></th>
      </thead>
      <tbody>
      <tr th:each="t : ${transfers}">
        <td th:text="${t.transferId}">1</td>
        <td th:text="${t.fromDepartmentName}">IT</td>
        <td th:text="${t.toDepartmentName}">HR</td>
        <td th:text="${t.reason}">-</td>
        <td th:text="${#temporals.format(t.createdAt, 'dd-MM-yyyy HH:mm')}">-</td>
        <td><span th:text="${t.status}"></span></td>
        <td><a th:href="@{/transfer-requests/{id}(id=${t.transferId})}" class="btn btn-sm btn-primary">Xem</a></td>
      </tr>
      <tr th:if="${#lists.isEmpty(transfers)}">
        <td colspan="7" class="text-center">Không có lệnh nào</td>
      </tr>
      </tbody>
    </table>
  </div>
</th:block>
</body>
</html>
