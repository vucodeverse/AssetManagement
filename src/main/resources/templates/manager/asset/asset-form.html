<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/layout/manager-layout}">

<head>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/asset/asset-form.css}">
    </th:block>
</head>

<body>

<th:block layout:fragment="content">

    <header class="page-header">
        <h1 class="page-title"
            th:text="${isEdit} ? 'CẬP NHẬT TÀI SẢN' : 'TẠO TÀI SẢN'"></h1>
    </header>

    <div class="content-wrapper">

        <div class="form-panel">

            <form th:action="${isEdit} ? @{/manager/assets/edit/{id}(id=${asset.assetId})} : @{/manager/assets/create}"
                  th:object="${asset}" method="post">

                <input type="hidden" th:if="${isEdit}" th:field="*{assetId}"/>

                <div class="form-grid">

                    <div class="form-field">
                        <label>Tên tài sản</label>
                        <input type="text" th:field="*{assetName}" required>
                    </div>

                    <div class="form-field">
                        <label>Số serial</label>
                        <input type="text" th:field="*{serialNumber}">
                    </div>

                    <div class="form-field">
                        <label>Loại tài sản</label>
                        <select th:field="*{assetTypeId}" required>
                            <option value="">-- Chọn loại tài sản --</option>
                            <option th:each="type : ${assetTypes}"
                                    th:value="${type.typeId}"
                                    th:text="${type.typeName}"></option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label>Đơn mua</label>
                        <select th:field="*{purchaseOrderDetailId}">
                            <option value="">-- Chọn đơn mua --</option>
                            <option th:each="order : ${orders}"
                                    th:value="${order.purchaseOrderDetailId}"
                                    th:text="'PO-' + ${order.purchaseOrderDetailId}">
                            </option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label>Ngày mua</label>
                        <input type="date" th:field="*{acquisitionDate}">
                    </div>

                    <div class="form-field">
                        <label>Nguyên giá</label>
                        <input type="number" th:field="*{originalCost}">
                    </div>

                    <div class="form-field">
                        <label>Bảo hành bắt đầu</label>
                        <input type="date" th:field="*{warrantyStartDate}">
                    </div>

                    <div class="form-field">
                        <label>Bảo hành kết thúc</label>
                        <input type="date" th:field="*{warrantyEndDate}">
                    </div>

                </div>

                <div class="form-actions">

                    <button type="submit"
                            class="btn-primary"
                            th:text="${isEdit} ? 'CẬP NHẬT' : 'THÊM MỚI'"></button>

                    <button type="button"
                            onclick="window.location.href='/manager/assets'"
                            class="btn-secondary">
                        HỦY
                    </button>

                </div>

            </form>

        </div>
    </div>

</th:block>

</body>
</html>
