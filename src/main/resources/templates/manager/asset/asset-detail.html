<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/manager-layout}">

<head>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/asset/asset-detail.css}">
    </th:block>
</head>

<body>
    <th:block layout:fragment="content">

        <div class="asset-page">
            <div class="asset-header">
                <h1 class="asset-title">CHI TIẾT TÀI SẢN</h1>
            </div>

            <div class="asset-form">

                <!-- Flash messages -->
                <div class="error-message" th:if="${error}" th:text="${error}"></div>
                <div class="success-message" th:if="${success}" th:text="${success}"></div>


                <form th:action="${editMode} ? @{/manager/assets/update/{id}(id=${asset.assetId})} : '#'" method="post"
                    th:object="${updateRequest}" th:if="${editMode || true}">

                    <!-- Hiển thị lỗi validation nếu có -->
                    <div th:if="${#fields.hasErrors()}" class="alert alert-danger">
                        <ul>
                            <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                        </ul>
                    </div>


                    <input type="hidden" th:field="*{assetId}" />

                    <!-- THÔNG TIN CHUNG -->
                    <div class="form-section">
                        <div class="form-section-title">Thông tin chung</div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Mã tài sản</label>
                                <div class="form-control-view" th:text="${asset.assetId}"></div>
                            </div>
                            <div class="form-group">
                                <label>Tên tài sản</label>
                                <input type="text" th:field="*{assetName}" class="form-control"
                                    th:disabled="${!editMode}" required />
                                <div th:if="${#fields.hasErrors('assetName')}" class="error" th:errors="*{assetName}">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Loại tài sản</label>
                                <div class="form-control-view" th:text="${asset.assetTypeName}"></div>
                            </div>
                            <div class="form-group">
                                <label>Giá trị ban đầu (VNĐ)</label>
                                <div class="form-control-view"
                                    th:text="${#numbers.formatDecimal(asset.originalCost,0,'COMMA',0,'POINT')} + ' ₫'">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Ngày mua</label>
                                <input type="date" th:field="*{acquisitionDate}" class="form-control"
                                    th:disabled="${!editMode}" required />
                                <div th:if="${#fields.hasErrors('acquisitionDate')}" class="error"
                                    th:errors="*{acquisitionDate}"></div>
                            </div>
                            <div class="form-group">
                                <label>Ngày bảo hành bắt đầu</label>
                                <input type="date" th:field="*{warrantyStartDate}" class="form-control"
                                    th:disabled="${!editMode}" />
                            </div>
                            <div class="form-group">
                                <label>Ngày bảo hành kết thúc</label>
                                <input type="date" th:field="*{warrantyEndDate}" class="form-control"
                                    th:disabled="${!editMode}" />
                            </div>
                            <div class="form-group">
                                <label>Trạng thái</label>
                                <th:block th:if="${editMode}">
                                    <select th:field="*{currentStatus}" class="form-control">
                                        <option th:each="s : ${allowedStatuses}" th:value="${s}"
                                            th:text="${s.description}" th:selected="${s == asset.currentStatus}">
                                        </option>
                                    </select>
                                </th:block>
                                <th:block th:unless="${editMode}">
                                    <div class="form-control-view" th:text="${asset.currentStatus.description}"></div>
                                </th:block>
                                <div th:if="${#fields.hasErrors('currentStatus')}" class="error"
                                    th:errors="*{currentStatus}"></div>
                            </div>
                            <div class="form-group">
                                <label>Ghi chú</label>
                                <textarea th:field="*{note}" class="form-control" rows="2" th:disabled="${!editMode}"
                                    placeholder="Nhập lý do thay đổi (bắt buộc khi đổi trạng thái)"></textarea>
                                <div th:if="${#fields.hasErrors('note')}" class="error" th:errors="*{note}"></div>
                            </div>
                        </div>
                    </div>

                    <!-- PHÂN BỔ -->
                    <div class="form-section">
                        <div class="form-section-title">Phân bổ</div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Phòng ban sử dụng</label>
                                <div class="form-control-view"
                                    th:text="${asset.departmentName != null ? asset.departmentName : 'Chưa phân bổ'}">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- THÔNG TIN ĐƠN MUA -->
                    <div class="form-section">
                        <div class="form-section-title">Đơn mua</div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Mã đơn hàng</label>
                                <div class="form-control-view" th:text="${asset.purchaseOrderId}"></div>
                                <label>Nhà cung cấp</label>
                                <div class="form-control-view" th:text="${asset.supplierName}"></div>
                                <label>Ngày đặt hàng</label>
                                <div class="form-control-view" th:text="${asset.orderDate}"></div>
                            </div>
                        </div>
                    </div>

                    <!-- LỊCH SỬ TÀI SẢN -->
                    <div class="form-section">
                        <div class="form-section-title">Lịch sử tài sản</div>
                        <div class="table-responsive">
                            <table class="history-table">
                                <thead>
                                    <th>Thời gian</th>
                                    <th>Hành động</th>
                                    <th>Từ</th>
                                    <th>Đến</th>
                                    <th>Ghi chú</th>
                                </thead>
                                <tbody>
                                    <tr th:each="log : ${logs}">
                                        <td th:text="${#temporals.format(log.actionDate, 'dd-MM-yyyy HH:mm')}">-</td>
                                        <td>
                                            <th:block th:switch="${log.actionType.name()}">
                                                <th:block th:case="'STATUS_CHANGE'">
                                                    <th:block th:switch="${log.newStatus}">
                                                        <th:block th:case="'UNDER_MAINTENANCE'">
                                                            <span class="badge-action badge-maintenance"
                                                                th:text="${T(edu.fpt.groupfive.common.AssetStatus).UNDER_MAINTENANCE.description}"></span>
                                                        </th:block>
                                                        <th:block th:case="'DISPOSED'">
                                                            <span class="badge-action badge-dispose"
                                                                th:text="${T(edu.fpt.groupfive.common.AssetStatus).DISPOSED.description}"></span>
                                                        </th:block>
                                                        <th:block th:case="*">
                                                            <span class="badge-action badge-status-change"
                                                                th:text="${T(edu.fpt.groupfive.common.AssetStatus).valueOf(log.newStatus).description}"></span>
                                                        </th:block>
                                                    </th:block>
                                                </th:block>
                                                <th:block th:case="'CREATE'">
                                                    <span class="badge-action badge-create"
                                                        th:text="${log.actionType.description}"></span>
                                                </th:block>
                                                <th:block th:case="'ALLOCATE'">
                                                    <span class="badge-action badge-allocate"
                                                        th:text="${log.actionType.description}"></span>
                                                </th:block>
                                                <th:block th:case="'TRANSFER'">
                                                    <span class="badge-action badge-transfer"
                                                        th:text="${log.actionType.description}"></span>
                                                </th:block>
                                                <th:block th:case="'RETURN'">
                                                    <span class="badge-action badge-return"
                                                        th:text="${log.actionType.description}"></span>
                                                </th:block>
                                                <th:block th:case="'DISPOSE'">
                                                    <span class="badge-action badge-dispose"
                                                        th:text="${log.actionType.description}"></span>
                                                </th:block>
                                                <th:block th:case="*">
                                                    <span class="badge-action"
                                                        th:text="${log.actionType.description}"></span>
                                                </th:block>
                                            </th:block>
                                        </td>
                                        <td th:text="${log.fromDepartmentName != null ? log.fromDepartmentName : '—'}">—
                                        </td>
                                        <td th:text="${log.toDepartmentName != null ? log.toDepartmentName : '—'}">—
                                        </td>
                                        <td class="note-cell" th:text="${log.note != null ? log.note : '—'}">—</td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(logs)}">
                                        <td colspan="5" class="text-center">Không có dữ liệu</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>



                    <!-- Nút hành động -->
                    <div class="form-actions">
                        <th:block th:if="${editMode}">
                            <button type="submit" class="btn-primary">LƯU THAY ĐỔI</button>
                            <a th:href="@{/manager/assets/detail/{id}(id=${asset.assetId})}"
                                class="btn-secondary">HỦY</a>
                        </th:block>
                        <th:block th:unless="${editMode}">
                            <a th:href="@{/manager/assets/detail/{id}(id=${asset.assetId}, edit=true)}"
                                class="btn-primary">
                                SỬA THÔNG TIN
                            </a>
                            <a th:href="@{/manager/assets}" class="btn-secondary">
                                QUAY LẠI DANH SÁCH
                            </a>
                        </th:block>
                    </div>

                </form>
            </div>
        </div>

    </th:block>
</body>

</html>
