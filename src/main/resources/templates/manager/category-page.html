<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý danh mục</title>
    <style>
        .container {
            display: flex;
            gap: 40px;
        }

        .left {
            width: 60%;
        }

        .right {
            width: 40%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border-bottom: 1px solid #ccc;
            padding: 8px;
        }

        .actions a {
            margin-right: 8px;
        }

        .btn {
            padding: 6px 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>QUẢN LÍ DANH MỤC TÀI SẢN</h2>
<div class="container">
    <!--    bên trái -->
    <div class="left">
        <form method="get" th:action="@{/manager/categories}">
            <input type="text" name="keyword" placeholder="Tìm theo tên danh mục"
                   th:value="${keyword}">

            <!-- giữ lại sort nếu đang sort -->
            <input type="hidden" name="sort" th:value="${sort}">

            <button type="submit">Tìm</button>
        </form>
        <table>
            <thead>
            <tr>
                <th>Mã danh mục</th>
                <th>Tên danh mục
                    <a th:href="@{/manager/categories(keyword=${keyword}, sort='asc')}">▲</a>
                    <a th:href="@{/manager/categories(keyword=${keyword}, sort='desc')}">▼</a>
                </th>

                <th>Hành động</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="c: ${categories}">
                <td th:text="${c.categoryId}"></td>
                <td th:text="${c.categoryName}"></td>
                <td class="actions">
                    <a th:href="@{'/manager/categories?id=' +${c.categoryId}}">✏</a>
                    <a th:href="@{'/manager/categories/delete/' +${c.categoryId}}"
                       onclick="return confirm('Bạn có chắc chắn muốn xóa?')">🗑</a>

                </td>

            </tr>

            </tbody>
        </table>

    </div>

    <!--    bên phải -->
    <div class="right">

        <h3 th:text="${mode == 'update'} ? 'Cập nhật danh mục' : 'Tạo danh mục'"></h3>

        <form th:action="@{/manager/categories}"
              th:object="${category}"
              method="post">

            <div th:if="${mode=='update'}">
                <label>Mã danh mục</label><br/>
                <input type="text" th:field="*{categoryId}" readonly/>
                <input type="hidden" th:field="*{categoryId}">
            </div>

            <label>Tên danh mục</label><br/>
            <input type="text" th:field="*{categoryName}" placeholder="Nhập tên danh mục" required><br/>
            <div style="color:red"
                 th:errors="*{categoryName}">
            </div>

            <label>Mô tả</label><br/>
            <textarea th:field="*{description}" placeholder="Nhập mô tả"></textarea> <br/>

            <div th:if="${mode=='update'}">
                <label>Trạng thái</label><br/>
                <select th:field="*{status}">
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="INACTIVE">INACTIVE</option>
                </select><br/>
            </div>
            <button type="submit" name="add"
                    th:if="${mode == 'create'}">Thêm mới
            </button>

            <button type="submit" name="save"
                    th:if="${mode == 'update'}">Cập nhật
            </button>

            <button type="button"
                    onclick="window.location.href='/manager/categories'">
                Huỷ
            </button>

        </form>

    </div>
</div>

</body>
</html>
