<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/manager :: layout(~{::content})">


<div th:fragment="content">

    <div class="container-fluid mt-4">

        <h3 class="mb-4">Quản lý danh mục tài sản</h3>

        <div class="row">

            <!-- ================== BÊN TRÁI ================== -->
            <div class="col-md-7">

                <div class="card table-box">
                    <div class="card-body">

                        <!-- Tìm kiếm -->
                        <form method="get"
                              th:action="@{/manager/categories}"
                              class="row g-2 mb-3">

                            <div class="col-md-8">
                                <input type="text"
                                       class="form-control"
                                       name="keyword"
                                       placeholder="Tìm theo tên danh mục"
                                       th:value="${keyword}">
                            </div>

                            <input type="hidden"
                                   name="sort"
                                   th:value="${sort}">

                            <div class="col-md-4">
                                <button class="btn btn-primary w-100">
                                    Tìm kiếm
                                </button>
                            </div>
                        </form>

                        <!-- Bảng -->
                        <table class="table table-bordered table-hover">
                            <thead class="table-light">
                            <tr>
                                <th>Mã</th>
                                <th>
                                    Tên danh mục
                                    <a th:href="@{/manager/categories(keyword=${keyword}, sort='asc')}"
                                       class="text-decoration-none">▲</a>
                                    <a th:href="@{/manager/categories(keyword=${keyword}, sort='desc')}"
                                       class="text-decoration-none">▼</a>
                                </th>
                                <th width="120">Hành động</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="c : ${categories}">
                                <td th:text="${c.categoryId}"></td>
                                <td th:text="${c.categoryName}"></td>
                                <td>
                                    <a th:href="@{'/manager/categories?id=' + ${c.categoryId}}"
                                       class="btn btn-sm btn-warning">
                                        Sửa
                                    </a>

                                    <a th:href="@{'/manager/categories/delete/' + ${c.categoryId}}"
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa?')"
                                       class="btn btn-sm btn-danger">
                                        Xóa
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>

                    </div>
                </div>

            </div>

            <!-- ================== BÊN PHẢI ================== -->
            <div class="col-md-5">

                <div class="card form-box">
                    <div class="card-body">

                        <h5 class="mb-3"
                            th:text="${mode == 'update'} ? 'Cập nhật danh mục' : 'Tạo danh mục'">
                        </h5>

                        <form th:action="@{/manager/categories}"
                              th:object="${category}"
                              method="post">

                            <!-- ID -->
                            <div th:if="${mode=='update'}" class="mb-3">
                                <label class="form-label">Mã danh mục</label>
                                <input type="text"
                                       class="form-control"
                                       th:field="*{categoryId}"
                                       readonly>
                                <input type="hidden"
                                       th:field="*{categoryId}">
                            </div>

                            <!-- Tên -->
                            <div class="mb-3">
                                <label class="form-label">Tên danh mục</label>
                                <input type="text"
                                       class="form-control"
                                       th:field="*{categoryName}"
                                       placeholder="Nhập tên danh mục"
                                       required>
                                <div class="text-danger"
                                     th:errors="*{categoryName}">
                                </div>
                            </div>

                            <!-- Mô tả -->
                            <div class="mb-3">
                                <label class="form-label">Mô tả</label>
                                <textarea class="form-control"
                                          th:field="*{description}"
                                          rows="3"
                                          placeholder="Nhập mô tả"></textarea>
                            </div>

                            <!-- Trạng thái -->
                            <div th:if="${mode=='update'}" class="mb-3">
                                <label class="form-label">Trạng thái</label>
                                <select class="form-select"
                                        th:field="*{status}">
                                    <option value="ACTIVE">Hoạt động</option>
                                    <option value="INACTIVE">Ngưng</option>
                                </select>
                            </div>

                            <!-- Nút -->
                            <div class="d-flex gap-2">
                                <button type="submit"
                                        name="add"
                                        th:if="${mode == 'create'}"
                                        class="btn btn-success">
                                    Thêm mới
                                </button>

                                <button type="submit"
                                        name="save"
                                        th:if="${mode == 'update'}"
                                        class="btn btn-primary">
                                    Cập nhật
                                </button>

                                <button type="button"
                                        class="btn btn-secondary"
                                        onclick="window.location.href='/manager/categories'">
                                    Hủy
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>

        </div>
    </div>

</div>
</html>
