<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/manager-layout}">

<head>
    <title>Quản lý loại tài sản</title>

    <!-- Nếu có CSS riêng -->
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/asset-type.css}">
    </th:block>
</head>

<body>

<div layout:fragment="content">

    <h2>QUẢN LÝ LOẠI TÀI SẢN</h2>

    <!-- Flash Message -->
    <div th:if="${successMessage}" class="success">
        <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${errorMessage}" class="error">
        <span th:text="${errorMessage}"></span>
    </div>

<div class="container">

    <!-- ================= LEFT ================= -->
    <div class="left">

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Tên loại</th>
                <th>Danh mục</th>
                <th>Phân loại</th>
                <th>Khấu hao</th>
                <th>Tháng SD</th>
                <th>Hành động</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="t : ${assetTypes}">
                <td th:text="${t.typeId}"></td>
                <td th:text="${t.typeName}"></td>
                <td th:text="${t.categoryName}"></td>
                <td th:text="${t.typeClass}"></td>
                <td th:text="${t.defaultDepreciationMethod}"></td>
                <td th:text="${t.defaultUsefulLifeMonths}"></td>

                <td class="actions">

                    <!-- EDIT -->
                    <a th:href="@{'/manager/asset-types/edit/' + ${t.typeId}}">✏</a>

                    <!-- DELETE (POST) -->
                    <form th:action="@{'/manager/asset-types/delete/' + ${t.typeId}}"
                          method="post"
                          style="display:inline;"
                          onsubmit="return confirm('Bạn có chắc chắn muốn xóa?')">
                        <button type="submit">🗑</button>
                    </form>

                </td>
            </tr>
            </tbody>
        </table>

    </div>

    <!-- ================= RIGHT ================= -->
    <div class="right">

        <h3 th:text="${mode == 'update'} ? 'Cập nhật loại tài sản' : 'Tạo loại tài sản'"></h3>

        <form th:action="${mode == 'create'}
                ? @{/manager/asset-types/create}
                : @{/manager/asset-types/update}"
              th:object="${assetType}"
              method="post">

            <!-- ID khi update -->
            <div th:if="${mode == 'update'}">
                <label>ID</label>
                <input type="text" th:field="*{typeId}" readonly/>
                <input type="hidden" th:field="*{typeId}">
            </div>

            <!-- Tên loại -->
            <label>Tên loại</label>
            <input type="text"
                   th:field="*{typeName}"
                   placeholder="Nhập tên loại tài sản"
                   required>
            <div class="error" th:errors="*{typeName}"></div>

            <!-- Mô tả -->
            <label>Mô tả</label>
            <textarea th:field="*{description}"
                      placeholder="Nhập mô tả"></textarea>
            <div class="error" th:errors="*{description}"></div>

            <!-- Specification -->
            <label>Thông số kỹ thuật</label>
            <textarea th:field="*{specification}"
                      placeholder="Nhập thông số kỹ thuật"></textarea>
            <div class="error" th:errors="*{specification}"></div>

            <!-- Model -->
            <label>Model</label>
            <input type="text"
                   th:field="*{model}"
                   placeholder="Nhập model">
            <div class="error" th:errors="*{model}"></div>

            <!-- Danh mục -->
            <label>Danh mục</label>
            <select th:field="*{categoryId}" required>
                <option value="">-- Chọn danh mục --</option>
                <option th:each="c : ${categories}"
                        th:value="${c.categoryId}"
                        th:text="${c.categoryName}">
                </option>
            </select>
            <div class="error" th:errors="*{categoryId}"></div>

            <!-- Phân loại -->
            <label>Phân loại</label>
            <select th:field="*{typeClass}" required>
                <option value="">-- Chọn phân loại --</option>
                <option th:each="c : ${typeClasses}"
                        th:value="${c}"
                        th:text="${c}">
                </option>
            </select>
            <div class="error" th:errors="*{typeClass}"></div>

            <!-- Phương pháp khấu hao -->
            <label>Phương pháp khấu hao</label>
            <select th:field="*{defaultDepreciationMethod}" required>
                <option value="">-- Chọn phương pháp --</option>
                <option th:each="d : ${depreciationMethods}"
                        th:value="${d}"
                        th:text="${d}">
                </option>
            </select>
            <div class="error" th:errors="*{defaultDepreciationMethod}"></div>

            <!-- Thời gian sử dụng -->
            <label>Thời gian sử dụng (tháng)</label>
            <input type="number"
                   th:field="*{defaultUsefulLifeMonths}"
                   required>
            <div class="error" th:errors="*{defaultUsefulLifeMonths}"></div>

            <br/>

            <!-- BUTTON -->
            <button id="btnCreate" type="submit"
                    th:if="${mode == 'create'}">
                Thêm mới
            </button>

            <button type="submit"
                    th:if="${mode == 'update'}">
                Cập nhật
            </button>

            <!-- HUỶ -->
            <a th:href="@{/manager/asset-types}">
                <button type="button">Huỷ</button>
            </a>

        </form>

    </div>
</div>

</body>
</html>
