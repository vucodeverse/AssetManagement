<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Quản Lý Phòng Ban</title>
    <link
            rel="stylesheet"
            href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    <style>
        body {
            background-color: #f4f7f6;
        }

        .sidebar {
            height: 100vh;
            width: 240px;
            position: fixed;
            top: 0;
            left: 0;
            background: #212529;
            color: white;
            padding-top: 20px;
            z-index: 1000;
        }

        .sidebar a {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #343a40;
            color: white;
        }

        .sidebar a.active {
            background: #007bff;
            color: white;
            font-weight: bold;
        }

        /* Nội dung chính */
        .content {
            margin-left: 250px;
            padding: 30px;
        }

        .header-title {
            color: #007bff;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* Card style cho form */
        .detail-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
        }

        .form-label {
            font-weight: 600;
            color: #495057;
        }
    </style>

</head>
<body>
<div class="sidebar">
    <h4 class="text-center mb-4">Admin Panel</h4>
    <a href="/admin/home">Quản lí người dùng</a>
    <a href="/admin/department" class="active">Quản lí phòng ban</a>
</div>

<div class="content">
    <a th:href="@{/admin/department}" style="text-decoration: none;">
        <h1 class="header-title">Quản lí phòng ban</h1>
    </a>

    <hr/>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <!--    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>-->

    <div class="row">
        <div class="col-lg-7">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <a th:href="@{/admin/department}" class="btn btn-primary">
                    + Thêm phòng ban
                </a>


                <form th:action="@{/admin/department}" method="get" class="input-group w-50">
                    <input type="text"
                           name="keyword"
                           class="form-control"
                           th:value="${keyword}"
                           placeholder="Tìm kiếm phòng ban..."/>

                    <div class="input-group-append">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </form>

            </div>

            <table class="table table-bordered table-striped shadow-sm bg-white">
                <thead class="thead-dark">
                <tr>
                    <th>Phòng ban</th>
                    <th>Quản lý</th>
                    <th>Nhân sự</th>
                    <th style="width: 120px">Hành động</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="x : ${departments}">
                    <td th:text="${x.departmentName}"></td>
                    <td th:text="${x.managerName}"></td>
                    <td th:text="${staffCount[x.departmentId] != null ? staffCount[x.departmentId] : 0}"></td>
                    <td>
                        <a th:href="@{/admin/department/edit(id=${x.departmentId}, page=${page})}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="far fa-eye"></i>
                        </a>
                        <form th:action="@{/admin/department/delete}" method="post" style="display:inline">
                            <input type="hidden"
                                   name="id"
                                   th:value="${x.departmentId}"/>
                            <button class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Bạn có chắc chắn muốn xóa phòng ban này không?');">
                                <i class="far fa-trash-alt"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <nav>
                <ul class="pagination pagination-sm justify-content-center">

                    <!-- Nút Previous -->
                    <li class="page-item" th:classappend="${page <= 1} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/department(page=${page - 1}, keyword=${keyword})}">
                            <
                        </a>
                    </li>

                    <!-- Trang hiện tại -->
                    <li th:each="i : ${#numbers.sequence(1, totalPages)}"
                        class="page-item"
                        th:classappend="${i == page} ? 'active'">

                        <a class="page-link"
                           th:href="@{/admin/department(page=${i}, keyword=${keyword})}"
                           th:text="${i}">
                        </a>
                    </li>

                    <!-- Trang kế tiếp -->
                    <li class="page-item">
                        <a class="page-link"
                           th:href="@{/admin/department(page=${page + 1}, keyword=${keyword})}">
                            >
                        </a>
                    </li>

                </ul>
            </nav>

        </div>

        <div class="col-lg-5">
            <div class="detail-card">

                <h5 class="mb-4 text-primary">
                    <i class="fas fa-info-circle"></i> Chi tiết phòng ban
                </h5>

                <form th:action="@{${mode == 'Add'
                        ? '/admin/department/create'
                        : '/admin/department/update'}}"
                      method="post">

                    <input type="hidden" name="departmentId" th:value="${selected.departmentId}"/>
                    <input type="hidden" name="page" th:value="${page}"/>

                    <!-- MÃ PHÒNG BAN -->
                    <div class="form-group">
                        <label class="form-label">Mã phòng ban</label>
                        <input type="text"
                               class="form-control bg-light"
                               th:value="${selected.departmentId}"
                               placeholder="Phục vụ hiển thị"
                               readonly/>
                    </div>

                    <!-- TÊN PHÒNG BAN -->
                    <div class="form-group">
                        <label class="form-label">Tên phòng ban</label>
                        <input type="text"
                               name="departmentName"
                               class="form-control border-primary"
                               th:value="${selected.departmentName}"/>
                    </div>

                    <!-- TÊN QUẢN LÝ-->
                    <div class="form-group">
                        <label class="form-label">Quản lý</label>
                        <input type="text"
                               name="managerName"
                               class="form-control border-primary"
                               th:value="${selected.managerName}"
                               placeholder="Hệ thống sẽ tự động cập nhật"
                               readonly/>
                    </div>

                    <!-- MÔ TẢ VỀ PHÒNG BAN -->
                    <div class="form-group">
                        <label class="form-label">Mô tả</label>
                        <textarea class="form-control" rows="3"
                                  name="description"
                                  th:text="${selected.description}">
                        </textarea>
                    </div>

                    <!-- BUTTON -->
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Save
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
