<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Quản Lý Người Dùng</title>
    <link
            rel="stylesheet"
            href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    <style>
        body {
          background-color: #f4f7f6;
        }
        .sidebar {
          height: 100vh;
          width: 240px;
          position: fixed;
          top: 0;
          left: 0;
          background: #212529;
          color: white;
          padding-top: 20px;
          z-index: 1000;
        }
        .sidebar a {
          display: block;
          color: rgba(255, 255, 255, 0.8);
          padding: 12px 20px;
          text-decoration: none;
          transition: 0.3s;
        }
        .sidebar a:hover {
          background: #343a40;
          color: white;
        }
        .sidebar a.active {
          background: #007bff;
          color: white;
          font-weight: bold;
        }

        /* Nội dung chính */
        .content {
          margin-left: 250px;
          padding: 30px;
        }
        .header-title {
          color: #007bff;
          margin-bottom: 20px;
          font-weight: bold;
        }

        /* Card style */
        .card-container {
          background: white;
          padding: 20px;
          border-radius: 8px;
          box-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
        }
        .table thead {
            background-color: #343a40;
            color: white;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="text-center mb-4">Admin Panel</h4>
    <a href="/admin/home" class="active">Quản lí người dùng</a>
    <a href="/admin/department">Quản lí phòng ban</a>
</div>

<div class="content">

    <a th:href="@{/admin/home}" style="text-decoration: none;">
        <h1 class="header-title">Quản lí người dùng</h1>
    </a>

    <hr/>

    <div class="card-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a th:href="@{/admin/add}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Thêm người dùng
            </a>

            <form th:action="@{/admin/home}" method="get" class="form-inline">
<!--                Filter theo status-->
                <select name="status" class="form-control mr-2 border-primary">
                    <option value="">Trạng thái</option>
                    <option value="ACTIVE" th:selected="${status=='ACTIVE'}">ACTIVE</option>
                    <option value="INACTIVE" th:selected="${status=='INACTIVE'}">INACTIVE</option>
                </select>
<!--                Filter theo department-->
                <select name="departmentId" class="form-control mr-2 border-primary">
                    <option value="">Phòng ban</option>
                    <option th:each="d : ${departments}"
                            th:value="${d.departmentId}"
                            th:text="${d.departmentName}"
                            th:selected="${departmentId == d.departmentId}">
                    </option>
                </select>
<!--                Filter theo role-->
                <select name="role" class="form-control mr-2 border-primary">
                    <option value="">Vai trò</option>
                    <option th:each="r : ${roles}"
                            th:value="${r}"
                            th:text="${r.displayName}"
                            th:selected="${role != null and r == role}">
                    </option>
                </select>
<!--                Chỗ tìm kiếm-->
                <div class="input-group">
                    <input type="text"
                           name="keyword"
                           class="form-control border-primary"
                           placeholder="Tìm kiếm..."
                           th:value="${keyword}">
                    <div class="input-group-append">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <table class="table table-bordered table-hover shadow-sm bg-white">
            <thead>
            <tr>
                <th>Tên đăng nhập</th>
                <th>Họ và tên</th>
                <th>Email</th>
                <th>Trạng thái</th>
                <th>Vai trò</th>
                <th style="width: 150px">Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="x : ${users}">
                <td th:text="${x.username}" class="font-weight-bold"></td>
                <td th:text="${x.firstName + ' ' + x.lastName}"></td>
                <td th:text="${x.email}"></td>
<!--                Status-->
                <td>
                    <span th:classappend="${x.status == 'ACTIVE' ?
                    'badge badge-success' : 'badge badge-secondary'}"
                          th:text="${x.status}">
                    </span>
                </td>
<!--                Role-->
                <td th:text="${x.role.displayName}"></td>
<!--                Nút action-->
                <td>
                    <a th:href="@{'/admin/edit/' + ${x.userId}}"
                       class="btn btn-sm btn-outline-primary">
                        <i class="fas fa-edit"></i>
                    </a>
                    <a th:href="@{'/admin/delete/' + ${x.userId}}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Bạn có chắc chắn muốn dừng hoạt động người này không?');">
                        <i class="far fa-trash-alt"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${users == null or users.isEmpty()}">
                <td colspan="6" class="text-center">Không tìm thấy người dùng nào.</td>
            </tr>
            </tbody>
        </table>

        <nav th:if="${totalPages > 0}">
            <ul class="pagination pagination-sm justify-content-center mt-4">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/admin/home(
                       page=${currentPage - 1},
                       status=${status},
                       role=${role},
                       departmentId=${departmentId},
                       keyword=${keyword})}">
                        <
                    </a>
                </li>

                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/admin/home(
                       page=${i},
                       status=${status},
                       role=${role},
                       departmentId=${departmentId},
                       keyword=${keyword})}"
                       th:text="${i + 1}">
                    </a>
                </li>

                <li class="page-item"
                    th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/admin/home(
                       page=${currentPage + 1},
                       status=${status},
                       role=${role},
                       departmentId=${departmentId},
                       keyword=${keyword})}">
                        >
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>

</body>
</html>
