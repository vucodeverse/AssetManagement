<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Phê duyệt yêu cầu trả hàng</title>

    <!-- link CSS -->
    <link rel="stylesheet" th:href="@{/css/allocation/allocation-request-list.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
</head>

<body>
<div class="purchase-content-wrapper">

    <form method="get" th:action="@{/asset-manager/return-request/listbyAssetMgr}">

        <header class="top-bar">
            <h1>Phê duyệt yêu cầu trả hàng</h1>
            <div class="top-actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Tìm kiếm...">
                </div>
            </div>
        </header>

        <!-- FILTER BAR -->
        <section class="filters-bar">
            <div class="filter-group">
                <select name="status">
                    <option value="">Trạng thái: Tất cả</option>
                    <option value="PENDING_AM">ĐANG CHỜ</option>
                    <option value="APPROVED">ĐÃ DUYỆT</option>
                    <option value="REJECTED">TỪ CHỐI</option>
                    <option value="COMPLETED">HOÀN THÀNH</option>
                </select>
                <button type="submit">ÁP DỤNG</button>
                <a class="btn-reset" th:href="@{/asset-manager/return-request/listbyAssetMgr}">LÀM MỚI</a>
            </div>
        </section>

    </form>

    <!-- TABLE -->
    <div class="table-container">
        <table class="data-table">
            <thead>
            <tr>
                <th>ID yêu cầu</th>
                <th>Trạng thái</th>
                <th>Người tạo</th>
                <th>Ngày khởi tạo</th>
                <th>Hành động</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="x : ${requests}" class="clickable-row"
                th:attr="onclick=|window.location.href='/department/return-request/detail/${x.requestId}'|">

                <td class="cell-id" th:text="'RR-' + ${x.requestId}"></td>

                <td>
                    <span class="status-badge" th:classappend="' status-' + ${x.status}" th:text="${x.status}"></span>
                </td>

                <td th:text="${x.fullName}"></td>

                <td>
                    <span th:text="${#temporals.format(x.createdAt,'dd-MM-yyyy')}"></span>
                </td>

                <td onclick="event.stopPropagation();">
                    <!-- APPROVE -->
                    <form th:if="${x.status == 'PENDING_AM'}"
                          th:action="@{/asset-manager/return-request/approve/{id}(id=${x.requestId})}"
                          method="post" style="display:inline;"
                          onsubmit="return confirm('Xác nhận duyệt yêu cầu trả hàng này?');">
                        <button type="submit" class="btn btn-sm btn-success" title="Duyệt">
                            <i class="fas fa-check"></i>
                        </button>
                    </form>

                    <!-- REJECT -->
                    <form th:if="${x.status == 'PENDING_AM'}"
                          th:action="@{/asset-manager/return-request/reject/{id}(id=${x.requestId})}"
                          method="post" style="display:inline;"
                          onsubmit="return confirm('Xác nhận từ chối yêu cầu này?');">
                        <button type="submit" class="btn btn-sm btn-danger" title="Từ chối">
                            <i class="fas fa-times"></i>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
