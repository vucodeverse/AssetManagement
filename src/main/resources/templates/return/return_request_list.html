<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/department-layout}">

<head>
    <meta charset="UTF-8">
    <title>Danh sách yêu cầu trả</title>

    <!-- link CSS -->
    <link rel="stylesheet" th:href="@{/css/allocation/allocation-request-list.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
</head>

<body>
<th:block layout:fragment="content">
<div class="purchase-content-wrapper">

    <form method="get" th:action="@{/department/return-request/search}">
        <header class="top-bar">

            <h1>Danh sách yêu cầu trả</h1>

            <div class="top-actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text"
                           name="keyword"
                           th:value="${keyword}"
                           placeholder="Tìm kiếm...">
                </div>
            </div>

            <a th:href="@{/department/return-request/create}" class="btn-add">
                <i class="fas fa-plus"></i>
                Tạo yêu cầu
            </a>

        </header>

        <!-- FILTER BAR -->
        <section class="filters-bar">

            <div class="filter-group">
                <select name="status">
                    <option value="">Trạng thái: Tất cả</option>
                    <option value="PENDING_AM"
                            th:selected="${status == 'PENDING_AM'}">ĐANG CHỜ
                    </option>
                    <option value="COMPLETED"
                            th:selected="${status == 'COMPLETED'}">HOÀN THÀNH
                    </option>
                </select>

                <input type="date"
                       name="fromDate"
                       th:value="${fromDate}">

                <input type="date"
                       name="toDate"
                       th:value="${toDate}">

                <button type="submit">
                    ÁP DỤNG
                </button>

                <a class="btn-reset" th:href="@{/department/return-request/list}">
                    KHÔI PHỤC
                </a>
            </div>
        </section>

    </form>

    <!-- Success Message -->
    <div th:if="${message}" class="success-alert"
         style="background-color: #f0fdf4; border: 1px solid #16a34a; color: #166534; padding: 16px; border-radius: 4px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px;">
        <i class="fas fa-check-circle"></i>
        <span th:text="${message}" style="font-weight: 600; font-size: 14px;">Success message here</span>
    </div>

    <!-- TABLE -->
    <div class="table-container" id="allocationTable">
        <table class="data-table">
            <thead>
            <tr>
                <th>ID yêu cầu</th>
                <th>Trạng thái</th>
                <th>Người tạo</th>
                <th>Ngày khởi tạo</th>
                <th>Hành động</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="x : ${requests}" class="clickable-row"
                th:attr="onclick=|window.location.href='/department/return-request/detail/${x.requestId}'|">

                <!-- ID -->
                <td class="cell-id" th:text="'AR-' + ${x.requestId}">
                </td>

                <!-- STATUS -->
                <td>
                    <span class="status-badge" th:classappend="' status-' + ${x.status}" th:text="${x.status}">
                    </span>
                </td>

                <!-- REQUESTER -->
                <td th:text="${x.fullName}">
                </td>

                <!-- CREATED AT -->
                <td>
                    <span th:text="${#temporals.format(x.createdAt,'dd-MM-yyyy')}">
                    </span>
                </td>

                <!-- ACTIONS -->
                <td onclick="event.stopPropagation();">

                    <!-- Edit (Only if Pending) -->
                    <a th:if="${x.status == 'PENDING_AM'}"
                       th:href="@{/department/return-request/edit/{id}(id=${x.requestId})}"
                       class="btn btn-sm btn-outline-primary" title="Chỉnh sửa">
                        <i class="fas fa-edit"></i>
                    </a>

                    <!-- Delete (Only if Pending) -->
                    <form th:if="${x.status == 'PENDING_AM'}"
                          th:action="@{/department/return-request/delete/{id}(id=${x.requestId})}"
                          method="post" style="display:inline;"
                          onsubmit="return confirm('Bạn có chắc muốn xóa yêu cầu này không?');">
                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa yêu cầu">
                            <i class="far fa-trash-alt"></i>
                        </button>
                    </form>
                </td>

            </tr>
            </tbody>
        </table>

    </div>

</div>

<script th:inline="none">
    $(document).ready(function () {

        $('.data-table').DataTable({

            pageLength: 5,
            lengthChange: false,
            searching: false,
            info: true,

            ordering: true,

            columnDefs: [
                {orderable: true, targets: [0]}, // ID yêu cầu
                {orderable: true, targets: [3]}, // Ngày khởi tạo

                // Các cột còn lại không sort
                {orderable: false, targets: [1, 2, 4]}
            ],

            // Mặc định sort theo id
            order: [[0, 'asc']],

            //Ngôn ngữ
            language: {
                info: "Hiển thị _START_ đến _END_ của tổng số _TOTAL_ danh sách",
                infoEmpty: "Không có dữ liệu",
                paginate: {
                    first: "Đầu",
                    last: "Cuối",
                    next: ">",
                    previous: "<"
                },
                emptyTable: "Không có dữ liệu trong bảng",
                zeroRecords: "Không tìm thấy dữ liệu"
            }
        });
    });
</script>
</th:block>
</body>

</html>
