<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8"/>
    <title>Yêu cầu trả tài sản</title>

    <link rel="stylesheet" th:href="@{/css/allocation/allocation-request-form.css}">
</head>

<body>

<div class="pr-container">

    <!-- HEADER -->
    <header class="pr-header">
        <h1 th:text="${requestDto.requestId != null
                ? (canEdit ? 'Sửa yêu cầu trả tài sản' : 'Chi tiết yêu cầu trả tài sản')
                : 'Tạo yêu cầu trả tài sản'}">
        </h1>
    </header>


    <!-- FORM -->
    <form th:action="@{${requestDto.requestId != null
            ? '/department/return-request/update/' + requestDto.requestId
            : '/department/return-request/save'}}" th:object="${requestDto}" method="post">


        <!-- ================= THÔNG TIN CHUNG ================= -->
        <section class="form-section">

            <div class="section-title">THÔNG TIN CHUNG</div>

            <div class="form-grid">
                <!-- reason -->
                <div class="form-group full-width">
                    <label>LÝ DO TRẢ TÀI SẢN</label>

                    <input type="text"
                           th:field="*{requestReason}"
                           th:readonly="${canEdit != null && !canEdit}"
                           placeholder="VD: Thiết bị hỏng, nhân viên nghỉ việc"
                           required/>
                </div>

            </div>

            <!-- hidden data -->
            <input type="hidden" name="requesterId" value="1"/>
            <input type="hidden" name="requestedDepartmentId" value="1"/>

        </section>


        <!-- ================= DANH SÁCH TÀI SẢN ================= -->
        <section class="form-section">

            <input type="hidden"
                   th:field="*{requestId}">

            <div class="section-title">DANH SÁCH TÀI SẢN</div>

            <div class="table-container">

                <table class="pr-table" id="assetTable">

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên tài sản</th>
                        <th>Ghi chú</th>
                        <th>Chọn</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="a,stat : ${assets}">

                        <!-- id -->
                        <td th:text="${a.assetId}"></td>
                        <!-- name -->
                        <td th:text="${a.assetTypeName}"></td>
                        <!-- note -->
                        <td>
                            <input type="text"
                                   th:readonly="${canEdit != null && !canEdit}"
                                   th:value="${a.note}">
                        </td>
                        <!-- tick -->
                        <td>
                            <input type="checkbox"
                                   class="chkAsset"
                                   th:value="${a.assetId}"
                                   th:if="${canEdit}"
                                   th:checked="${requestDto.requestId != null}"
                                   onchange="toggleRow(this)">
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </section>

        <div id="detailsContainer"></div>

        <!-- ================= FOOTER ================= -->
        <footer class="pr-footer">

            <div class="footer-left">
                <a th:href="@{/department/return-request/list}"
                   class="btn btn-back-custom">
                    <- Quay lại
                </a>
            </div>

            <div class="footer-right">
                <button type="reset"
                        th:if="${canEdit}"
                        class="btn btn-reset-custom">
                    Nhập lại
                </button>

                <button type="submit"
                        th:if="${canEdit}"
                        class="btn btn-submit-custom">
                    Gửi yêu cầu
                </button>
            </div>

        </footer>

    </form>

</div>


<script>

    function toggleRow(chk) {

        const row = chk.closest("tr");

        const noteInput = row.querySelector(".noteInput");

        // noteInput.disabled = !chk.checked;
        noteInput.readOnly = !chk.checked;

        buildDetails();

    }


    function buildDetails() {

        const container = document.getElementById("detailsContainer");

        container.innerHTML = "";

        const rows = document.querySelectorAll("#assetTable tbody tr");

        let index = 0;

        rows.forEach(row => {

            const chk = row.querySelector(".chkAsset");

            if (!chk) return;

            if (chk.checked) {

                const assetId = chk.value;

                const note = row.querySelector(".noteInput").value;

                container.innerHTML += `
                <input type="hidden"
                       name="details[${index}].assetId"
                       value="${assetId}">

                <input type="hidden"
                       name="details[${index}].note"
                       value="${note}">
            `;
                index++;
            }
        });

    }


    document.querySelector("form").addEventListener("submit", function () {

        buildDetails();

    });

</script>
</body>
</html>
