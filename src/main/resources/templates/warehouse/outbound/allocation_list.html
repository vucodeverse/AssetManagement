<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/warehouse-layout}">
<head>
    <title th:text="${pageTitle}">Danh sách Cấp phát</title>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/warehouse/warehouse.css}">
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    <header class="page-header">
        <div>
            <h1 class="page-title"><i class="fa-solid fa-truck-fast" style="margin-right:8px;"></i>Xuất kho Cấp phát</h1>
            <p class="page-subtitle">Danh sách các lệnh cấp phát tài sản cho phòng ban</p>
        </div>
    </header>

    <div class="content-wrapper">
        <div class="wh-panel">
            <div class="wh-panel-header">
                <span class="wh-panel-title"><i class="fa-solid fa-list-check"></i> Danh sách Lệnh Cấp phát</span>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Mã Lệnh</th>
                        <th>Phòng ban tiếp nhận</th>
                        <th>Ngày tạo</th>
                        <th>Trạng thái</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="alc : ${allocations}" 
                        th:onclick="|location.href='@{/wh/outbound/}${alc.handoverId}'|" 
                        style="cursor: pointer;">
                        <td th:text="${alc.handoverId}">601</td>
                        <td th:text="${alc.toDepartmentName}">Phòng Đào tạo</td>
                        <td th:text="${#temporals.format(alc.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <span th:class="${alc.status == 'PENDING' ? 'badge badge-in-use' : 'badge badge-completed'}" 
                                  th:text="${alc.status}">PENDING</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</body>
</html>
