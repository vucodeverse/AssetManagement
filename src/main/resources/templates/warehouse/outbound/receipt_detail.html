<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/warehouse-layout}">
<head>
    <title th:text="${pageTitle}"></title>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/warehouse/warehouse.css}">
        <style>
            .receipt-header-card {
                background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
                color: white;
                border-radius: 12px;
                padding: 2rem;
                margin-bottom: 2rem;
            }
            .receipt-meta-item {
                background: rgba(255,255,255,0.1);
                border-radius: 8px;
                padding: 0.75rem 1.25rem;
                display: inline-flex;
                flex-direction: column;
                gap: 0.25rem;
            }
            .receipt-meta-label {
                font-size: 0.7rem;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                opacity: 0.7;
            }
            .receipt-meta-value {
                font-weight: 700;
                font-size: 1rem;
            }
            .asset-group-title {
                font-size: 0.85rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: #64748b;
                padding: 0.75rem 1.5rem;
                background: #f8fafc;
                border-bottom: 1px solid #e2e8f0;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    <header class="page-header">
        <div>
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px;">
                <a th:href="@{'/wh/outbound/' + ${receipt.assetHandoverId}}" style="color:#64748b;">
                    <i class="fa-solid fa-arrow-left"></i> Quay lại Tổng quan
                </a>
                <span style="color:#cbd5e1;">/</span>
                <span style="color:#94a3b8;" th:text="${receipt.receiptNo}"></span>
            </div>
            <h1 class="page-title">Chi tiết Phiếu xuất kho</h1>
            <p class="page-subtitle">Mã phiếu: <strong th:text="${receipt.receiptNo}"></strong></p>
        </div>
    </header>

    <div class="content-wrapper">

        <!-- THÔNG TIN PHIẾU -->
        <div class="receipt-header-card">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem;">
                <div>
                    <div style="font-size:0.8rem; opacity:0.7; margin-bottom:0.25rem;">SỐ PHIẾU</div>
                    <div style="font-size:1.75rem; font-weight:800;" th:text="${receipt.receiptNo}"></div>
                </div>
                <span style="background:rgba(168,85,247,0.3); color:#e9d5ff; padding:0.5rem 1rem; border-radius:999px; font-weight:700; font-size:0.85rem;"
                      th:text="${receipt.receiptType}"></span>
            </div>

            <div style="display:flex; flex-wrap:wrap; gap:1rem;">
                <div class="receipt-meta-item">
                    <span class="receipt-meta-label">Ngày tạo</span>
                    <span class="receipt-meta-value" th:text="${#temporals.format(receipt.createdAt, 'dd/MM/yyyy  HH:mm')}"></span>
                </div>
                <div class="receipt-meta-item">
                    <span class="receipt-meta-label">Người tạo</span>
                    <span class="receipt-meta-value" th:text="${receipt.creatorName ?: 'N/A'}"></span>
                </div>
                <div class="receipt-meta-item">
                    <span class="receipt-meta-label">Phòng ban nhận</span>
                    <span class="receipt-meta-value" th:text="${receipt.toDepartmentName ?: 'N/A'}"></span>
                </div>
                <div class="receipt-meta-item">
                    <span class="receipt-meta-label">Tổng tài sản</span>
                    <span class="receipt-meta-value" th:text="${receipt.totalQuantity} + ' tài sản'"></span>
                </div>
                <div class="receipt-meta-item" th:if="${receipt.note != null and !#strings.isEmpty(receipt.note)}">
                    <span class="receipt-meta-label">Ghi chú</span>
                    <span class="receipt-meta-value" th:text="${receipt.note}"></span>
                </div>
            </div>
        </div>

        <!-- DANH SÁCH TÀI SẢN THEO NHÓM -->
        <div class="wh-panel">
            <div class="wh-panel-header">
                <span class="wh-panel-title"><i class="fa-solid fa-boxes-stacked"></i> Danh sách tài sản xuất kho</span>
                <span class="wh-badge info" th:text="${receipt.totalQuantity} + ' tài sản'"></span>
            </div>

            <div th:if="${receipt.assetGroups.isEmpty()}" style="text-align:center; padding:4rem; color:#94a3b8;">
                <i class="fa-solid fa-box-open" style="font-size:3rem; margin-bottom:1rem; display:block;"></i>
                <p style="margin:0;">Không có tài sản nào trong phiếu này.</p>
            </div>

            <div th:each="group : ${receipt.assetGroups}">
                <div class="asset-group-title">
                    <span><i class="fa-solid fa-layer-group me-2"></i><span th:text="${group.assetTypeName}"></span></span>
                    <span class="wh-badge info" th:text="${group.quantity} + ' tài sản'"></span>
                </div>
                <table class="data-table" style="margin-bottom:0; border-bottom: 1px solid #e2e8f0;">
                    <thead>
                        <tr>
                            <th>Mã tài sản</th>
                            <th>Tên tài sản</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="asset : ${group.assets}">
                            <td>
                                <span style="font-weight:700; color:#a855f7;" th:text="${asset.assetId}"></span>
                            </td>
                            <td th:text="${asset.assetName}"></td>
                            <td>
                                <span th:class="${asset.status == 'ALLOCATED' ? 'wh-badge success' : 'wh-badge info'}"
                                      th:text="${asset.status}"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- FOOTER ACTION -->
        <div style="margin-top:2rem; display:flex; gap:1rem;">
            <a th:href="@{'/wh/outbound/' + ${receipt.assetHandoverId}}"
               style="display:inline-flex; align-items:center; gap:8px; padding:0.75rem 1.5rem; background:#f1f5f9; border-radius:8px; text-decoration:none; color:#475569; font-weight:600;">
                <i class="fa-solid fa-arrow-left"></i> Quay lại Tổng quan
            </a>
        </div>

    </div>
</th:block>
</body>
</html>
