<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Nhập kho PO - Procurex</title>
    <th:block layout:fragment="extra-css">
        <style>
            .inbound-wrapper {
                display: grid;
                grid-template-columns: 1fr 350px;
                gap: 24px;
            }

            .list-card {
                background: var(--panel);
                border-radius: var(--radius-lg);
                border: 1px solid var(--border);
                overflow: hidden;
            }

            .list-header {
                padding: 16px 20px;
                background: #f8fafc;
                border-bottom: 1px solid var(--border);
                font-weight: 700;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .po-item {
                padding: 16px 20px;
                border-bottom: 1px solid var(--border);
                cursor: pointer;
                transition: var(--transition);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .po-item:hover {
                background: #f1f5f9;
            }

            .po-item.active {
                background: #eff6ff;
                border-left: 4px solid var(--accent);
            }

            .form-side {
                background: var(--panel);
                padding: 24px;
                border-radius: var(--radius-lg);
                border: 1px solid var(--border);
                height: fit-content;
                position: sticky;
                top: 24px;
            }

            .form-group label {
                display: block;
                font-size: 13px;
                font-weight: 700;
                margin-bottom: 8px;
                color: var(--text);
            }

            .form-control {
                width: 100%;
                padding: 10px 14px;
                border: 1px solid var(--border);
                border-radius: 8px;
                font-size: 14px;
            }

            .btn-submit {
                width: 100%;
                padding: 12px;
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: 8px;
                font-weight: 700;
                margin-top: 16px;
                cursor: pointer;
            }

            .label-preview {
                margin-top: 24px;
                padding: 16px;
                border: 2px dashed #cbd5e1;
                border-radius: 8px;
                text-align: center;
                background: #fff;
            }
        </style>
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <div style="margin-bottom: 24px;">
        <h1 style="font-size: 24px; font-weight: 800;">Nhập kho Mua mới (PO Receipt)</h1>
        <p style="color: var(--muted);">Chọn đơn hàng đã phê duyệt để tiến hành nhập kho và dán nhãn tài sản.</p>
    </div>

    <div class="inbound-wrapper">
        <!-- Left: List of Pending POs -->
        <div class="list-card">
            <div class="list-header">
                <span>Danh sách PO chờ nhập</span>
                <span class="badge" th:text="${pendingPOs.size()}">0</span>
            </div>
            <div th:if="${pendingPOs.isEmpty()}" style="padding: 40px; text-align: center; color: var(--muted);">
                <i class="fa-solid fa-clipboard-check" style="font-size: 40px; margin-bottom: 12px;"></i>
                <p>Không có đơn hàng nào chờ nhập.</p>
            </div>
            <div th:each="po : ${pendingPOs}" class="po-item" 
                 th:data-po-id="${po.purchase_order_id}"
                 th:data-po-detail-id="${po.purchase_order_detail_id}"
                 th:data-type-id="${po.asset_type_id}"
                 th:data-type-name="${po.type_name}"
                 th:data-quantity="${po.quantity}"
                 onclick="handleSelectPO(this)">
                <div>
                    <div style="font-weight: 700; color: var(--accent);" th:text="'PO #' + ${po.purchase_order_id}"></div>
                    <div style="font-size: 13px; color: var(--muted);" th:text="${po.supplier_name}"></div>
                </div>
                <div style="text-align: right;">
                    <div style="font-weight: 600;" th:text="${po.type_name}"></div>
                    <div style="font-size: 12px; color: var(--muted);" th:text="'SL: ' + ${po.quantity}"></div>
                </div>
            </div>
        </div>

        <!-- Right: Process Form -->
        <div class="form-side">
            <h3 style="font-size: 16px; font-weight: 800; margin-bottom: 20px;">Xử lý nhập kho</h3>
            <form th:action="@{/warehouse/inbound/po}" method="post" id="inboundForm">
                <input type="hidden" name="purchaseOrderId" id="f_poId">
                <input type="hidden" name="purchaseOrderDetailId" id="f_poDetailId">
                <input type="hidden" name="assetTypeId" id="f_assetTypeId">
                
                <div class="form-group" style="margin-bottom: 16px;">
                    <label for="v_typeName">Loại tài sản</label>
                    <input type="text" id="v_typeName" class="form-control" readonly style="background: #f8fafc;">
                </div>

                <div class="form-group" style="margin-bottom: 16px;">
                    <label for="f_quantity">Số lượng thực nhập</label>
                    <input type="number" name="quantity" id="f_quantity" class="form-control" required min="1">
                </div>

                <div class="form-group" style="margin-bottom: 16px;">
                    <label for="f_assetNamePrefix">Tiền tố Tên Tài sản (Tùy chọn)</label>
                    <input type="text" name="assetNamePrefix" id="f_assetNamePrefix" class="form-control" placeholder="VD: Laptop Dell Kế Toán...">
                </div>

                <div class="form-group">
                    <label for="f_note">Ghi chú</label>
                    <textarea name="note" id="f_note" class="form-control" rows="3" placeholder="Nhập ghi chú nếu có..."></textarea>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-arrow-down-to-bracket"></i> Xác nhận & In tem nhãn
                </button>
            </form>

            <div id="printPreview" class="label-preview" style="display: none;">
                <p style="font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;">Mẫu tem nhãn (Simulated)</p>
                <div style="margin: 10px 0;">
                     <i class="fa-solid fa-qrcode" style="font-size: 64px;"></i>
                </div>
                <div id="p_assetTag" style="font-weight: 800; font-size: 14px;">#AST-TEMP-001</div>
                <button onclick="window.print()" style="margin-top: 10px; background: none; border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;">
                    <i class="fa-solid fa-print"></i> In tem
                </button>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="extra-js">
    <script>
        function handleSelectPO(el) {
            const poId = el.getAttribute('data-po-id');
            const poDetailId = el.getAttribute('data-po-detail-id');
            const typeId = el.getAttribute('data-type-id');
            const typeName = el.getAttribute('data-type-name');
            const qty = el.getAttribute('data-quantity');
            selectPO(poId, poDetailId, typeId, typeName, qty);
        }

        function selectPO(poId, poDetailId, typeId, typeName, qty) {
            document.querySelectorAll('.po-item').forEach(el => el.classList.remove('active'));
            // Find the element
            const activeEl = document.querySelector(`.po-item[data-po-detail-id="${poDetailId}"]`);
            if (activeEl) activeEl.classList.add('active');

            document.getElementById('f_poId').value = poId;
            document.getElementById('f_poDetailId').value = poDetailId;
            document.getElementById('f_assetTypeId').value = typeId;
            document.getElementById('v_typeName').value = typeName;
            document.getElementById('f_quantity').value = qty;

            // Show preview
            document.getElementById('printPreview').style.display = 'block';
            document.getElementById('p_assetTag').innerText = 'PO-' + poId + ' / ' + typeName;
        }

        // Handle form submission with a small loading effect
        document.getElementById('inboundForm').onsubmit = function() {
            if (!document.getElementById('f_poId').value) {
                alert('Vui lòng chọn một đơn hàng từ danh sách.');
                return false;
            }
            return true;
        };
    </script>
</th:block>
</body>
</html>
