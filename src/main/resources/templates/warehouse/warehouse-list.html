<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Danh Sách Kho</title>
</head>

<body>
    <h1>Quản Lý Các Kho (Warehouses)</h1>
    <a href="/warehouse/warehouses/create">Thêm Kho Mới</a>
    <hr />

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Tên Kho</th>
                <th>Địa Chỉ</th>
                <th>Quản lý ID</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="w : ${warehouses}">
                <td th:text="${w.id}"></td>
                <td th:text="${w.name}"></td>
                <td th:text="${w.address}"></td>
                <td th:text="${w.managerUserId}"></td>
                <td th:text="${w.status}"></td>
                <td>
                    <a th:href="@{/warehouse/warehouses/edit/{id}(id=${w.id})}">Sửa</a> |
                    <a th:href="@{/wh/{id}(id=${w.id})}">Vào Dashboard Kho Này</a> |
                    <a th:href="@{/warehouse/zones/warehouse/{id}(id=${w.id})}">Quản Lý Vùng (Zone)</a>
                </td>
            </tr>
            <tr th:if="${warehouses.empty}">
                <td colspan="6">Không có dữ liệu Kho nào trong hệ thống.</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
