<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/manager-layout}">

<head>
    <title>Quản lý Kho hàng</title>
</head>

<body>
    <th:block layout:fragment="content">

        <h1>QUẢN LÝ KHO HÀNG</h1>

        <!-- Thông báo -->
        <div th:if="${successMessage}">
            <p th:text="${successMessage}" style="color:green;"></p>
        </div>
        <div th:if="${errorMessage}">
            <p th:text="${errorMessage}" style="color:red;"></p>
        </div>

        <!-- Nút thêm mới -->
        <p>
            <a href="/warehouses/add">+ Thêm kho mới</a>
        </p>

        <!-- Bảng danh sách -->
        <table border="1" cellpadding="6" cellspacing="0">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên kho</th>
                    <th>Địa chỉ</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="w : ${warehouses}">
                    <td th:text="${w.id}"></td>
                    <td th:text="${w.name}"></td>
                    <td th:text="${w.address}"></td>
                    <td th:text="${w.status}"></td>
                    <td>
                        <!-- Xem chi tiết -->
                        <a th:href="@{'/warehouses/' + ${w.id}}">Chi tiết</a>
                        |
                        <!-- Chỉnh sửa -->
                        <a th:href="@{'/warehouses/' + ${w.id} + '/edit'}">Sửa</a>
                        |
                        <!-- Đổi trạng thái -->
                        <form th:if="${w.active}" th:action="@{'/warehouses/' + ${w.id} + '/deactive'}" method="post"
                            style="display:inline;" onsubmit="return confirm('Vô hiệu hóa kho này?')">
                            <button type="submit">Vô hiệu hóa</button>
                        </form>
                        <form th:unless="${w.active}" th:action="@{'/warehouses/' + ${w.id} + '/active'}" method="post"
                            style="display:inline;" onsubmit="return confirm('Kích hoạt kho này?')">
                            <button type="submit">Kích hoạt</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(warehouses)}">
                    <td colspan="5" style="text-align:center;">Chưa có kho hàng nào</td>
                </tr>
            </tbody>
        </table>

    </th:block>
</body>

</html>
