<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Danh Sách Phiếu Kho</title>
</head>

<body>
    <h1>Danh Sách Phiếu Nhập/Xuất (Warehouse ID: <span th:text="${warehouseId}"></span>)</h1>
    <a th:href="@{/wh/{id}(id=${warehouseId})}">Quay lại Dashboard Kho</a>
    <hr />

    <a th:href="@{/warehouse/tickets/create(warehouseId=${warehouseId})}">Tạo Phiếu Mới</a>
    <br /><br />

    <table border="1">
        <thead>
            <tr>
                <th>Ticket ID</th>
                <th>Loại (IN/OUT)</th>
                <th>Lý do (Ref)</th>
                <th>Trạng thái</th>
                <th>Người tạo (ID)</th>
                <th>Ngày tạo</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="t : ${tickets}">
                <td th:text="${t.id}"></td>
                <td th:text="${t.ticketType}"></td>
                <td th:text="${t.ticketRef}"></td>
                <td th:text="${t.status}"></td>
                <td th:text="${t.createdBy}"></td>
                <td th:text="${#temporals.format(t.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                <td>
                    <a th:href="@{/warehouse/tickets/{id}(id=${t.id})}">Xem chi tiết</a> |
                    <a th:href="@{/warehouse/qc-history/ticket/{id}(id=${t.id})}">Lịch sử QC</a>
                </td>
            </tr>
            <tr th:if="${tickets.empty}">
                <td colspan="7">Không có phiếu nào trong kho.</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
