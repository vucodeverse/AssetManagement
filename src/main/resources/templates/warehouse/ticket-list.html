<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/warehouse-layout}">

<head>
    <title>Danh sách Phiếu Kho</title>
</head>

<body>
    <th:block layout:fragment="content">

        <h1>QUẢN LÝ PHIẾU KHO</h1>

        <!-- Thông báo -->
        <div th:if="${successMessage}">
            <p th:text="${successMessage}" style="color:green;"></p>
        </div>
        <div th:if="${errorMessage}">
            <p th:text="${errorMessage}" style="color:red;"></p>
        </div>

        <!-- Nút thêm mới -->
        <p>
            <a th:href="@{'/wh/' + ${userId} + '/tickets/add'}">+ Tạo Phiếu Mới</a>
            |
            <a th:href="@{'/wh/' + ${userId}}">Quay lại Dashboard</a>
        </p>

        <!-- Bảng danh sách -->
        <table border="1" cellpadding="6" cellspacing="0">
            <thead>
                <tr>
                    <th>ID Phiếu</th>
                    <th>Loại Phiếu</th>
                    <th>Trạng Thái</th>
                    <th>Ngày Tạo</th>
                    <th>Ngày Hoàn Thành</th>
                    <th>Hành Động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="t : ${tickets}">
                    <td th:text="${t.id}"></td>
                    <td th:text="${t.ticketType}"></td>
                    <td th:text="${t.status}"></td>
                    <td th:text="${#temporals.format(t.createdAt, 'dd-MM-yyyy HH:mm')}"></td>
                    <td th:text="${t.completedAt != null ? #temporals.format(t.completedAt, 'dd-MM-yyyy HH:mm') : ''}">
                    </td>
                    <td>
                        <a th:href="@{'/wh/' + ${userId} + '/tickets/' + ${t.id}}">Chi tiết</a>

                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(tickets)}">
                    <td colspan="6" style="text-align:center;">Chưa có phiếu kho nào</td>
                </tr>
            </tbody>
        </table>

    </th:block>
</body>

</html>
