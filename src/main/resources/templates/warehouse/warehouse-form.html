<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Form Quản Lý Kho</title>
</head>

<body>
    <h1 th:text="${warehouse == null ? 'Tạo Kho Mới' : 'Cập Nhật Kho'}"></h1>
    <a href="/warehouse/warehouses/list">Quay Lại Danh Sách</a>
    <hr />

    <form
        th:action="@{${warehouse == null ? '/warehouse/warehouses/create' : '/warehouse/warehouses/edit/' + warehouse.id}}"
        method="post">

        <div th:if="${warehouse != null}">
            <label>ID Kho:</label>
            <input type="number" name="id" th:value="${warehouse.id}" readonly />
            <br /><br />
        </div>

        <div>
            <label>Tên Kho:</label>
            <input type="text" name="name" th:value="${warehouse != null ? warehouse.name : ''}" required />
        </div>
        <br />

        <div>
            <label>Địa Chỉ:</label>
            <input type="text" name="address" th:value="${warehouse != null ? warehouse.address : ''}" required />
        </div>
        <br />

        <div>
            <label>ID Quản Lý Kho (User ID):</label>
            <input type="number" name="managerUserId" th:value="${warehouse != null ? warehouse.managerUserId : ''}"
                required />
        </div>
        <br />

        <div th:if="${warehouse != null}">
            <label>Trạng Thái:</label>
            <select name="status">
                <option value="ACTIVE" th:selected="${warehouse.status == 'ACTIVE'}">Mở Cửa (ACTIVE)</option>
                <option value="INACTIVE" th:selected="${warehouse.status == 'INACTIVE'}">Đóng Cửa (INACTIVE)</option>
            </select>
            <br /><br />
        </div>

        <button type="submit" th:text="${warehouse == null ? 'Tạo Mới' : 'Lưu Thay Đổi'}"></button>
    </form>
</body>

</html>
