<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/manager-layout}">

<head>
    <title th:text="${mode == 'update'} ? 'Cập nhật Kho hàng' : 'Thêm mới Kho hàng'">Form Kho hàng</title>
</head>

<body>
    <th:block layout:fragment="content">

        <h1 th:text="${mode == 'update'} ? 'CẬP NHẬT KHO HÀNG' : 'THÊM MỚI KHO HÀNG'">Form kho</h1>

        <!-- Lỗi chung -->
        <div th:if="${errorMessage}">
            <p th:text="${errorMessage}" style="color:red;"></p>
        </div>

        <form th:action="${mode == 'create'} ? @{/warehouses/add} : @{'/warehouses/' + ${warehouseId} + '/edit'}"
            th:object="${warehouse}" method="post">

            <!-- ID (chỉ hiển thị ở mode update) -->
            <div th:if="${mode == 'update'}">
                <label>ID Kho:</label>
                <input type="text" th:value="${warehouseId}" readonly />
            </div>

            <!-- Tên kho -->
            <div>
                <label for="name">Tên kho <span style="color:red;">*</span></label><br />
                <input type="text" id="name" th:field="*{name}" placeholder="Nhập tên kho" />
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></span>
            </div>

            <br />

            <!-- Địa chỉ -->
            <div>
                <label for="address">Địa chỉ <span style="color:red;">*</span></label><br />
                <textarea id="address" th:field="*{address}" rows="3" cols="40"
                    placeholder="Nhập địa chỉ kho"></textarea>
                <span th:if="${#fields.hasErrors('address')}" th:errors="*{address}" style="color:red;"></span>
            </div>

            <br />

            <!-- Người quản lý -->
            <div>
                <label for="managerUserId">Người quản lý <span style="color:red;">*</span></label><br />
                <select id="managerUserId" th:field="*{managerUserId}">
                    <option value="">-- Chọn người quản lý --</option>
                    <option th:each="entry : ${staffUsers}" th:value="${entry.key}" th:text="${entry.value}">
                    </option>
                </select>
                <span th:if="${#fields.hasErrors('managerUserId')}" th:errors="*{managerUserId}"
                    style="color:red;"></span>
            </div>

            <br />

            <!-- Nút hành động -->
            <div>
                <button type="submit" th:text="${mode == 'update'} ? 'Cập nhật' : 'Thêm mới'">Lưu</button>
                <a href="/warehouses">Hủy</a>
            </div>

        </form>

    </th:block>
</body>

</html>
