<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Chi Tiết Kiểm Kê (Audit)</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <style>
        body {
            background-color: #f4f7f6;
        }

        .sidebar {
            height: 100vh;
            width: 240px;
            position: fixed;
            top: 0;
            left: 0;
            background: #212529;
            color: white;
            padding-top: 20px;
            z-index: 1000;
        }

        .sidebar a {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #343a40;
            color: white;
        }

        .sidebar a.active {
            background: #007bff;
            color: white;
            font-weight: bold;
        }

        .content {
            margin-left: 250px;
            padding: 30px;
        }

        .header-title {
            color: #007bff;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .info-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h4 class="text-center mb-4">Warehouse Panel</h4>
        <a href="/warehouse/warehouses/list">Quản lý kho</a>
        <a th:href="@{/warehouse/audits/warehouse/{id}(id=${audit.warehouseId})}" class="active">Kỳ Kiểm Kê</a>
    </div>

    <div class="content" th:if="${audit != null}">
        <a th:href="@{/warehouse/audits/warehouse/{id}(id=${audit.warehouseId})}"
            class="btn btn-sm btn-secondary mb-3"><i class="fas fa-arrow-left"></i> Quay lại DS Kiểm Kê</a>
        <h1 class="header-title">Thực Hiện Kiểm Kê - Phiên #<span th:text="${audit.id}"></span></h1>
        <hr />

        <div class="row mb-5">
            <div class="col-md-5">
                <div class="info-card h-100">
                    <h5 class="border-bottom pb-2">Thông Tin Kỳ Kiểm Kê</h5>
                    <p><strong>Ngày tạo:</strong> <span
                            th:text="${#temporals.format(audit.auditDate, 'dd/MM/yyyy')}"></span></p>
                    <p>
                        <strong>Trạng Thái:</strong>
                        <span class="badge badge-dark" th:text="${audit.status}"></span>
                    </p>
                    <p><strong>Người Tạo/Kiểm tra (ID):</strong> <span th:text="${audit.auditorId}"></span></p>
                    <p><strong>Ghi chú:</strong> <span th:text="${audit.notes}"></span></p>

                    <form th:action="@{/warehouse/audits/edit/{id}(id=${audit.id})}" method="post" class="mt-3"
                        th:if="${audit.status != 'COMPLETED'}">
                        <input type="hidden" name="warehouseId" th:value="${audit.warehouseId}" />
                        <input type="hidden" name="auditorId" th:value="${audit.auditorId}" />
                        <input type="hidden" name="notes" th:value="${audit.notes}" />

                        <div class="form-group">
                            <label>Cập nhật trạng thái:</label>
                            <select name="status" class="form-control form-control-sm d-inline-block w-auto mr-2">
                                <option value="IN_PROGRESS" th:selected="${audit.status == 'IN_PROGRESS'}">IN PROGRESS
                                </option>
                                <option value="COMPLETED" th:selected="${audit.status == 'COMPLETED'}">COMPLETED
                                </option>
                                <option value="CANCELLED" th:selected="${audit.status == 'CANCELLED'}">CANCELLED
                                </option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-primary">Cập Nhật</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-md-7">
                <div class="info-card h-100">
                    <h5 class="border-bottom pb-2">Quét Mã / Thêm Kết Quả</h5>
                    <form th:action="@{/warehouse/audit-scans/create}" method="post"
                        th:if="${audit.status != 'COMPLETED'}">
                        <input type="hidden" name="auditId" th:value="${audit.id}" />
                        <div class="row">
                            <div class="col-md-4 form-group">
                                <label>Asset ID</label>
                                <input type="number" name="assetId" class="form-control" required />
                            </div>
                            <div class="col-md-4 form-group">
                                <label>Zone Đã Quét ID</label>
                                <input type="number" name="scannedZoneId" class="form-control" required />
                            </div>
                            <div class="col-md-4 form-group">
                                <label>Trạng Thái Tài Sản</label>
                                <select name="status" class="form-control">
                                    <option value="GOOD">TỐT (GOOD)</option>
                                    <option value="DAMAGED">HƯ HỎNG (DAMAGED)</option>
                                    <option value="MISSING">MẤT MÁT (MISSING)</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Mô tả tình trạng</label>
                            <input type="text" name="notes" class="form-control" />
                        </div>
                        <button type="submit" class="btn btn-success"><i class="fas fa-barcode"></i> Ghi Nhận Scanned
                            Asset</button>
                    </form>

                    <div th:if="${audit.status == 'COMPLETED'}" class="alert alert-info mt-3">
                        Kỳ kiểm kê đã hoàn tất. Không thể thêm bản ghi quét mới.
                    </div>
                </div>
            </div>
        </div>

        <!-- Dữ liệu quét hiện tại sẽ được tải bằng iframe hoặc Ajax, hiện tại ta để nút chuyển -->
        <a th:href="@{/warehouse/audit-scans/audit/{id}(id=${audit.id})}" class="btn btn-outline-primary btn-block p-3">
            Duyệt Danh Sách Các Tài Sản Đã Quét <i class="fas fa-arrow-right ml-2"></i>
        </a>

    </div>
</body>

</html>
