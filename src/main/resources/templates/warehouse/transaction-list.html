<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Lịch Sử Thẻ Kho (Transactions)</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <style>
        body {
            background-color: #f4f7f6;
        }

        .sidebar {
            height: 100vh;
            width: 240px;
            position: fixed;
            top: 0;
            left: 0;
            background: #212529;
            color: white;
            padding-top: 20px;
            z-index: 1000;
        }

        .sidebar a {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #343a40;
            color: white;
        }

        .sidebar a.active {
            background: #007bff;
            color: white;
            font-weight: bold;
        }

        .content {
            margin-left: 250px;
            padding: 30px;
        }

        .header-title {
            color: #007bff;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h4 class="text-center mb-4">Warehouse Panel</h4>
        <a href="/warehouse/warehouses/list">Quản lý kho</a>
        <a href="#" class="active">Lịch Sử Giao Dịch (Log)</a>
    </div>

    <div class="content">
        <button onclick="window.history.back()" class="btn btn-sm btn-secondary mb-3"><i class="fas fa-arrow-left"></i>
            Quay lại</button>
        <h1 class="header-title">Lịch Sử Giao Dịch (Transaction Log)</h1>
        <hr />

        <div class="row">
            <div class="col-lg-12">
                <table class="table table-bordered table-striped shadow-sm bg-white">
                    <thead class="thead-dark">
                        <tr>
                            <th>Transaction ID</th>
                            <th>Asset ID</th>
                            <th>Asset Type ID</th>
                            <th>Ticket ID</th>
                            <th>Loại GD</th>
                            <th>Số lượng / Biến động</th>
                            <th>Zone Từ</th>
                            <th>Zone Đến</th>
                            <th>Ngày GD</th>
                            <th>Ghi chú</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tx : ${transactions}">
                            <td th:text="${tx.id}"></td>
                            <td th:text="${tx.assetId}"></td>
                            <td th:text="${tx.assetTypeId}"></td>
                            <td>
                                <a th:href="@{/warehouse/tickets/{id}(id=${tx.ticketId})}"
                                    th:text="|#${tx.ticketId}|"></a>
                            </td>
                            <td>
                                <span th:if="${tx.transactionType == 'IN'}" class="badge badge-success">NHẬP (IN)</span>
                                <span th:if="${tx.transactionType == 'OUT'}" class="badge badge-warning">XUẤT
                                    (OUT)</span>
                                <span th:if="${tx.transactionType == 'MOVE'}" class="badge badge-info">CHUYỂN
                                    ZONE</span>
                            </td>
                            <td><strong th:text="${tx.quantityChange}"></strong></td>
                            <td th:text="${tx.fromZoneId != null ? tx.fromZoneId : '-'}"></td>
                            <td th:text="${tx.toZoneId != null ? tx.toZoneId : '-'}"></td>
                            <td th:text="${#temporals.format(tx.transactionDate, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${tx.notes != null ? tx.notes : '-'}"></td>
                        </tr>
                        <tr th:if="${transactions == null or transactions.empty}">
                            <td colspan="10" class="text-center">Xin lỗi, chưa có giao dịch nào được ghi nhận.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
