<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/warehouse-layout}">

<head>
    <title th:text="${mode == 'update'} ? 'Cập nhật Khu vực' : 'Thêm mới Khu vực'">Form Khu vực</title>
</head>

<body>
    <th:block layout:fragment="content">

        <h1 th:text="${mode == 'update'} ? 'CẬP NHẬT KHU VỰC LƯU TRỮ' : 'THÊM MỚI KHU VỰC LƯU TRỮ'">Form Zone</h1>

        <!-- Lỗi chung -->
        <div th:if="${errorMessage}">
            <p th:text="${errorMessage}" style="color:red;"></p>
        </div>

        <form th:action="${mode == 'create'}
                ? @{'/wh/' + ${userId} + '/zones/add'}
                : @{'/wh/' + ${userId} + '/zones/' + ${zoneId} + '/edit'}" th:object="${zone}" method="post">

            <!-- ID (chỉ hiển thị ở mode update) -->
            <div th:if="${mode == 'update'}">
                <label>ID Khu vực:</label>
                <input type="text" th:value="${zoneId}" readonly />
            </div>



            <!-- Tên khu vực -->
            <div>
                <label for="name">Tên khu vực <span style="color:red;">*</span></label><br />
                <input type="text" id="name" th:field="*{name}" placeholder="Nhập tên khu vực" />
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></span>
            </div>

            <br />



            <!-- Sức chứa tối đa -->
            <div>
                <label for="maxCapacity">Sức chứa tối đa <span style="color:red;">*</span></label><br />
                <input type="number" id="maxCapacity" th:field="*{maxCapacity}" min="1"
                    placeholder="Nhập sức chứa tối đa" />
                <span th:if="${#fields.hasErrors('maxCapacity')}" th:errors="*{maxCapacity}" style="color:red;"></span>
            </div>

            <br />

            <!-- Nút hành động -->
            <div>
                <button type="submit" th:text="${mode == 'update'} ? 'Cập nhật' : 'Thêm mới'">Lưu</button>
                <a th:href="@{'/wh/' + ${userId} + '/zones'}">Hủy</a>
            </div>

        </form>

    </th:block>
</body>

</html>
