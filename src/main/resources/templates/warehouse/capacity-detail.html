<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Thông Báo</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <style>
        body {
            background-color: #f4f7f6;
            padding: 50px;
        }

        .card {
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="card text-center">
        <h3 class="text-info mb-4">Dữ Liệu Capacity</h3>
        <div th:if="${capacity != null}">
            <p><strong>Loại tài sản ID:</strong> <span th:text="${capacity.assetTypeId}"></span></p>
            <p><strong>Hệ số quy đổi sức chứa:</strong> <span th:text="${capacity.capacityUnits}"></span> đơn vị/tài sản
            </p>
        </div>
        <div th:if="${capacity == null}">
            <div class="alert alert-warning">
                Chưa có thông tin hệ số sức chứa cho loại tài sản này.
            </div>
        </div>
        <a href="#" onclick="window.history.back()" class="btn btn-secondary mt-3">Quay Lại</a>
    </div>
</body>

</html>
