<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Sổ cái Giao dịch Kho</title>
    <th:block layout:fragment="extra-css">
        <style>
            .ledger-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 24px;
            }

            .ledger-header h1 {
                font-size: 24px;
                font-weight: 800;
                color: var(--accent);
            }

            .ledger-card {
                background: var(--panel);
                border-radius: var(--radius-lg);
                border: 1px solid var(--border);
                overflow: hidden;
                box-shadow: var(--shadow-sm);
            }

            .ledger-table {
                width: 100%;
                border-collapse: collapse;
            }

            .ledger-table th {
                background: #f8fafc;
                padding: 16px 20px;
                text-align: left;
                font-size: 12px;
                font-weight: 700;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.05em;
                border-bottom: 1px solid var(--border);
            }

            .ledger-table td {
                padding: 16px 20px;
                border-bottom: 1px solid var(--border);
                font-size: 14px;
                color: var(--text);
            }

            .type-badge {
                display: inline-block;
                padding: 4px 10px;
                border-radius: 20px;
                font-size: 11px;
                font-weight: 800;
                text-transform: uppercase;
            }

            .type-in { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
            .type-out { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

            .asset-cell {
                display: flex;
                flex-direction: column;
            }

            .asset-id {
                font-size: 11px;
                color: var(--muted);
                font-weight: 600;
            }

            .user-cell {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .user-avatar {
                width: 24px;
                height: 24px;
                background: #e2e8f0;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 10px;
                font-weight: 700;
                color: #475569;
            }

            .btn-doc {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 6px 12px;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 6px;
                font-size: 12px;
                font-weight: 600;
                color: var(--text);
                text-decoration: none;
                transition: var(--transition);
            }

            .btn-doc:hover {
                background: var(--accent);
                color: #fff;
                border-color: var(--accent);
            }
        </style>
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <div class="ledger-header">
        <div>
            <h1>Sổ cái Giao dịch</h1>
            <p style="color: var(--muted); font-size: 14px;">Nhật ký chi tiết các biến động tài sản trong kho hệ thống.</p>
        </div>
        <div class="actions">
            <button class="btn-doc"><i class="fa-solid fa-file-export"></i> Xuất Báo cáo</button>
        </div>
    </div>

    <div class="ledger-card">
        <table class="ledger-table">
            <thead>
                <tr>
                    <th>Thời gian</th>
                    <th>Tài sản</th>
                    <th>Loại</th>
                    <th>Vị trí</th>
                    <th>Người thực hiện</th>
                    <th>Chứng từ gốc</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="tx : ${recentActivity}">
                    <td th:text="${#temporals.format(tx.executedAt, 'dd/MM/yyyy HH:mm')}">18/03/2024 10:30</td>
                    <td>
                        <div class="asset-cell">
                            <span style="font-weight: 700;" th:text="${tx.assetName}">Dell Latitude</span>
                            <span class="asset-id" th:text="'ID: ' + ${tx.assetId}">ID: 101</span>
                        </div>
                    </td>
                    <td>
                        <span class="type-badge" 
                              th:classappend="${tx.transactionType == 'INBOUND' ? 'type-in' : 'type-out'}"
                              th:text="${tx.transactionType}">INBOUND</span>
                    </td>
                    <td style="font-weight: 600;" th:text="${tx.zoneName}">ZONE A-01</td>
                    <td>
                        <div class="user-cell">
                            <div class="user-avatar" th:text="${#strings.substring(tx.executedByName, 0, 1)}">A</div>
                            <span th:text="${tx.executedByName}">Admin User</span>
                        </div>
                    </td>
                    <td>
                        <a th:if="${tx.referenceType == 'PO'}" th:href="@{/purchase/order/view/{id}(id=${tx.referenceId})}" class="btn-doc">
                            <i class="fa-solid fa-file-invoice"></i> PO #<span th:text="${tx.referenceId}"></span>
                        </a>
                        <a th:if="${tx.referenceType == 'RETURN'}" th:href="@{/purchase/return/view/{id}(id=${tx.referenceId})}" class="btn-doc">
                            <i class="fa-solid fa-rotate-left"></i> RT #<span th:text="${tx.referenceId}"></span>
                        </a>
                        <a th:if="${tx.referenceType == 'ALLOCATION'}" th:href="@{/purchase/allocation/view/{id}(id=${tx.referenceId})}" class="btn-doc">
                            <i class="fa-solid fa-truck-ramp-box"></i> AL #<span th:text="${tx.referenceId}"></span>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
