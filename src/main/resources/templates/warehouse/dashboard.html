<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/warehouse-layout}">
<head>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/warehouse/warehouse.css}">
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    <header class="page-header">
        <div>
            <h1 class="page-title"><i class="fa-solid fa-chart-line" style="margin-right:8px;"></i>Tổng quan Kho</h1>
            <p class="page-subtitle">Theo dõi trạng thái vận hành và sức chứa thời gian thực</p>
        </div>
    </header>

    <div class="content-wrapper">
        <!-- Dashboard Widgets -->
        <div class="stat-cards">
            <div class="stat-card">
                <div class="stat-card-icon blue"><i class="fa-solid fa-file-invoice"></i></div>
                <div>
                    <div class="stat-card-value" th:text="${dashboard.pendingInboundPO}">0</div>
                    <div class="stat-card-label">PO Chờ Nhập</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon yellow"><i class="fa-solid fa-rotate-left"></i></div>
                <div>
                    <div class="stat-card-value" th:text="${dashboard.pendingInboundReturn}">0</div>
                    <div class="stat-card-label">Thu hồi Chờ Nhập</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon purple"><i class="fa-solid fa-truck-ramp-box"></i></div>
                <div>
                    <div class="stat-card-value" th:text="${dashboard.pendingOutboundAllocation}">0</div>
                    <div class="stat-card-label">Lệnh Chờ Xuất</div>
                </div>
            </div>
        </div>

        <div class="wh-layout" style="grid-template-columns: 1fr 350px;">
            <!-- Capacity Heatmap -->
            <div class="wh-panel">
                <div class="wh-panel-header">
                    <span class="wh-panel-title"><i class="fa-solid fa-map"></i> Bản đồ Sức chứa (Heatmap)</span>
                </div>
                <div style="padding: 1.5rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem;">
                    <div th:each="zone : ${dashboard.capacityHeatmap}" class="zone-heatmap-item" 
                         style="border: 1px solid #e5e7eb; border-radius: 8px; padding: 1rem; background: #fff;">
                        <div style="font-weight: 700; margin-bottom: 0.5rem;" th:text="${zone.zoneName}">A-01</div>
                        <div class="capacity-bar-wrap" th:with="pct=${zone.fillPercentage}">
                             <div class="capacity-bar" style="height: 8px;"
                                  th:classappend="${pct == 0 ? 'fill-empty' : (pct < 50 ? 'fill-low' : (pct < 85 ? 'fill-mid' : 'fill-high'))}">
                                <div class="capacity-bar-fill" th:style="'width:' + ${pct} + '%'"></div>
                            </div>
                            <span style="font-size: 0.75rem; color: #6b7280;" th:text="${pct} + '%'"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="wh-panel">
                <div class="wh-panel-header">
                    <span class="wh-panel-title"><i class="fa-solid fa-clock-rotate-left"></i> Hoạt động Gần đây</span>
                </div>
                <div class="activity-list" style="padding: 1rem;">
                    <div th:each="act : ${dashboard.recentActivities}" style="padding: 0.75rem 0; border-bottom: 1px solid #f3f4f6;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span th:class="${act.transactionType == 'INBOUND' ? 'text-green' : 'text-orange'}" 
                                  style="font-weight: 600; font-size: 0.85rem;" th:text="${act.transactionType}"></span>
                            <span style="font-size: 0.7rem; color: #9ca3af;" th:text="${#temporals.format(act.executedAt, 'HH:mm dd/MM')}"></span>
                        </div>
                        <div style="font-size: 0.85rem; margin-top: 2px;" th:text="${act.assetName}"></div>
                        <div style="font-size: 0.75rem; color: #6b7280;">Kệ: <span th:text="${act.zoneName}"></span> | <span th:text="${act.executedBy}"></span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
