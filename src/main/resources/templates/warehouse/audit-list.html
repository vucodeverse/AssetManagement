<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Danh Sách Kiểm Kê</title>
</head>

<body>
    <h1>Danh Sách Kiểm Kê - Kho ID: <span th:text="${warehouseId}"></span></h1>
    <a th:href="@{/wh/{id}(id=${warehouseId})}">Quay Về Dashboard</a>
    <hr />

    <h2>Tạo Phiên Kiểm Kê Mới</h2>
    <form th:action="@{/warehouse/audits/create}" method="post">
        <input type="hidden" name="warehouseId" th:value="${warehouseId}" />

        <label>Zone ID cần kiểm:</label>
        <input type="number" name="zoneId" required /> <br /><br />

        <label>ID Người Kiểm Kê (Auditor):</label>
        <input type="number" name="auditorId" required /> <br /><br />

        <label>Ghi chú mục đích:</label>
        <input type="text" name="note" /> <br /><br />

        <button type="submit">Bắt Đầu Đợt Kiểm Mới</button>
    </form>

    <hr />
    <h2>Các Phiên Kiểm Kê</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Audit ID</th>
                <th>Zone ID</th>
                <th>Ngày Bắt Đầu</th>
                <th>Trạng Thái</th>
                <th>Người Kiểm Kê ID</th>
                <th>Ghi Chú</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="a : ${audits}">
                <td th:text="${a.id}"></td>
                <td th:text="${a.zoneId}"></td>
                <td th:text="${#temporals.format(a.startTime, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${a.status}"></td>
                <td th:text="${a.auditorId}"></td>
                <td th:text="${a.note}"></td>
                <td><a th:href="@{/warehouse/audits/{id}(id=${a.id})}">Quét thiết bị / Chi tiết Audit</a></td>
            </tr>
            <tr th:if="${audits.empty}">
                <td colspan="7">Không có phiên kiểm kê nào trong kho.</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
