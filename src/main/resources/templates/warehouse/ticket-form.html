<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tạo Phiếu Mới</title>
</head>

<body>
    <h1>Tạo Phiếu Nhập/Xuất Mới</h1>
    <a th:href="@{/warehouse/tickets/warehouse/{id}(id=${param.warehouseId})}">Hủy & Quay lại</a>
    <hr />

    <form th:action="@{/warehouse/tickets/create}" method="post">
        <div>
            <label>Kho ID:</label>
            <input type="number" name="warehouseId" th:value="${param.warehouseId}" readonly required />
        </div>
        <br />

        <div>
            <label>Loại Phiếu (Ticket Type):</label>
            <select name="ticketType" required>
                <option value="IN">Nhập Kho (IN)</option>
                <option value="OUT">Xuất Kho (OUT)</option>
            </select>
        </div>
        <br />

        <div>
            <label>Lý Do (Ticket Ref):</label>
            <select name="ticketRef" required>
                <option value="RETURN">Thu hồi tài sản về kho (RETURN)</option>
                <option value="TRANSFER">Điều chuyển (TRANSFER)</option>
                <option value="ALLOCATION">Cấp phát tài sản (ALLOCATION)</option>
                <option value="OTHER">Khác (OTHER)</option>
            </select>
        </div>
        <br />

        <div>
            <label>Người tạo (ID User):</label>
            <input type="number" name="createdBy" required />
        </div>
        <br />

        <div>
            <label>Ghi chú Phiếu:</label>
            <input type="text" name="note" />
        </div>
        <br />

        <h3>Chi Tiết Tài Sản (Dự kiến)</h3>
        <table border="1" id="detail-table">
            <thead>
                <tr>
                    <th>Asset Type ID</th>
                    <th>Số lượng dự kiến</th>
                    <th>Ghi chú</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dòng 1 -->
                <tr>
                    <td><input type="number" name="details[0].assetTypeId" required /></td>
                    <td><input type="number" name="details[0].expectedQuantity" value="1" min="1" required /></td>
                    <td><input type="text" name="details[0].note" /></td>
                </tr>
                <!-- Dòng 2 -->
                <tr>
                    <td><input type="number" name="details[1].assetTypeId" /></td>
                    <td><input type="number" name="details[1].expectedQuantity" /></td>
                    <td><input type="text" name="details[1].note" /></td>
                </tr>
                <!-- Dòng 3 -->
                <tr>
                    <td><input type="number" name="details[2].assetTypeId" /></td>
                    <td><input type="number" name="details[2].expectedQuantity" /></td>
                    <td><input type="text" name="details[2].note" /></td>
                </tr>
            </tbody>
        </table>
        <i>* Hệ thống tạm thời cho phép nhập tối đa 3 loại tài sản trong 1 Phiếu. Bỏ trống Asset Type ID nếu không
            dùng.</i>
        <br /><br />

        <button type="submit">Lưu Phiếu Mới</button>
    </form>
</body>

</html>
