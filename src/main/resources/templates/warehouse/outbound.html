<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Xuất kho Cấp phát - Procurex</title>
    <th:block layout:fragment="extra-css">
        <style>
            .outbound-wrapper {
                display: grid;
                grid-template-columns: 1fr 350px;
                gap: 24px;
            }

            .list-card {
                background: var(--panel);
                border-radius: var(--radius-lg);
                border: 1px solid var(--border);
                overflow: hidden;
            }

            .list-header {
                padding: 16px 20px;
                background: #f8fafc;
                border-bottom: 1px solid var(--border);
                font-weight: 700;
            }

            .alloc-item {
                padding: 16px 20px;
                border-bottom: 1px solid var(--border);
                cursor: pointer;
                transition: var(--transition);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .alloc-item:hover {
                background: #f1f5f9;
            }

            .alloc-item.active {
                background: #eff6ff;
                border-left: 4px solid var(--accent);
            }

            .form-side {
                background: var(--panel);
                padding: 24px;
                border-radius: var(--radius-lg);
                border: 1px solid var(--border);
                height: fit-content;
            }

            .asset-picker {
                margin-top: 16px;
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 12px;
                background: #f8fafc;
            }

            .btn-outbound {
                width: 100%;
                padding: 12px;
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: 8px;
                font-weight: 700;
                margin-top: 16px;
                cursor: pointer;
            }
            
            .scan-sim {
                display: flex;
                align-items: center;
                gap: 8px;
                color: var(--muted);
                font-size: 13px;
                margin-bottom: 16px;
                padding: 12px;
                border: 1px dashed var(--border);
                border-radius: 8px;
                cursor: pointer;
            }
            
            .scan-sim:hover {
                border-color: var(--accent);
                color: var(--accent);
            }
        </style>
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <div style="margin-bottom: 24px;">
        <h1 style="font-size: 24px; font-weight: 800;">Xuất kho Cấp phát (Outbound Allocation)</h1>
        <p style="color: var(--muted);">Lấy tài sản từ vị trí lưu kho để bàn giao cho nhân viên theo yêu cầu.</p>
    </div>

    <div class="outbound-wrapper">
        <div class="list-card">
            <div class="list-header">Yêu cầu cấp phát chờ xuất</div>
            <div th:if="${pendingAllocations.isEmpty()}" style="padding: 40px; text-align: center; color: var(--muted);">
                <p>Không có yêu cầu cấp phát nào chờ xuất.</p>
            </div>
            <div th:each="al : ${pendingAllocations}" class="alloc-item"
                 th:data-id="${al.request_id}"
                 th:data-type-name="${al.type_name}"
                 th:data-req-name="${al.requester_name}"
                 onclick="selectAlloc(this)">
                <div>
                    <div style="font-weight: 700; color: var(--accent);" th:text="'AL #' + ${al.request_id}"></div>
                    <div style="font-size: 13px; color: var(--muted);" th:text="${al.requester_name}"></div>
                </div>
                <div style="text-align: right;">
                    <div style="font-weight: 600;" th:text="${al.type_name}"></div>
                    <div style="font-size: 12px; color: var(--muted);" th:text="'SL: ' + ${al.quantity}"></div>
                </div>
            </div>
        </div>

        <div class="form-side">
            <h3 style="font-size: 16px; font-weight: 800; margin-bottom: 20px;">Xác thực tài sản</h3>
            
            <div class="scan-sim">
                <i class="fa-solid fa-camera"></i>
                <span>Bấm để mô phỏng quét Barcode...</span>
            </div>

            <form th:action="@{/warehouse/outbound/allocation}" method="post" id="outboundForm">
                <input type="hidden" name="allocationRequestId" id="f_allocId">
                
                <div style="margin-bottom: 16px;">
                    <label style="font-size: 13px; font-weight: 700;">Yêu cầu chọn</label>
                    <input type="text" id="v_allocName" class="form-control" readonly style="background: #f8fafc; width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border);">
                </div>

                <div style="margin-bottom: 16px;">
                    <label style="font-size: 13px; font-weight: 700;">Mã tài sản xuất kho (ID)</label>
                    <input type="number" name="assetId" id="f_assetId" class="form-control" required placeholder="Quét hoặc nhập ID..." style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border);">
                    <p style="font-size: 11px; color: var(--muted); margin-top: 4px;">Hệ thống sẽ tự động trừ sức chứa tại Zone chứa tài sản này.</p>
                </div>

                <button type="submit" class="btn-outbound">
                    <i class="fa-solid fa-truck-pickup"></i> Xác nhận Xuất kho
                </button>
            </form>
        </div>
    </div>
</div>

<th:block layout:fragment="extra-js">
    <script>
        function selectAlloc(el) {
            const id = el.getAttribute('data-id');
            const typeName = el.getAttribute('data-type-name');
            const reqName = el.getAttribute('data-req-name');

            document.querySelectorAll('.alloc-item').forEach(e => e.classList.remove('active'));
            el.classList.add('active');

            document.getElementById('f_allocId').value = id;
            document.getElementById('v_allocName').value = 'AL-' + id + ' (' + typeName + ')';
        }
    </script>
</th:block>
</body>
</html>
