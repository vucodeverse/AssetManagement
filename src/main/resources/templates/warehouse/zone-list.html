<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/warehouse-layout}">

<head>
    <title>Danh sách Khu vực lưu trữ</title>
</head>

<body>
    <th:block layout:fragment="content">

        <h1>QUẢN LÝ KHU VỰC LƯU TRỮ (ZONE)</h1>

        <!-- Thông báo -->
        <div th:if="${successMessage}">
            <p th:text="${successMessage}" style="color:green;"></p>
        </div>
        <div th:if="${errorMessage}">
            <p th:text="${errorMessage}" style="color:red;"></p>
        </div>

        <!-- Nút thêm mới -->
        <p>
            <a th:href="@{'/wh/' + ${userId} + '/zones/add'}">+ Thêm khu vực mới</a>
        </p>

        <!-- Bảng danh sách -->
        <table border="1" cellpadding="6" cellspacing="0">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên khu vực</th>
                    <th>Loại tài sản</th>
                    <th>Sức chứa hiện tại</th>
                    <th>Sức chứa tối đa</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="z : ${zones}">
                    <td th:text="${z.id}"></td>
                    <td th:text="${z.name}"></td>
                    <td th:text="${z.assignedAssetTypeName} ?: 'Tất cả loại'"></td>
                    <td th:text="${z.currentCapacity}"></td>
                    <td th:text="${z.maxCapacity}"></td>
                    <td th:text="${z.status}"></td>
                    <td>
                        <!-- Chi tiết -->
                        <a th:href="@{'/wh/' + ${userId} + '/zones/' + ${z.id}}">Chi tiết</a>
                        |
                        <!-- Sửa -->
                        <a th:href="@{'/wh/' + ${userId} + '/zones/' + ${z.id} + '/edit'}">Sửa</a>
                        |
                        <!-- Đổi trạng thái -->
                        <form th:if="${z.active}" th:action="@{'/wh/' + ${userId} + '/zones/' + ${z.id} + '/deactive'}"
                            method="post" style="display:inline;" onsubmit="return confirm('Vô hiệu hóa khu vực này?')">
                            <button type="submit">Vô hiệu hóa</button>
                        </form>
                        <form th:unless="${z.active}"
                            th:action="@{'/wh/' + ${userId} + '/zones/' + ${z.id} + '/active'}" method="post"
                            style="display:inline;" onsubmit="return confirm('Kích hoạt khu vực này?')">
                            <button type="submit">Kích hoạt</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(zones)}">
                    <td colspan="7" style="text-align:center;">Chưa có khu vực lưu trữ nào</td>
                </tr>
            </tbody>
        </table>

    </th:block>
</body>

</html>
