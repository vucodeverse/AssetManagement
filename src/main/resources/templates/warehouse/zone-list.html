<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Danh Sách Zones</title>
</head>

<body>
    <h1>Danh Sách Khu Vực (Zone) - Trong Kho ID: <span th:text="${warehouseId}"></span></h1>
    <a th:href="@{/warehouse/warehouses/list}">Trở Về Danh Sách Kho</a> |
    <a th:href="@{/wh/{id}(id=${warehouseId})}">Trở Về Dashboard</a>
    <hr />

    <h2>Thêm Zone Mới</h2>
    <form th:action="@{/warehouse/zones/create}" method="post">
        <input type="hidden" name="warehouseId" th:value="${warehouseId}" />
        <label>Tên Zone:</label> <input type="text" name="name" required /> <br />
        <label>Chuyên Môn Hóa (Loại Asset ID - Bỏ trống nếu không Fix):</label> <input type="number"
            name="assignedAssetTypeId" /> <br />
        <label>Sức Chứa Lớn Nhất (Capacity):</label> <input type="number" name="maxCapacity" required value="100" />
        <br />
        <button type="submit">Tạo Mới</button>
    </form>

    <hr />
    <h2>Các Zone Hiện Tại</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Zone ID</th>
                <th>Tên Zone</th>
                <th>Loại Asset Yêu Cầu</th>
                <th>Tình Trạng Chứa</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="z : ${zones}">
                <td th:text="${z.id}"></td>
                <td th:text="${z.name}"></td>
                <td th:text="${z.assignedAssetTypeId != null ? z.assignedAssetTypeId : 'Tự Do (All)'}"></td>
                <td><span th:text="${z.currentCapacity}"></span> / <span th:text="${z.maxCapacity}"></span></td>
            </tr>
            <tr th:if="${zones.empty}">
                <td colspan="4">Không có Zone nào được cấu hình trong kho này.</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
