<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/warehouse-layout}">
<head>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/warehouse/warehouse.css}">
        <style>
            .summary-header {
                background: white;
                padding: 24px;
                border-radius: 12px;
                box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
                margin-bottom: 24px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .summary-info h2 {
                margin: 0 0 8px 0;
                color: #1e293b;
                font-size: 1.5rem;
            }
            .summary-info p {
                margin: 0;
                color: #64748b;
            }
            
            /* --- Screen View --- */
            .asset-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 20px;
            }
            .asset-group-card {
                background: white;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
                border: 1px solid #e2e8f0;
            }
            .group-header {
                padding: 16px;
                background: #f8fafc;
                border-bottom: 1px solid #e2e8f0;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .group-title {
                font-weight: 600;
                color: #334155;
            }
            .group-count {
                background: #e2e8f0;
                color: #475569;
                padding: 2px 8px;
                border-radius: 12px;
                font-size: 0.75rem;
                font-weight: 600;
            }
            .id-list {
                padding: 16px;
                max-height: 250px;
                overflow-y: auto;
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
            .id-badge {
                padding: 4px 10px;
                background: #f1f5f9;
                border: 1px solid #e2e8f0;
                border-radius: 6px;
                font-family: 'Courier New', Courier, monospace;
                font-weight: 600;
                color: #2563eb;
                font-size: 0.9rem;
            }

            /* --- Print View (Tags) --- */
            #printable-tags {
                display: none; /* Hidden on screen */
            }

            @media print {
                body * {
                    visibility: hidden;
                }
                #printable-tags, #printable-tags * {
                    visibility: visible;
                }
                #printable-tags {
                    position: absolute;
                    left: 0;
                    top: 0;
                    width: 100%;
                    display: block !important;
                }
                body, html {
                    background: white !important;
                    margin: 0 !important;
                    padding: 0 !important;
                    width: 100% !important;
                    height: auto !important;
                }
                .tag-page {
                    display: grid;
                    grid-template-columns: repeat(2, 1fr);
                    gap: 10mm;
                    padding: 10mm;
                    page-break-after: always;
                    visibility: visible;
                }
                .asset-tag {
                    border: 2px solid #000;
                    padding: 5mm;
                    height: 40mm;
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    page-break-inside: avoid;
                    visibility: visible;
                }
                .tag-content {
                    flex: 1;
                    visibility: visible;
                }
                .tag-type {
                    font-size: 10pt;
                    font-weight: bold;
                    text-transform: uppercase;
                    margin-bottom: 5mm;
                    display: block;
                    visibility: visible;
                }
                .tag-id {
                    font-size: 24pt;
                    font-weight: 900;
                    font-family: inherit;
                    visibility: visible;
                }
                .tag-qr {
                    width: 30mm;
                    height: 30mm;
                    margin-left: 5mm;
                    visibility: visible;
                }
            }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    <header class="page-header no-print">
        <div>
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
                <a th:href="@{'/wh/inbound/po/' + ${summary.purchaseOrderId}}" style="color: #64748b;"><i class="fa-solid fa-arrow-left"></i> Quay lại Chi tiết PO</a>
            </div>
            <h1 class="page-title">Thông tin Phiếu Nhập #<span th:text="${summary.receiptId}"></span></h1>
        </div>
    </header>

    <div class="content-wrapper">
        <div th:if="${successMessage}" class="flash-message success no-print">
            <i class="fa-solid fa-circle-check"></i>
            <span th:text="${successMessage}"></span>
        </div>

        <div class="summary-header no-print">
            <div class="summary-info">
                <h2 th:text="'Nhà cung cấp: ' + ${summary.supplierName}">Nhà cung cấp</h2>
                <p>Ngày nhập kho: <span th:text="${#temporals.format(summary.inboundDate, 'dd/MM/yyyy HH:mm')}">--/--/----</span></p>
            </div>
            <div>
                <button class="btn-primary" onclick="window.print()">
                    <i class="fa-solid fa-print"></i> In tất cả thẻ tài sản (Tags)
                </button>
            </div>
        </div>

        <div class="asset-grid no-print">
            <div th:each="group : ${summary.assetGroups}" class="asset-group-card">
                <div class="group-header">
                    <span class="group-title" th:text="${group.assetTypeName}"></span>
                    <span class="group-count" th:text="${group.quantity} + ' cái'"></span>
                </div>
                <div class="id-list">
                    <span th:each="id : ${group.assetIds}" class="id-badge" th:text="${id}"></span>
                </div>
            </div>
        </div>

        <div class="print-section no-print" style="margin-top: 24px;">
            <p style="color: #64748b; margin-bottom: 16px;">
                <i class="fa-solid fa-circle-info"></i> Hệ thống đã tự động tạo hồ sơ tài sản. Vui lòng in thẻ và dán lên tài sản thực tế.
            </p>
            <a th:href="@{/wh/inbound/po}" class="btn-secondary">
                Hoàn tất & Quay lại danh sách PO
            </a>
        </div>

        <!-- Hidden Print Section (Paginated by Asset Type) -->
        <div id="printable-tags">
            <div th:each="group : ${summary.assetGroups}" class="tag-page">
                <div th:each="id : ${group.assetIds}" class="asset-tag">
                    <div class="tag-content">
                        <span class="tag-type" th:text="${group.assetTypeName}">TÊN LOẠI TÀI SẢN</span>
                        <div class="tag-id" th:text="${id}">1234</div>
                    </div>
                    <img class="tag-qr" 
                         th:src="'https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=' + ${id}" 
                         alt="QR Code">
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
