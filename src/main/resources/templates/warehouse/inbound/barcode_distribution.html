<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/warehouse-layout}">
<head>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/warehouse/warehouse.css}">
        <style>
            .id-list-container {
                padding: 0;
            }
            .id-row td {
                vertical-align: middle;
                padding: 1.25rem;
            }
            .asset-id-display {
                display: inline-flex;
                align-items: center;
                gap: 12px;
                background: #f8fafc;
                padding: 8px 16px;
                border-radius: 8px;
                font-family: 'JetBrains Mono', monospace;
                font-size: 1.1rem;
                font-weight: 700;
                color: #0f172a;
                border: 2px solid #e2e8f0;
                box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
            }
            .status-tag {
                font-size: 0.75rem;
                padding: 5px 12px;
                border-radius: 6px;
                font-weight: 700;
                display: inline-block;
                text-transform: uppercase;
                letter-spacing: 0.025em;
            }
            .status-pending { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
            
            .actions-bar {
                background: #f8fafc;
                border-top: 1px solid #e2e8f0;
                padding: 1.5rem 2rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            
            @media print {
                .actions-bar, .wh-panel-header button, .page-header { display: none; }
                .wh-panel { border: none; }
            }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    
    <header class="page-header">
        <div>
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
                <span style="color: #64748b;">Nhập kho</span>
                <span style="color: #cbd5e1;">/</span>
                <a th:href="@{'/wh/inbound/po/' + ${distribution.purchaseOrderId}}" style="text-decoration:none; color: #64748b;">PO #<span th:text="${distribution.purchaseOrderId}"></span></a>
                <span style="color: #cbd5e1;">/</span>
                <span style="color: #94a3b8;">Danh sách ID</span>
            </div>
            <h1 class="page-title"><i class="fa-solid fa-rectangle-list" style="margin-right:10px;"></i>Cấp phát ID Tài sản</h1>
            <p class="page-subtitle">Dưới đây là danh sách <strong th:text="${distribution.quantity}"></strong> mã định danh mới cho <strong th:text="${distribution.assetTypeName}"></strong>.</p>
        </div>
    </header>

    <div class="content-wrapper">
        
        <div class="wh-panel">
            <div class="wh-panel-header">
                <span class="wh-panel-title"><i class="fa-solid fa-fingerprint"></i> Danh sách ID vừa khởi tạo</span>
                <button class="btn-sm secondary" onclick="window.print()">
                    <i class="fa-solid fa-print"></i> In danh sách
                </button>
            </div>
            
            <div class="id-list-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th width="80px">STT</th>
                            <th>Mã định danh tài sản (Asset ID)</th>
                            <th width="150px">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item, iter : ${distribution.items}" class="id-row">
                            <td th:text="${iter.count}" style="text-align: center; color: #94a3b8; font-weight: 500;">1</td>
                            <td>
                                <div class="asset-id-display">
                                    <i class="fa-solid fa-qrcode" style="color: #64748b; font-size: 0.9rem;"></i>
                                    <span th:text="${item.assetCode}">AST-101-1001</span>
                                </div>
                            </td>
                            <td>
                                <button class="btn-sm secondary">
                                    <i class="fa-solid fa-print"></i> In nhãn lẻ
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="actions-bar">
                <div style="display:flex; align-items:center; gap:12px; color: #475569;">
                    <i class="fa-solid fa-circle-check" style="color: #10b981;"></i>
                    <span style="font-size: 0.9rem;">Vui lòng dán nhãn ID lên tài sản trước khi đưa vào vị trí lưu trữ.</span>
                </div>
                <form th:action="@{'/wh/inbound/po/' + ${distribution.purchaseOrderId} + '/barcode/confirm'}" method="post">
                    <button type="submit" class="btn-primary">
                        <i class="fa-solid fa-circle-check"></i> Xác nhận & Hoàn tất
                    </button>
                </form>
            </div>
        </div>

    </div>

</th:block>
</body>
</html>
