<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/warehouse-layout}">
<head>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/warehouse/warehouse.css}">
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    <header class="page-header">
        <div>
            <h1 class="page-title">Lịch sử Phiếu Nhập kho</h1>
            <p class="page-subtitle">Quản lý các đợt giao hàng và in lại mã QR tài sản</p>
        </div>
    </header>

    <div class="content-wrapper">
        <div class="wh-panel">
            <div class="wh-panel-header">
                <span class="wh-panel-title"><i class="fa-solid fa-list-ul"></i> Danh sách Phiếu Nhập</span>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID Phiếu</th>
                        <th>Ngày nhận</th>
                        <th>Đơn mua (PO)</th>
                        <th>Nhà cung cấp</th>
                        <th>Số Bill NCC</th>
                        <th class="text-center">Số lượng TS</th>
                        <th>Người nhận</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${receipts}">
                        <td th:text="'#' + ${r.receiptId}"></td>
                        <td th:text="${#temporals.format(r.receivedAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <a th:href="@{'/wh/inbound/po/' + ${r.purchaseOrderId}}" th:text="'PO #' + ${r.purchaseOrderId}" style="color: #2563eb; font-weight: 600;"></a>
                        </td>
                        <td th:text="${r.supplierName}"></td>
                        <td th:text="${r.deliveryNote ?: '-'}"></td>
                        <td class="text-center" th:text="${r.totalAssets}"></td>
                        <td th:text="${r.receivedBy}"></td>
                        <td class="text-center">
                            <a th:href="@{'/wh/inbound/receipt/' + ${r.receiptId}}" class="btn-secondary" style="padding: 4px 12px; font-size: 0.85rem;">
                                <i class="fa-solid fa-qrcode"></i> Xem & In QR
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(receipts)}">
                        <td colspan="8" style="text-align: center; padding: 40px; color: #94a3b8;">
                            <i class="fa-solid fa-folder-open" style="font-size: 2rem; display: block; margin-bottom: 10px;"></i>
                            Chưa có dữ liệu phiếu nhập kho nào.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</body>
</html>
