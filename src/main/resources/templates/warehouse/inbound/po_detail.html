<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/warehouse-layout}">
<head>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/warehouse/warehouse.css}">
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    <header class="page-header">
        <div>
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
                <a th:href="@{/wh/inbound/po}" style="color: #64748b;"><i class="fa-solid fa-arrow-left"></i> Quay lại</a>
                <span style="color: #cbd5e1;">/</span>
                <span style="color: #94a3b8;">Nhập kho</span>
            </div>
            <h1 class="page-title">Chi tiết PO #<span th:text="${po.orderId}"></span></h1>
            <p class="page-subtitle">Nhà cung cấp: <strong th:text="${po.supplierName}"></strong></p>
        </div>
        <div class="header-actions">
            <form th:action="@{'/wh/inbound/po/' + ${po.orderId} + '/confirm'}" method="post">
                <button type="submit" class="btn-primary">
                    <i class="fa-solid fa-check-double"></i> Xác nhận nhập kho toàn bộ PO
                </button>
            </form>
        </div>
    </header>

    <div class="content-wrapper">
        <div class="asset-grid" style="margin-bottom: 24px;">
            <div class="wh-panel">
                <div th:if="${error != null}" th:text="${error}" class="alert alert-danger">

                </div>

                <div class="wh-panel-header">
                    <span class="wh-panel-title"><i class="fa-solid fa-circle-info"></i> Thông tin Đơn hàng</span>
                </div>
                <div style="padding: 16px;">
                    <p style="margin-bottom: 8px;"><strong>Ngày tạo:</strong> <span th:text="${#temporals.format(po.createdAt, 'dd/MM/yyyy HH:mm')}"></span></p>
                    <p style="margin-bottom: 8px;"><strong>Người duyệt:</strong> <span th:text="${po.approvedByName}"></span></p>
                    <p style="margin-bottom: 0;"><strong>Ghi chú:</strong> <span th:text="${po.orderNote ?: 'Không có'}"></span></p>
                </div>
            </div>

            <div class="wh-panel">
                <div class="wh-panel-header">
                    <span class="wh-panel-title"><i class="fa-solid fa-wallet"></i> Tổng kết Thanh toán</span>
                </div>
                <div style="padding: 16px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span>Tạm tính:</span>
                        <strong th:text="${#numbers.formatDecimal(po.subtotal, 0, 'COMMA', 0, 'POINT')} + ' đ'"></strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px; color: #dc2626;">
                        <span>Giảm giá:</span>
                        <strong th:text="'- ' + ${#numbers.formatDecimal(po.totalDiscount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px; color: #2563eb;">
                        <span>Thuế:</span>
                        <strong th:text="'+ ' + ${#numbers.formatDecimal(po.totalTax, 0, 'COMMA', 0, 'POINT')} + ' đ'"></strong>
                    </div>
                    <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 8px 0;">
                    <div style="display: flex; justify-content: space-between; font-size: 1.1rem; color: #1e293b;">
                        <strong>Tổng cộng:</strong>
                        <strong style="color: #2563eb;" th:text="${#numbers.formatDecimal(po.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></strong>
                    </div>
                </div>
            </div>
        </div>

        <div class="wh-panel">
            <div class="wh-panel-header">
                <span class="wh-panel-title"><i class="fa-solid fa-cart-shopping"></i> Danh sách Mặt hàng</span>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Tên loại tài sản</th>
                        <th>Số lượng</th>
                        <th>Đơn giá</th>
                        <th>Chiết khấu</th>
                        <th>Thuế</th>
                        <th>Ngày giao dự kiến</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${po.orderDetails}">
                        <td th:text="${item.assetTypeName}"></td>
                        <td th:text="${item.quantity}"></td>
                        <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        <td th:text="${item.discountRate} + '%'"></td>
                        <td th:text="${item.taxRate} + '%'"></td>
                        <td th:text="${item.deliveryDate ?: 'Chưa cập nhật'}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</body>
</html>
