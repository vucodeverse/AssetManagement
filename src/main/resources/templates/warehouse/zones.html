<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Quản lý Zone</title>
    <th:block layout:fragment="extra-css">
        <style>
            .zone-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 24px;
            }

            .zone-header h1 {
                font-size: 24px;
                font-weight: 800;
                color: var(--accent);
                letter-spacing: -0.025em;
            }

            .btn-add {
                background: var(--accent);
                color: #fff;
                padding: 10px 20px;
                border-radius: var(--radius-md);
                border: none;
                font-weight: 600;
                font-size: 14px;
                cursor: pointer;
                transition: var(--transition);
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .btn-add:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(30, 41, 59, 0.2);
            }

            .zone-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
                gap: 20px;
                margin-bottom: 32px;
            }

            .zone-card {
                background: var(--panel);
                border-radius: var(--radius-lg);
                border: 1px solid var(--border);
                padding: 24px;
                transition: var(--transition);
                position: relative;
                overflow: hidden;
            }

            .zone-card:hover {
                box-shadow: var(--shadow-md);
                border-color: #cbd5e1;
            }

            .zone-card-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 16px;
            }

            .zone-title {
                font-size: 18px;
                font-weight: 700;
                color: var(--text);
            }

            .zone-type {
                font-size: 12px;
                font-weight: 600;
                color: var(--muted);
                background: var(--bg);
                padding: 4px 10px;
                border-radius: 20px;
                margin-top: 4px;
                display: inline-block;
            }

            .zone-capacity {
                margin: 20px 0;
            }

            .capacity-info {
                display: flex;
                justify-content: space-between;
                font-size: 13px;
                color: var(--muted);
                margin-bottom: 8px;
            }

            .progress-container {
                height: 8px;
                background: var(--bg);
                border-radius: 10px;
                overflow: hidden;
            }

            .progress-fill {
                height: 100%;
                border-radius: 10px;
                transition: width 0.5s ease;
            }

            .zone-actions {
                display: flex;
                gap: 10px;
                margin-top: 20px;
            }

            .btn-zone-action {
                flex: 1;
                padding: 8px;
                border-radius: 8px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                transition: var(--transition);
                border: 1px solid var(--border);
                background: #fff;
                color: var(--muted);
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
            }

            .btn-zone-action:hover {
                background: var(--bg);
                color: var(--text);
            }

            .btn-delete:hover {
                background: #fef2f2;
                color: #ef4444;
                border-color: #fecaca;
            }

            /* Modal Styles */
            .modal {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(15, 23, 42, 0.4);
                backdrop-filter: blur(4px);
                z-index: 2000;
                align-items: center;
                justify-content: center;
            }

            .modal.active {
                display: flex;
            }

            .modal-content {
                background: #fff;
                width: 100%;
                max-width: 500px;
                border-radius: var(--radius-lg);
                padding: 32px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
                transform: translateY(20px);
                transition: all 0.3s ease;
            }

            .modal.active .modal-content {
                transform: translateY(0);
            }

            .modal-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 24px;
            }

            .modal-header h2 {
                font-size: 20px;
                font-weight: 700;
                color: var(--accent);
            }

            .close-modal {
                background: none;
                border: none;
                font-size: 24px;
                color: var(--muted);
                cursor: pointer;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-group label {
                display: block;
                font-size: 13px;
                font-weight: 600;
                color: var(--text);
                margin-bottom: 8px;
            }

            .form-control {
                width: 100%;
                padding: 12px 14px;
                border-radius: var(--radius-md);
                border: 1px solid var(--border);
                background: var(--bg);
                font-size: 14px;
                transition: var(--transition);
            }

            .form-control:focus {
                outline: none;
                border-color: var(--accent);
                background: #fff;
                box-shadow: 0 0 0 4px rgba(30, 41, 59, 0.05);
            }

            .modal-footer {
                display: flex;
                gap: 12px;
                margin-top: 32px;
            }

            .btn-submit {
                flex: 2;
                background: var(--accent);
                color: #fff;
                border: none;
                padding: 12px;
                border-radius: var(--radius-md);
                font-weight: 600;
                cursor: pointer;
            }

            .btn-cancel {
                flex: 1;
                background: var(--bg);
                color: var(--text);
                border: 1px solid var(--border);
                padding: 12px;
                border-radius: var(--radius-md);
                font-weight: 600;
                cursor: pointer;
            }
        </style>
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <div class="zone-header">
        <div>
            <h1>Quản lý Khu vực lưu trữ</h1>
            <p style="color: var(--muted); font-size: 14px; margin-top: 4px;">Quản lý các khu vực phân loại tài sản trong kho.</p>
        </div>
        <button class="btn-add" id="openAddModal">
            <i class="fas fa-plus"></i> Thêm Zone mới
        </button>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(zones)}" style="text-align: center; padding: 60px; background: var(--panel); border-radius: var(--radius-lg); border: 1px dashed var(--border);">
        <i class="fas fa-warehouse" style="font-size: 48px; color: var(--muted2); margin-bottom: 16px;"></i>
        <h3 style="color: var(--text);">Chưa có Zone nào</h3>
        <p style="color: var(--muted); margin-top: 8px;">Hãy bắt đầu bằng cách thêm khu vực lưu trữ mới cho kho của bạn.</p>
    </div>

    <div class="zone-grid" th:if="${!#lists.isEmpty(zones)}">
        <div class="zone-card" th:each="zone : ${zones}">
            <div class="zone-card-header">
                <div>
                    <div class="zone-title" th:text="${zone.zoneName}">Khu vực A</div>
                    <div class="zone-type">
                        <i class="fas fa-tag"></i> 
                        <span th:text="${zone.assetTypeName ?: 'Mọi loại tài sản'}">Laptop</span>
                    </div>
                </div>
                <div style="color: var(--muted2); font-size: 12px; font-weight: 700;" th:text="'#' + ${zone.zoneId}">#1</div>
            </div>

            <div class="zone-capacity">
                <div class="capacity-info">
                    <span>Sức chứa: <strong th:text="${zone.currentCapacity}" style="color: var(--text);">20</strong> / <span th:text="${zone.maxCapacity}">50</span></span>
                    <span th:text="${#numbers.formatDecimal(zone.usagePercentage, 1, 1)} + '%'">40.0%</span>
                </div>
                <div class="progress-container">
                    <div class="progress-fill" th:style="'width: ' + ${zone.usagePercentage} + '%'"
                         th:classappend="${zone.usagePercentage > 90 ? 'bg-danger' : (zone.usagePercentage > 60 ? 'bg-warning' : (zone.usagePercentage > 0 ? 'bg-success' : ''))}"
                         style="background-color: #10b981;"> <!-- Fallback to green -->
                    </div>
                </div>
            </div>

            <div class="zone-actions">
                <form th:action="@{/warehouse/zones/reset/{id}(id=${zone.zoneId})}" method="post" style="flex: 1;">
                    <button type="submit" class="btn-zone-action" title="Xóa loại tài sản định danh nếu kho trống">
                        <i class="fas fa-sync-alt"></i> Reset
                    </button>
                </form>
                <form th:action="@{/warehouse/zones/delete/{id}(id=${zone.zoneId})}" method="post" style="flex: 1;">
                    <button type="submit" class="btn-zone-action btn-delete" onclick="return confirm('Bạn có chắc muốn xóa zone này?')">
                        <i class="fas fa-trash"></i> Xóa
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Thêm mới -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Thêm Zone mới</h2>
                <button class="close-modal" id="closeAddModal">&times;</button>
            </div>
            <form th:action="@{/warehouse/zones/create}" method="post" th:object="${newZone}">
                <input type="hidden" name="warehouseId" value="1">
                
                <div class="form-group">
                    <label>Tên Khu vực (Zone Name)</label>
                    <input type="text" th:field="*{zoneName}" class="form-control" placeholder="Ví dụ: Khu vực Điện tử" required>
                </div>
                
                <div class="form-group">
                    <label>Sức chứa tối đa (đơn vị khối tích)</label>
                    <input type="number" th:field="*{maxCapacity}" class="form-control" placeholder="50" min="1" required>
                </div>
                
                <div class="form-group">
                    <label>Loại tài sản định danh (Tùy chọn)</label>
                    <select th:field="*{assetTypeId}" class="form-control">
                        <option value="">-- Cho phép mọi loại --</option>
                        <option th:each="type : ${assetTypes}" th:value="${type.assetTypeId}" th:text="${type.typeName}"></option>
                    </select>
                    <small style="color: var(--muted); font-size: 11px; display: block; margin-top: 4px;">Nếu chọn, Zone này sẽ chỉ dành riêng cho loại tài sản này.</small>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelAdd">Hủy</button>
                    <button type="submit" class="btn-submit">Tạo mới</button>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block layout:fragment="extra-js">
    <script>
        $(document).ready(function() {
            const modal = $('#addModal');
            
            $('#openAddModal').click(function() {
                modal.addClass('active');
            });

            $('#closeAddModal, #cancelAdd').click(function() {
                modal.removeClass('active');
            });

            // Close on click outside
            $(window).click(function(event) {
                if ($(event.target).is(modal)) {
                    modal.removeClass('active');
                }
            });

            // Background color logic for progress bars (if not using global CSS classes)
            $('.progress-fill').each(function() {
                const width = parseFloat($(this).css('width')) / parseFloat($(this).parent().css('width')) * 100;
                if (width > 90) $(this).css('background-color', '#ef4444');
                else if (width > 60) $(this).css('background-color', '#f59e0b');
                else if (width > 0) $(this).css('background-color', '#10b981');
            });
        });
    </script>
</th:block>
</body>
</html>
