<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chỉnh sửa báo cáo QC</title>
    <link rel="stylesheet" th:href="@{/css/qc.css}"/>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="topbar-left">
        <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <span class="title">Quản lý QC</span>
    </div>
    <div class="topbar-right">
        <div class="avatar">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
        </div>
    </div>
</div>

<div class="container">

    <!-- BREADCRUMB -->
    <div class="breadcrumb">
        <a th:href="@{/}">Trang chủ</a> &nbsp;/&nbsp;
        <a th:href="@{/qc-reports/list}">Báo cáo QC</a> &nbsp;/&nbsp;
        <a th:href="@{/qc-reports/{id}(id=${reportId})}" th:text="'#' + ${reportId}"></a> &nbsp;/&nbsp;
        Chỉnh sửa
    </div>

    <!-- PAGE HEADER -->
    <div class="page-header">
        <h2>Chỉnh sửa báo cáo QC</h2>
        <p th:text="'Cập nhật thông tin báo cáo #' + ${reportId}"></p>
    </div>

    <!-- FLASH ERROR -->
    <div class="alert alert-error" th:if="${error}">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span th:text="${error}"></span>
    </div>

    <!-- FORM -->
    <div class="card">
        <div class="section-title">Thông tin báo cáo</div>

        <form th:action="@{/qc-reports/{id}/edit(id=${reportId})}" method="post" th:object="${qcReport}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-grid">

                <!-- Mã báo cáo (readonly) -->
                <div class="form-group">
                    <label>Mã báo cáo</label>
                    <div class="readonly-box" th:text="'#' + ${reportId}"></div>
                </div>

                <!-- Asset -->
                <div class="form-group">
                    <label for="assetId">
                        Tài sản <span class="required">*</span>
                    </label>
                    <select id="assetId" th:field="*{assetId}">
                        <option value="">-- Chọn tài sản --</option>
                        <option th:each="asset : ${assets}"
                                th:value="${asset.assetId}"
                                th:text="${asset.assetName + ' (#' + asset.assetId + ')'}">
                        </option>
                    </select>
                </div>

                <!-- Status -->
                <div class="form-group">
                    <label for="status">
                        Trạng thái <span class="required">*</span>
                    </label>
                    <select id="status" th:field="*{status}">
                        <option value="PASSED">PASSED</option>
                        <option value="FAILED">FAILED</option>
                        <option value="PENDING">PENDING</option>
                    </select>
                </div>

                <!-- Inspector -->
                <div class="form-group">
                    <label for="inspectedBy">
                        Người kiểm tra <span class="required">*</span>
                    </label>
                    <select id="inspectedBy" th:field="*{inspectedBy}">
                        <option value="">-- Chọn người kiểm tra --</option>
                        <option th:each="user : ${users}"
                                th:value="${user.userId}"
                                th:text="${user.firstName + ' ' + user.lastName + ' (#' + user.userId + ')'}">
                        </option>
                    </select>
                </div>

                <!-- Note -->
                <div class="form-group full-width">
                    <label for="note">Ghi chú</label>
                    <textarea id="note" th:field="*{note}"
                              placeholder="Nhập ghi chú kiểm tra (tối đa 2000 ký tự)..."
                              maxlength="2000"></textarea>
                </div>

            </div>

            <div class="form-actions">
                <a th:href="@{/qc-reports/{id}(id=${reportId})}" class="btn btn-outline">Hủy</a>
                <button type="submit" class="btn btn-primary">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    Lưu thay đổi
                </button>
            </div>

        </form>
    </div>

</div>
</body>
</html>
