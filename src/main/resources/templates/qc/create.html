<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/warehouse-layout}">

<head>
    <title>Tạo báo cáo QC</title>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/qc/style.css}">
    </th:block>
</head>

<body>
<th:block layout:fragment="content">

    <div class="content">

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <div class="breadcrumb">
            <a th:href="@{/warehouse}">Trang chủ</a>
            <span class="sep">›</span>
            <a th:href="@{/qc-reports/list}">Báo cáo QC</a>
            <span class="sep">›</span>
            <span class="current">Tạo mới</span>
        </div>

        <div class="page-header">
            <h1>Tạo báo cáo QC</h1>
            <p>Ghi nhận kết quả kiểm tra chất lượng theo tài sản.</p>
        </div>

        <div class="card">
            <form th:action="@{/qc-reports/create}"
                  method="post"
                  th:object="${qcReport}"
                  enctype="multipart/form-data"
                  class="qc-form">

                <input type="hidden" name="sourceType" th:value="${sourceType}"/>
                <input type="hidden" name="sourceId" th:value="${sourceId}"/>

                <div class="form-grid">

                    <div class="form-group full-width">
                        <label class="form-label">
                            TÀI SẢN <span class="required">*</span>
                        </label>

                        <input type="text"
                               th:if="${asset != null}"
                               th:value="${asset.assetName + ' (ID: ' + asset.assetId + ')'}"
                               class="form-control"
                               disabled/>

                        <input type="text"
                               th:unless="${asset != null}"
                               value="Không tìm thấy tài sản"
                               class="form-control"
                               disabled/>

                        <input type="hidden" th:field="*{assetId}"/>
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            TRẠNG THÁI <span class="required">*</span>
                        </label>

                        <select th:field="*{status}" class="form-control" required>
                            <option value="">-- Chọn trạng thái --</option>
                            <option value="PASSED">PASSED - Đạt</option>
                            <option value="FAILED">FAILED - Không đạt</option>
                            <option value="PENDING">PENDING - Chờ xử lý</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">NGƯỜI KIỂM TRA</label>
                        <input type="text"
                               class="form-control"
                               th:value="${session.userId != null ? 'User ID: ' + session.userId : 'Chưa đăng nhập'}"
                               disabled/>
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">GHI CHÚ</label>

                        <textarea th:field="*{note}"
                                  id="note"
                                  class="form-control"
                                  rows="4"
                                  maxlength="2000"
                                  placeholder="Nhập ghi chú kiểm tra..."></textarea>

                        <div class="d-flex justify-content-between">
                            <span class="form-help">Tối đa 2000 ký tự</span>
                            <span><span id="charCount">0</span>/2000</span>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">FILE MINH CHỨNG</label>

                        <input type="file"
                               name="file"
                               class="form-control"
                               accept=".jpg,.jpeg,.png,.pdf,.doc,.docx"/>

                        <span class="form-help">Hỗ trợ JPG, PNG, PDF, DOC, DOCX</span>
                    </div>

                    <div class="form-group full-width" th:if="${sourceType != null}">
                        <label class="form-label">NGUỒN PHÁT SINH</label>
                        <input type="text"
                               class="form-control"
                               th:value="${sourceType + (sourceId != null ? ' #' + sourceId : '')}"
                               disabled/>
                    </div>

                </div>

                <div class="form-actions">
                    <a th:if="${backUrl != null}"
                       th:href="${backUrl}"
                       class="btn btn-secondary">
                        Quay lại
                    </a>

                    <a th:if="${backUrl == null}"
                       th:href="@{/qc-reports/list}"
                       class="btn btn-secondary">
                        Hủy
                    </a>

                    <button type="submit" class="btn btn-primary">
                        Tạo báo cáo
                    </button>
                </div>

            </form>
        </div>
    </div>

    <script>
        const note = document.getElementById('note');
        const counter = document.getElementById('charCount');

        if (note && counter) {
            const update = () => counter.textContent = note.value.length;
            note.addEventListener('input', update);
            update();
        }
    </script>

</th:block>
</body>
</html>
