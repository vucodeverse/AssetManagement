<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo báo cáo QC</title>
    <style>
        .error { color: red; margin-bottom: 10px; }
        label { display: inline-block; width: 120px; margin-bottom: 8px; }
        select, textarea, input[type="file"] { margin-bottom: 12px; }
        button { margin-top: 12px; }
    </style>
</head>
<body>
<h2>Tạo báo cáo QC</h2>

<div th:if="${error}" class="error">
    <p th:text="${error}"></p>
</div>

<form th:action="@{/qc-reports/create}" th:object="${qcReport}" method="post" enctype="multipart/form-data" id="qcForm">
    <label for="assetSelect">Tài sản <span style="color:red">*</span>:</label>
    <select id="assetSelect" th:field="*{assetId}" required>
        <option value="">-- Chọn tài sản --</option>
        <option th:each="asset : ${assets}"
                th:value="${asset.assetId}"}"
                th:text="${asset.assetName}">
        </option>
    </select>
    <div id="assetDetail" style="font-size:0.9em; color:#555;"></div>
    <br/>

    <label for="inspectedBy">Người kiểm tra <span style="color:red">*</span>:</label>
    <select id="inspectedBy" th:field="*{inspectedBy}" required>
        <option value="">-- Chọn người kiểm tra --</option>
        <option th:each="user : ${users}"
                th:value="${user.userId}"
                th:text="${user.fullName}">
        </option>
    </select>
    <br/>

    <label for="status">Trạng thái QC <span style="color:red">*</span>:</label>
    <select id="status" th:field="*{status}" required>
        <option value="PASSED">PASSED</option>
        <option value="FAILED">FAILED</option>
        <option value="PENDING">PENDING</option>
    </select>
    <br/>

    <label for="note">Ghi chú:</label>
    <textarea id="note" th:field="*{note}" rows="4" cols="50"></textarea>
    <br/>

    <label for="file">File kiểm định:</label>
    <input id="file" type="file" name="file"/>
    <br/>

    <button type="submit">Tạo báo cáo</button>
</form>

<br/>
<a th:href="@{/qc-reports/list}">Quay lại danh sách</a>

<script>
    document.getElementById("assetSelect").addEventListener("change", function() {
        const selectedId = this.value;
        if (!selectedId) {
            document.getElementById("assetDetail").innerHTML = "";
            return;
        }
        fetch(`/assets/${selectedId}/detail`)
            .then(res => {
                if (!res.ok) throw new Error("Không tìm thấy thông tin tài sản");
                return res.json();
            })
            .then(data => {
                document.getElementById("assetDetail").innerHTML =
                    `Mã: ${data.assetCode || ''} | Phòng ban: ${data.departmentName || ''}`;
            })
            .catch(err => {
                console.error("Lỗi tải thông tin tài sản:", err);
                document.getElementById("assetDetail").innerHTML = "<span style='color:red'>Không thể tải thông tin tài sản</span>";
            });
    });

    // Optional: thêm validation client-side để debug
    document.getElementById("qcForm").addEventListener("submit", function(e) {
        const assetVal = document.getElementById("assetSelect").value;
        if (!assetVal) {
            alert("Vui lòng chọn tài sản!");
            e.preventDefault();
            return false;
        }
        console.log("Submitting QC Report with assetId:", assetVal);
    });
</script>

</body>
</html>
