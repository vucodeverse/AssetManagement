<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/warehouse-layout}">

<head>
    <title>Tạo báo cáo QC</title>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/qc/style.css}">
    </th:block>
</head>

<body>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
<th:block layout:fragment="content">
    <div class="content">
        <!-- BREADCRUMB -->
        <div class="breadcrumb">
            <a th:href="@{/warehouse}">Trang chủ</a>
            <span class="sep">›</span>
            <a th:href="@{/wh/qc-reports/list}">Báo cáo QC</a>
            <span class="sep">›</span>
            <span class="current">Tạo mới</span>
        </div>

        <!-- PAGE HEADER -->
        <div class="page-header">
            <h1>Tạo báo cáo QC</h1>
            <p>Ghi lại thông tin kiểm soát chất lượng mới cho quy trình sản xuất.</p>
        </div>

        <!-- FORM CARD -->
        <div class="card">
            <form th:action="@{/wh/qc-reports/create}" method="post" th:object="${qcReport}" class="qc-form">

                <div class="form-grid">

                    <!-- TÀI SẢN (CHỈ HIỂN THỊ, KHÔNG CHỌN) -->
                    <div class="form-group">
                        <label class="form-label" for="assetName">
                            TÀI SẢN <span class="required">*</span>
                        </label>
                        <input type="text" id="assetName"
                               th:if="${asset != null}"
                               th:value="${asset.assetName + ' (Mã: ' + asset.assetId + ')'}"
                               class="form-control" disabled/>
                        <input th:unless="${asset != null}" type="text" class="form-control"
                               th:value="'Không tìm thấy tài sản với ID: ' + *{assetId}" disabled/>
                        <input type="hidden" th:field="*{assetId}"/>
                    </div>

                    <!-- TRẠNG THÁI -->
                    <div class="form-group">
                        <label class="form-label" for="status">TRẠNG THÁI <span class="required">*</span></label>
                        <select id="status" th:field="*{status}" class="form-control" required>
                            <option value="">-- Chọn trạng thái --</option>
                            <option value="PASSED">PASSED - Đạt yêu cầu</option>
                            <option value="FAILED">FAILED - Không đạt</option>
                            <option value="PENDING">PENDING - Chờ xử lý</option>
                        </select>
                    </div>

                    <!-- GHI CHÚ -->
                    <div class="form-group full-width">
                        <label class="form-label" for="note">GHI CHÚ</label>
                        <textarea id="note" th:field="*{note}" class="form-control" rows="4"
                                  placeholder="Mô tả chi tiết kết quả kiểm tra hoặc các điểm bất thường..."
                                  maxlength="2000"></textarea>
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <span class="form-help">Tối đa 2000 ký tự</span>
                            <span class="char-counter"><span id="charCount">0</span>/2000</span>
                        </div>
                    </div>

                </div>

                <!-- ACTIONS -->
                <div class="form-actions">
                    <a th:href="@{/wh/qc-reports/list}" class="btn btn-secondary">Hủy</a>
                    <button class="btn btn-primary" type="submit">Tạo báo cáo</button>
                </div>

            </form>
        </div>
    </div>

    <script>
        const note = document.getElementById('note');
        const counter = document.getElementById('charCount');
        if (note && counter) {
            note.addEventListener('input', () => { counter.textContent = note.value.length; });
            counter.textContent = note.value.length;
        }
    </script>
</th:block>
</body>
</html>
