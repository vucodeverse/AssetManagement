<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chi tiết báo cáo QC</title>
    <link rel="stylesheet" th:href="@{/css/qc.css}"/>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="topbar-left">
        <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <span class="title">Quản lý QC</span>
    </div>
    <div class="topbar-right">
        <div class="avatar">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
        </div>
    </div>
</div>

<div class="container">

    <!-- BREADCRUMB -->
    <div class="breadcrumb">
        <a th:href="@{/}">Trang chủ</a> &nbsp;/&nbsp;
        <a th:href="@{/qc-reports/list}">Báo cáo QC</a> &nbsp;/&nbsp;
        <span th:text="'#' + ${report.reportId}"></span>
    </div>

    <!-- PAGE HEADER -->
    <div class="page-header">
        <h2 th:text="'Báo cáo QC #' + ${report.reportId}"></h2>
        <p>Thông tin chi tiết báo cáo kiểm tra chất lượng</p>
    </div>

    <!-- FLASH MESSAGES -->
    <div class="alert alert-success" th:if="${message}">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span th:text="${message}"></span>
    </div>
    <div class="alert alert-error" th:if="${error}">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span th:text="${error}"></span>
    </div>

    <!-- DETAIL CARD -->
    <div class="card">
        <div class="section-title">Thông tin báo cáo</div>

        <div class="detail-grid">

            <div class="detail-item">
                <span class="detail-label">Mã báo cáo</span>
                <div class="detail-value" th:text="'#' + ${report.reportId}"></div>
            </div>

            <div class="detail-item">
                <span class="detail-label">Asset ID</span>
                <div class="detail-value" th:text="${report.assetId}"></div>
            </div>

            <div class="detail-item">
                <span class="detail-label">Trạng thái</span>
                <div class="detail-value">
                    <span th:classappend="${report.status == 'PASSED'} ? 'badge-passed' :
                                          (${report.status == 'FAILED'} ? 'badge-failed' : 'badge-pending')"
                          class="badge"
                          th:text="${report.status}">
                    </span>
                </div>
            </div>

            <div class="detail-item">
                <span class="detail-label">Người kiểm tra</span>
                <div class="detail-value" th:text="${report.inspectedBy}"></div>
            </div>

            <div class="detail-item">
                <span class="detail-label">Ngày kiểm tra</span>
                <div class="detail-value"
                     th:text="${#temporals.format(report.qcDate, 'dd/MM/yyyy HH:mm')}"></div>
            </div>

            <div class="detail-item full-width">
                <span class="detail-label">Ghi chú</span>
                <div class="detail-value detail-note"
                     th:text="${report.note != null and !#strings.isEmpty(report.note)} ? ${report.note} : '—'">
                </div>
            </div>

        </div>

        <!-- ACTIONS -->
        <div class="detail-actions">
            <a th:href="@{/qc-reports/list}" class="btn btn-outline">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Quay lại
            </a>
            <a th:href="@{/qc-reports/{id}/edit(id=${report.reportId})}" class="btn btn-outline">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
                Chỉnh sửa
            </a>
            <button type="button" class="btn btn-danger" onclick="openDeleteModal()">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
                Xóa báo cáo
            </button>
        </div>

    </div>

</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <h3>Xác nhận xóa</h3>
        <p>Bạn có chắc chắn muốn xóa báo cáo QC
            <strong th:text="'#' + ${report.reportId}"></strong> không?
            Hành động này không thể hoàn tác.
        </p>
        <div class="modal-actions">
            <button type="button" class="btn btn-outline" onclick="closeDeleteModal()">Hủy</button>
            <form th:action="@{/qc-reports/{id}/delete(id=${report.reportId})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-danger">Xóa</button>
            </form>
        </div>
    </div>
</div>

<script>
    function openDeleteModal() {
        document.getElementById('deleteModal').classList.add('active');
    }

    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('active');
    }

    document.getElementById('deleteModal').addEventListener('click', function (e) {
        if (e.target === this) closeDeleteModal();
    });
</script>

</body>
</html>
