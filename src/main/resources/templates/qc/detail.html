<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/warehouse-layout}">

<head>
    <title>Chi tiết báo cáo QC</title>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/qc/detail.css}">
    </th:block>
</head>

<body>
<th:block layout:fragment="content">

    <div class="content">

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <div class="breadcrumb">
            <a th:href="@{/warehouse}">Trang chủ</a>
            <span class="sep">›</span>
            <a th:href="@{/qc-reports/list}">Báo cáo QC</a>
            <span class="sep">›</span>
            <span class="current">Chi tiết</span>
        </div>

        <div class="page-header">
            <h1>Chi tiết báo cáo QC</h1>
            <p>Xem thông tin kiểm tra chất lượng theo tài sản.</p>
        </div>

        <div class="card" th:if="${report != null}">
            <div class="detail-grid">
                <div class="detail-item">
                    <label>ID báo cáo</label>
                    <div th:text="${report.reportId}"></div>
                </div>

                <div class="detail-item">
                    <label>Asset ID</label>
                    <div th:text="${report.assetId}"></div>
                </div>

                <div class="detail-item">
                    <label>Trạng thái</label>
                    <div th:text="${report.status}"></div>
                </div>

                <div class="detail-item">
                    <label>Người kiểm tra</label>
                    <div th:text="${report.inspectorName != null ? report.inspectorName : ('User ID: ' + report.inspectedBy)}"></div>
                </div>

                <div class="detail-item">
                    <label>Ngày QC</label>
                    <div th:text="${report.qcDate}"></div>
                </div>

                <div class="detail-item full-width">
                    <label>Ghi chú</label>
                    <div th:text="${report.note != null ? report.note : 'Không có ghi chú'}"></div>
                </div>

                <div class="detail-item full-width" th:if="${report.attachment != null}">
                    <label>File minh chứng</label>
                    <div>
                        <a th:href="@{/${report.attachment}}" target="_blank" rel="noopener">
                            Xem file
                        </a>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/qc-reports/list(assetId=${report.assetId})}" class="btn btn-secondary">
                    Danh sách theo tài sản
                </a>
                <a th:href="@{/qc-reports/{id}/edit(id=${report.reportId})}" class="btn btn-warning">
                    Chỉnh sửa
                </a>
                <a th:href="@{/qc-reports/list}" class="btn btn-secondary">
                    Quay lại
                </a>
            </div>
        </div>

        <div th:if="${report == null}" class="empty-state">
            <p>Không tìm thấy báo cáo QC.</p>
        </div>

    </div>

</th:block>
</body>
</html>
