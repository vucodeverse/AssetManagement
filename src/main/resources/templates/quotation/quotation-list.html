<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main-layout}" xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotations Management</title>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/quotation/quotation-list.css}">
    </th:block>
</head>

<body>
    <th:block layout:fragment="content">
        <div class="quotation-content-wrapper">

            <form id="filterForm" method="get" th:action="@{/purchase-staff/quotations/search}"
                th:object="${searchForQuotation}">
                <header class="top-bar">
                    <h1>QUOTATIONS</h1>
                    <div class="top-actions">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" th:field="*{keyword}" placeholder="Search by PR ID...">
                        </div>
                        <i class="far fa-bell icon-btn"></i>
                        <i class="fas fa-cog icon-btn"></i>
                    </div>
                </header>

                <!-- Phần bộ lọc -->
                <section class="filters-bar">
                    <div class="filter-group">
                        <label>PRIORITY:</label>
                        <select id="priorityFilter" th:field="*{priority}">
                            <option value="">All Priorities</option>
                            <option th:each="pi : ${priorities}" th:value="${pi}" th:text="${pi}">
                            </option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>AMOUNT:</label>
                        <select id="amountRange" th:field="*{amountRange}">
                            <option value="">Any Range</option>
                            <option value="0-5000">0 - 5,000</option>
                            <option value="5000-10000">5,000 - 10,000</option>
                            <option value="10000-20000">10,000 - 20,000</option>
                            <option value="20000+">20,000+</option>
                        </select>
                    </div>
                    <div class="filter-group dates" style="position: relative;">
                        <label>DATES:</label>
                        <input type="date" th:field="*{from}">
                        <span class="to-text">to</span>
                        <input type="date" th:field="*{to}">
                        <div th:if="${#fields.hasErrors('from')}" th:errors="*{from}"
                            style="position: absolute; bottom: -18px; left: 60px; color: red; font-size: 11px; white-space: nowrap;">
                        </div>
                        <div th:if="${#fields.hasErrors('to')}" th:errors="*{to}"
                            style="position: absolute; bottom: -18px; right: 0; color: red; font-size: 11px; white-space: nowrap;">
                        </div>
                    </div>
                    <div class="filter-actions">
                        <a class="btn-reset-filters" th:href="@{/purchase-staff/quotations}">
                            <i class="fas fa-undo-alt"></i> RESET FILTERS
                        </a>
                    </div>
                </section>
            </form>

            <!-- Phần bảng dữ liệu -->
            <div class="table-container">
                <table class="data-table" id="quotation-table">
                    <thead>
                        <tr>
                            <th>PR ID </th>
                            <th>NEEDED BY DATE</th>
                            <th>Number of Quotations </th>
                            <th>EST. AMOUNT </th>
                            <th>PRIORITY </th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="q : ${quotations}">
                            <td class="pr-id" th:text="${q.purchaseId}"></td>
                            <td th:text="${#temporals.format(q.needByDate,'dd-MM-yyyy')}"></td>
                            <td th:text="${q.numberOfQuotation}">
                            </td>
                            <td class="amount"
                                th:text="${q.estPrice != null ? '$' + #numbers.formatDecimal(q.estPrice, 1, 'COMMA', 0, 'POINT') : 'N/A'}">
                            </td>
                            <td>
                                <span th:class="'badge ' + ${#strings.toLowerCase(q.priority)}"
                                    th:text="${q.priority}"></span>
                            </td>
                            <td>
                                <form th:action="@{/purchase-staff/quotations/of-purchase/{id}(id=${q.purchaseId})}"
                                    th:method="get">
                                    <button type="submit" class="btn-review">REVIEW ALL</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </th:block>
    <th:block layout:fragment="extra-js">
        <script th:src="@{/js/quotation/quotation-list.js}"></script>
    </th:block>
</body>

</html>
