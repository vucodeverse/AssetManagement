<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="~{layout/main-layout}">

<head>
     <title>Tạo Báo Giá Nhà Cung Cấp</title>
     <th:block layout:fragment="extra-css">
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
               rel="stylesheet">
          <link rel="stylesheet" th:href="@{/css/quotation/quotation-form.css}">
     </th:block>
</head>

<body>
     <div layout:fragment="content">
          <div class="quotation-form-wrapper">

               <form th:action="@{/quotations/create/{id}(id=${purchaseId})}" th:object="${quotationCreateRequest}"
                    method="post" id="quotationForm">
                    <input type="hidden" th:field="*{quotationId}">
                    <input type="hidden" th:field="*{purchaseId}">

                    <header class="form-header">
                         <h1
                              th:text="${quotationCreateRequest.quotationId != null ? 'CẬP NHẬT BÁO GIÁ NHÀ CUNG CẤP' : 'TẠO BÁO GIÁ NHÀ CUNG CẤP'}">
                              TẠO BÁO GIÁ NHÀ CUNG CẤP</h1>
                         <div class="header-right">
                              <span class="badge-prem status-badge-draft">BẢN NHÁP</span>
                         </div>
                    </header>

                    <div class="form-section-card">
                         <div class="grid-fields">
                              <div class="field-group">
                                   <label><i class="fas fa-tag"></i> MÃ YÊU CẦU MUA SẮM</label>
                                   <input type="text" class="input-prem input-read-only"
                                        th:value="'PR-' + ${purchaseId}" readonly>
                              </div>
                              <div class="field-group">
                                   <label><i class="fas fa-truck"></i> NHÀ CUNG CẤP *</label>
                                   <select th:field="*{supplierId}" class="input-prem">
                                        <option value="">Chọn một nhà cung cấp...</option>
                                        <option th:each="s : ${suppliers}" th:value="${s.id}"
                                             th:text="${s.supplierName}"></option>
                                   </select>
                                   <div class="error-msg" th:if="${#fields.hasErrors('supplierId')}"
                                        th:errors="*{supplierId}"></div>
                              </div>
                              <div class="field-group">
                                   <label><i class="fas fa-sticky-note"></i> GHI CHÚ BÁO GIÁ</label>
                                   <textarea th:field="*{quotationNote}" class="input-prem" rows="1"
                                        placeholder="Nhập ghi chú chi tiết..."></textarea>
                                   <div class="error-msg" th:if="${#fields.hasErrors('quotationNote')}"
                                        th:errors="*{quotationNote}"></div>
                              </div>
                         </div>
                    </div>

                    <!-- Thẻ danh mục các mặt hàng (Line Items) -->
                    <div class="form-section-card items-card">
                         <div class="items-header">
                              <h2><i class="fas fa-list-ul"></i> CHI TIẾT MẶT HÀNG</h2>
                              <span class="items-count"
                                   th:text="'Tổng số mặt hàng: ' + ${#lists.size(quotationCreateRequest.quotationDetailCreateRequests)}">Tổng
                                   số mặt hàng: 0</span>
                         </div>

                         <table class="items-table">
                              <thead>
                                   <tr>
                                        <th>YÊU CẦU KỸ THUẬT</th>
                                        <th>LOẠI TÀI SẢN</th>
                                        <th style="width: 100px;">SL</th>
                                        <th>GHI CHÚ</th>
                                        <th style="width: 130px;">BẢO HÀNH</th>
                                        <th style="width: 220px;">ĐƠN GIÁ</th>
                                        <th style="width: 110px;">THUẾ %</th>
                                        <th style="width: 110px;">GIẢM GIÁ %</th>
                                        <th style="width: 80px; text-align: center;">THAO TÁC</th>
                                   </tr>
                              </thead>
                              <tbody>
                                   <tr th:each="item, stat : *{quotationDetailCreateRequests}">
                                        <td class="td-item-id">
                                             <input type="hidden"
                                                  th:field="*{quotationDetailCreateRequests[__${stat.index}__].purchaseRequestDetailId}">
                                             <input type="text" class="input-table"
                                                  th:field="*{quotationDetailCreateRequests[__${stat.index}__].specificationRequirement}">
                                        </td>

                                         <td class="td-item-name">
                                              <select class="input-table"
                                                  th:field="*{quotationDetailCreateRequests[__${stat.index}__].assetTypeName}">
                                                  <option th:each="a : ${assetTypes}" th:value="${a.typeName}"
                                                      th:text="${a.typeName}"></option>
                                              </select>
                                         </td>

                                        <td class="td-item-qty">
                                             <input type="number" class="input-table"
                                                  th:field="*{quotationDetailCreateRequests[__${stat.index}__].quantity}">

                                             <div class="error-msg"
                                                  th:if="${#fields.hasErrors('quotationDetailCreateRequests[__${stat.index}__].quantity')}"
                                                  th:errors="*{quotationDetailCreateRequests[__${stat.index}__].quantity}">
                                             </div>
                                        </td>

                                        <td>
                                             <input type="text" class="input-table" placeholder="Chi tiết..."
                                                  th:field="*{quotationDetailCreateRequests[__${stat.index}__].quotationDetailNote}">
                                             <div class="error-msg"
                                                  th:if="${#fields.hasErrors('quotationDetailCreateRequests[__${stat.index}__].quotationDetailNote')}"
                                                  th:errors="*{quotationDetailCreateRequests[__${stat.index}__].quotationDetailNote}">

                                             </div>
                                        </td>

                                        <td>
                                             <input type="number" class="input-table" placeholder="Tháng"
                                                  th:field="*{quotationDetailCreateRequests[__${stat.index}__].warrantyMonths}">
                                             <div class="error-msg"
                                                  th:if="${#fields.hasErrors('quotationDetailCreateRequests[__${stat.index}__].warrantyMonths')}"
                                                  th:errors="*{quotationDetailCreateRequests[__${stat.index}__].warrantyMonths}">

                                             </div>
                                        </td>

                                        <td>
                                             <div style="display: flex; flex-direction: column;">
                                                  <div class="price-container">
                                                       <span class="currency-label">VNĐ</span>
                                                       <input type="number" step="0.01" class="input-table"
                                                            th:field="*{quotationDetailCreateRequests[__${stat.index}__].price}">
                                                  </div>
                                                  <div class="error-msg"
                                                       th:if="${#fields.hasErrors('quotationDetailCreateRequests[__${stat.index}__].price')}"
                                                       th:errors="*{quotationDetailCreateRequests[__${stat.index}__].price}">
                                                  </div>
                                             </div>
                                        </td>

                                        <td>
                                             <input type="number" step="0.1" class="input-table"
                                                  th:field="*{quotationDetailCreateRequests[__${stat.index}__].taxRate}">
                                             <div class="error-msg"
                                                  th:if="${#fields.hasErrors('quotationDetailCreateRequests[__${stat.index}__].taxRate')}"
                                                  th:errors="*{quotationDetailCreateRequests[__${stat.index}__].taxRate}">

                                             </div>
                                        </td>

                                        <td>
                                             <input type="number" step="0.1" class="input-table"
                                                  th:field="*{quotationDetailCreateRequests[__${stat.index}__].discountRate}">

                                             <div class="error-msg"
                                                  th:if="${#fields.hasErrors('quotationDetailCreateRequests[__${stat.index}__].discountRate')}"
                                                  th:errors="*{quotationDetailCreateRequests[__${stat.index}__].discountRate}">

                                             </div>
                                        </td>

                                        <td>
                                             <div class="btn-icon-group">
                                                  <button type="submit" name="addDetail" th:value="${stat.index}"
                                                       class="btn-icon" title="Thêm lựa chọn"><i class="fas fa-plus"></i></button>
                                                  <button type="submit" name="removeDetail" th:value="${stat.index}"
                                                       class="btn-icon" title="Xóa"><i class="fas fa-times"></i></button>
                                             </div>
                                        </td>
                                   </tr>
                              </tbody>
                         </table>
                    </div>

                    <div class="form-footer-actions">
                         <div class="footer-info">
                              <i class="fas fa-info-circle"></i>
                              Vui lòng kiểm tra kỹ tất cả chi tiết trước khi lưu báo giá.
                         </div>
                         <a th:href="@{/purchases}" class="btn-form btn-cancel">
                              HỦY BỎ
                         </a>
                         <button type="submit" name="actions" value="draft" class="btn-form btn-draft">
                              <i class="fas fa-save"></i>
                              LƯU NHÁP
                         </button>
                         <button type="submit" name="actions" value="save" class="btn-form btn-save">
                              <i class="fas fa-paper-plane"></i>
                              GỬI BÁO GIÁ
                         </button>
                    </div>
               </form>
          </div>
     </div>

</body>

</html>
