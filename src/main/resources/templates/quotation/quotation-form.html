<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Purchase Form</title>
</head>

<body>

     <form th:action="@{/purchase-staff/purchases/{id}/quotation(id=${purchaseId})}"
          th:object="${quotationCreateRequest}" method="post">
          <h3>Purchase / Quotation Form</h3>

          <label>Note</label>
          <input type="text" th:field="*{quotationNote}" placeholder="Note">
          <div th:if="${#fields.hasErrors('quotationNote')}" th:errors="*{quotationNote}"></div>

          <hr>
          <div>
               <h4>Quotation Info</h4>

               <label>Supplier</label>
               <select th:field="*{supplierId}">
                    <option value="">-- Choose supplier --</option>
                    <option th:each="s : ${suppliers}" th:value="${s.id}" th:text="${s.supplierName}">
                    </option>
               </select>
               <div th:if="${#fields.hasErrors('supplierId')}" th:errors="*{supplierId}"></div>
               <br>

               <hr>
          </div>

          <!-- ===== Detail ===== -->
          <h4>Quotation Details</h4>

          <div th:if="${#lists.isEmpty(quotationCreateRequest.quotationCreateDetailRequestList)}">
               <p>No detail rows.</p>
          </div>

          <div th:each="item, stat : *{quotationCreateDetailRequestList}">

               <h5 th:text="'Line ' + (${stat.index} + 1)"></h5>

               <!-- Asset Info (Read-only) -->
               <div>
                    <strong th:text="${item.assetTypeName}"></strong>
                    <span th:text="' - ' + ${item.specificationRequirement}"></span>
               </div>

               <input type="hidden"
                    th:field="*{quotationCreateDetailRequestList[__${stat.index}__].purchaseRequestDetailId}">
               <input type="hidden" th:field="*{quotationCreateDetailRequestList[__${stat.index}__].assetTypeName}">
               <input type="hidden"
                    th:field="*{quotationCreateDetailRequestList[__${stat.index}__].specificationRequirement}">


               <!-- Quantity -->
               <label>Quantity</label>
               <input type="number" min="1" th:field="*{quotationCreateDetailRequestList[__${stat.index}__].quantity}">
               <div th:if="${#fields.hasErrors('quotationCreateDetailRequestList[' + stat.index + '].quantity')}"
                    th:errors="*{quotationCreateDetailRequestList[__${stat.index}__].quantity}"></div>

               <br>

               <!-- Description / Note -->
               <label>Quotation Detail Note</label>
               <input type="text" th:field="*{quotationCreateDetailRequestList[__${stat.index}__].quotationDetailNote}"
                    placeholder="Detail note">
               <div th:if="${#fields.hasErrors('quotationCreateDetailRequestList[' + stat.index + '].quotationDetailNote')}"
                    th:errors="*{quotationCreateDetailRequestList[__${stat.index}__].quotationDetailNote}"></div>

               <br>

               <!-- Warranty months -->
               <label>Warranty (months)</label>
               <input type="number" min="0"
                    th:field="*{quotationCreateDetailRequestList[__${stat.index}__].warrantyMonths}">
               <div th:if="${#fields.hasErrors('quotationCreateDetailRequestList[' + stat.index + '].warrantyMonths')}"
                    th:errors="*{quotationCreateDetailRequestList[__${stat.index}__].warrantyMonths}"></div>

               <br>

               <!-- Price -->
               <label>Unit Price</label>
               <input type="number" min="0" step="1"
                    th:field="*{quotationCreateDetailRequestList[__${stat.index}__].price}">
               <div th:if="${#fields.hasErrors('quotationCreateDetailRequestList[' + stat.index + '].price')}"
                    th:errors="*{quotationCreateDetailRequestList[__${stat.index}__].price}"></div>

               <br>

               <!-- Tax rate -->
               <!-- <label>Tax Rate (%)</label> -->
               <input type="hidden" min="0" max="100" step="0.01"
                    th:field="*{quotationCreateDetailRequestList[__${stat.index}__].taxRate}">

               <!-- Discount rate -->
               <!-- <label>Discount Rate (%)</label> -->
               <input type="hidden" min="0" max="100" step="0.01"
                    th:field="*{quotationCreateDetailRequestList[__${stat.index}__].discountRate}">


               <hr>
          </div>

          <br><br>

          <!-- Submit -->
          <button type="submit">Submit</button>

     </form>


</body>

</html>
