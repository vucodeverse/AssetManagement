<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tạo Yêu Cầu Cấp Phát</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/allocation/allocation-request-form.css}">
</head>
<body class="container mt-5">

<h2 class="mb-4">Tạo Yêu Cầu Cấp Phát Tài Sản</h2>

<form th:action="@{/department/allocation-request/save}" method="post">
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">Thông tin chung</div>

        <div class="card-body row">

            <div class="col-md-6 mb-3">
                <label class="form-label">Lý do cấp phát</label>
                <input type="text"
                       name="requestReason"
                       class="form-control" required
                       placeholder="VD: Cấp máy cho nhân viên mới">
            </div>

            <div class="col-md-3 mb-3">
                <label class="form-label">Độ ưu tiên</label>
                <select name="priority" class="form-select">
                    <option value="LOW">Thấp</option>
                    <option value="MEDIUM" selected>Trung bình</option>
                    <option value="HIGH">Cao</option>
                </select>
            </div>

            <div class="col-md-3 mb-3">
                <label class="form-label">Ngày cần (Hạn chót)</label>
                <input type="date" name="neededByDate" class="form-control" required>
            </div>

            <input type="hidden"
                   name="requesterId"
                   value="1">
            <input type="hidden" name="requestedDepartmentId" value="2">
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header bg-secondary text-white d-flex justify-content-between">
            Danh sách tài sản yêu cầu
            <button type="button" class="btn btn-sm btn-light" onclick="addRow()">
                + Thêm dòng
            </button>
        </div>

        <div class="card-body">
            <table class="table table-bordered" id="itemTable">
                <thead>
                <tr>
                    <th>Loại tài sản</th>
                    <th>Số lượng</th>
                    <th>Ghi chú chi tiết</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr class="item-row">
                    <td>
                        <select name="details[0].assetTypeId" class="form-select" required>
                            <option value="" hidden>-- Chọn loại --</option>
<!--                            <option th:each="type : ${assetTypes}"-->
<!--                                    th:value="${type.assetTypeId}"-->
<!--                                    th:text="${type.typeName}"></option>-->
                            <option value="1">Laptop Dell Latitude 5440</option>
                            <option value="2">Máy in HP LaserJet Pro M404dn</option>
                            <option value="3">Điện thoại iPhone 14</option>
                            <option value="4">Màn hình Dell UltraSharp U2723QE</option>
                        </select>
                    </td>
                    <td><input type="number" name="details[0].requestedQuantity" class="form-control" min="1" value="1" required></td>
                    <td><input type="text" name="details[0].note" class="form-control" placeholder="Ghi chú..."></td>
                    <td><button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">Xóa</button></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-5">
        <a th:href="@{/department/allocation-request/list}" class="btn btn-back-custom">
            <i class="fas fa-arrow-left"></i> <- Quay lại
        </a>

        <div class="d-flex gap-3">
            <button type="reset" class="btn btn-reset-custom">Nhập lại</button>
            <button type="submit" class="btn btn-submit-custom">Gửi yêu cầu</button>
        </div>
    </div>
</form>

<script>
    function addRow() {

        const tbody =
            document.querySelector("#itemTable tbody");

        const rowCount = tbody.rows.length;

        const newRow = tbody.rows[0].cloneNode(true);

        newRow.querySelectorAll("select, input").forEach(input => {

            if (input.name.includes("assetTypeId"))
                input.name = `details[${rowCount}].assetTypeId`;

            if (input.name.includes("requestedQuantity"))
                input.name = `details[${rowCount}].requestedQuantity`;

            if (input.name.includes("note"))
                input.name = `details[${rowCount}].note`;

            if (input.tagName === "SELECT")
                input.selectedIndex = 0;

            if (input.type === "number")
                input.value = 1;

            if (input.type === "text")
                input.value = "";
        });

        tbody.appendChild(newRow);
    }

    function removeRow(btn) {

        const tbody =
            document.querySelector("#itemTable tbody");

        if (tbody.rows.length > 1)
            btn.closest("tr").remove();
    }
</script>
</body>
</html>
