<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/department-layout}">

<head>
    <title>Danh sách tài sản bộ phận</title>
    <th:block layout:fragment="extra-css">
        <!-- Tái sử dụng CSS của manager asset list -->
        <link rel="stylesheet" th:href="@{/css/asset/asset-list.css}">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    </th:block>
</head>

<body>
<th:block layout:fragment="content">
    <div class="page-container">
        <header class="page-header">
            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>
            <h1 class="page-title">TÀI SẢN BỘ PHẬN</h1>
        </header>

        <!-- Filter Section -->
        <form th:action="@{/department/assets}" method="get" class="filter-bar">
            <div class="filter-item">
                <label>Tìm kiếm</label>
                <input type="text" name="keyword" placeholder="Tên tài sản..." th:value="${keyword}">
            </div>

            <div class="filter-item">
                <label>Trạng thái</label>
                <select name="status">
                    <option value="">Tất cả</option>
                    <option th:each="s : ${filterStatuses}" th:value="${s}"
                            th:text="${s.description}" th:selected="${status == s}">
                    </option>
                </select>
            </div>

            <div class="filter-item">
                <label>Từ ngày</label>
                <input type="date" name="fromDate" th:value="${fromDate}">
            </div>

            <div class="filter-item">
                <label>Đến ngày</label>
                <input type="date" name="toDate" th:value="${toDate}">
            </div>

            <div class="filter-buttons">
                <button type="submit" class="search-btn">Tìm kiếm</button>
                <a th:href="@{/department/assets}" class="btn-reset">Reset</a>
            </div>
        </form>

        <!-- Asset Table -->
        <div class="table-wrapper">
            <table class="asset-table">
                <thead>
                <tr>
                    <th class="col-id">Mã</th>
                    <th class="col-name">Tên tài sản</th>
                    <th class="col-type">Loại</th>
                    <th class="col-status">Trạng thái</th>
                    <th class="col-date">Ngày nhận</th>
                    <th class="col-action">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="asset : ${assets}">
                    <td th:text="${asset.assetId}"></td>
                    <td th:text="${asset.assetName}"></td>
                    <td th:text="${asset.assetTypeName}"></td>
                    <td>
                                <span class="status-badge"
                                      th:classappend="'status-' + ${#strings.replace(#strings.toLowerCase(asset.currentStatus.name()), '_', '-')}"
                                      th:text="${asset.currentStatus.description}">
                                </span>
                    </td>
                    <td th:text="${asset.acquisitionDate}"></td>
                    <td class="col-action">
                        <a th:href="@{/department/assets/detail/{id}(id=${asset.assetId})}" class="action-icon">
                            <i class="fas fa-eye"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${assets == null or assets.isEmpty()}">
                    <td colspan="6" style="text-align: center; padding: 20px;">Không tìm thấy tài sản nào.</td>
                </tr>
                </tbody>
            </table>

            <!-- Pagination -->
            <div class="pagination" th:if="${page.totalPages > 1}">
                <span>Trang [[${page.currentPage + 1}]] / [[${page.totalPages}]]</span>
                <div class="pagination-controls">
                    <a th:if="${page.currentPage > 0}" th:href="@{/department/assets(page=${page.currentPage}, keyword=${keyword}, status=${status}, fromDate=${fromDate}, toDate=${toDate})}" class="pagination-btn">Trước</a>

                    <a th:each="i : ${#numbers.sequence(1, page.totalPages)}"
                       th:href="@{/department/assets(page=${i}, keyword=${keyword}, status=${status}, fromDate=${fromDate}, toDate=${toDate})}"
                       th:text="${i}"
                       th:classappend="${i == page.currentPage + 1} ? 'active' : ''"
                       class="pagination-btn"></a>

                    <a th:if="${page.currentPage + 1 < page.totalPages}" th:href="@{/department/assets(page=${page.currentPage + 2}, keyword=${keyword}, status=${status}, fromDate=${fromDate}, toDate=${toDate})}" class="pagination-btn">Tiếp</a>
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
