<!-- templates/supplier/supplier-deactivate.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Deactivate Supplier</title>
</head>
<body>

<h2>Deactivate Supplier</h2>

<div style="color:red; font-weight:bold;">
     Are you sure you want to deactivate this supplier?
</div>

<br/>

<table border="1">
    <tr>
        <td>Supplier Code</td>
        <td th:text="${supplierResponse.supplierCode}"></td>
    </tr>
    <tr>
        <td>Supplier Name</td>
        <td th:text="${supplierResponse.supplierName}"></td>
    </tr>
    <tr>
        <td>Status</td>
        <td th:text="${supplierResponse.status}"></td>
    </tr>
</table>

<br/>

<!-- Business rule: Only allow deactivate if ACTIVE -->
<div th:if="${supplierResponse.status == 'ACTIVE'}">

    <form th:action="@{/suppliers/{code}/deactivate(code=${supplierResponse.supplierCode})}"
          method="post">

        <button type="submit" style="background-color:red;color:white;">
            Confirm Deactivate
        </button>

        <a th:href="@{/suppliers/{code}(code=${supplierResponse.supplierCode})}">
            Cancel
        </a>

    </form>

</div>

<div th:if="${supplierResponse.status == 'INACTIVE'}" style="color:gray;">
    This supplier is already inactive.
    <br/><br/>
    <a th:href="@{/suppliers}">Back to List</a>
</div>

</body>
</html>
