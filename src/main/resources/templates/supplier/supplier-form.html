<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Form</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/form.css}">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<header class="topbar">
    <div class="topbar-left">
        <i data-lucide="menu"></i>
        <span class="title">QUẢN LÝ NHÀ CUNG CẤP</span>
    </div>

    <div class="topbar-right">
        <i data-lucide="bell" style="width:20px;color:#6b7280;cursor:pointer;"></i>
        <div class="avatar">
            <i data-lucide="user"></i>
        </div>
    </div>
</header>

<main class="container">

    <!-- Breadcrumb -->
    <nav class="breadcrumb">
        <a th:href="@{/}">Trang chủ</a> /
        <a th:href="@{/suppliers}">Quản lý nhà cung cấp</a> /
        <span th:text="${supplierUpdateRequest != null} ? 'Chỉnh sửa nhà cung cấp' : 'Tạo nhà cung cấp'"></span>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <h2 th:text="${supplierUpdateRequest != null} ? 'Chỉnh sửa nhà cung cấp' : 'Tạo mới nhà cung cấp'"></h2>
        <p>Vui lòng điền đầy đủ các thông tin bắt buộc để hoàn tất việc đăng ký nhà cung cấp vào hệ thống.</p>
    </div>

    <!-- Error Alert -->
    <div th:if="${error}" class="alert-error">
        <i data-lucide="alert-circle"></i>
        <span th:text="${error}"></span>
    </div>

    <!-- Card -->
    <section class="card">

        <h3 class="section-title">Thông tin cơ bản</h3>

        <form method="post"
              th:action="${supplierUpdateRequest != null} ? @{/suppliers/{code}/edit(code=${supplierCode})} : @{/suppliers/create}"
              th:object="${supplierUpdateRequest != null ? supplierUpdateRequest : supplierCreateRequest}">

            <div class="form-grid">

                <!-- Supplier Code -->
                <div class="form-group">
                    <label>Mã nhà cung cấp <span class="required">*</span></label>

                    <div th:if="${supplierUpdateRequest != null}"
                         class="readonly-box"
                         th:text="${supplierCode}">
                    </div>

                    <input th:if="${supplierUpdateRequest == null}"
                           type="text"
                           th:field="*{supplierCode}"
                           placeholder="Nhập mã nhà cung cấp..."
                           required>
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="text"
                           th:field="*{phoneNumber}"
                           placeholder="024 xxxx xxxx">
                </div>

                <!-- Supplier Name -->
                <div class="form-group">
                    <label>Tên nhà cung cấp <span class="required">*</span></label>
                    <input type="text"
                           th:field="*{supplierName}"
                           placeholder="Nhập tên chính thức của công ty..."
                           required>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label>Email liên hệ</label>
                    <input type="email"
                           th:field="*{email}"
                           placeholder="example@company.com">
                </div>

                <!-- Tax Code -->
                <div class="form-group">
                    <label>Mã số thuế <span class="required">*</span></label>
                    <input type="text"
                           th:field="*{taxCode}"
                           placeholder="Ví dụ: 0101234567"
                           required>
                </div>

                <!-- Empty cell for alignment -->
                <div class="form-group"></div>

                <!-- Address -->
                <div class="form-group full-width">
                    <label>Địa chỉ trụ sở <span class="required">*</span></label>
                    <textarea th:field="*{address}"
                              placeholder="Số nhà, tên đường, phường/xã, quận/huyện, tỉnh/thành phố..."
                              required></textarea>
                </div>

            </div>

            <!-- Actions -->
            <div class="form-actions">
                <a th:href="@{/suppliers}" class="btn btn-outline">Hủy bỏ</a>

                <button type="submit" class="btn btn-primary">
                    <i data-lucide="save" style="width:16px;margin-right:8px;"></i>
                    <span th:text="${supplierUpdateRequest != null} ? 'Cập nhật thông tin' : 'Lưu thông tin'"></span>
                </button>
            </div>

        </form>
    </section>

</main>

<script>
    lucide.createIcons();
</script>

</body>
</html>
