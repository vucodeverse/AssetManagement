<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <meta charset="UTF-8">
    <title th:text="${supplierCreateRequest.supplierCode != null ? 'Cập nhật nhà cung cấp' : 'Tạo nhà cung cấp'} + ' | PROCUREX'">Tạo nhà cung cấp | PROCUREX</title>
    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" th:href="@{/css/supplier/form.css}">
    </th:block>
</head>
<body>

<th:block layout:fragment="content">
    <main class="container">
        <!-- Breadcrumb -->
        <nav class="breadcrumb" style="margin-bottom: 24px; font-size: 14px; color: #718096;">
            <a th:href="@{/suppliers}" style="text-decoration: none; color: #1a1a1a; font-weight: 500;">Nhà cung cấp</a>
            <span style="margin: 0 8px;">/</span>
            <span th:text="${supplierCreateRequest.supplierCode != null ? 'Cập nhật' : 'Tạo mới'}">Tạo mới</span>
        </nav>

        <!-- Page Header -->
        <div class="page-header" style="margin-bottom: 32px;">
            <h2 style="font-size: 28px; font-weight: 800; color: #1a1a1a; margin-bottom: 8px;" th:text="${supplierCreateRequest.supplierCode != null ? 'Cập nhật thông tin nhà cung cấp' : 'Tạo mới nhà cung cấp'}">Tạo mới nhà cung cấp</h2>
            <p style="color: #4a5568; font-size: 15px;">Vui lòng điền đầy đủ các thông tin bắt buộc để quản lý nhà cung cấp trong hệ thống.</p>
        </div>

        <!-- Error Alert -->
        <div th:if="${error}" class="alert-error" style="background: #fff5f5; border-left: 4px solid #f56565; color: #c53030; padding: 16px; border-radius: 8px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; font-weight: 500;">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Card -->
        <section class="card" style="background: white; border-radius: 16px; padding: 32px; border: 1px solid #edf2f7; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
            <h3 class="section-title" style="font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #edf2f7;">Thông tin cơ bản</h3>

            <form method="post" th:action="@{/suppliers/create}" th:object="${supplierCreateRequest}">
                <div class="form-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;">
                    <!-- Supplier Code -->
                    <div class="form-group">
                        <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 8px;">Mã nhà cung cấp <span class="required" style="color: #f56565;">*</span></label>
                        <input type="text" th:field="*{supplierCode}" placeholder="Nhập mã nhà cung cấp..." required style="width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px; transition: border-color 0.2s;">
                    </div>

                    <!-- Phone -->
                    <div class="form-group">
                        <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 8px;">Số điện thoại</label>
                        <input type="text" th:field="*{phoneNumber}" placeholder="024 xxxx xxxx" style="width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px;">
                    </div>

                    <!-- Supplier Name -->
                    <div class="form-group">
                        <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 8px;">Tên nhà cung cấp <span class="required" style="color: #f56565;">*</span></label>
                        <input type="text" th:field="*{supplierName}" placeholder="Nhập tên chính thức..." required style="width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px;">
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 8px;">Email liên hệ</label>
                        <input type="email" th:field="*{email}" placeholder="example@company.com" style="width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px;">
                    </div>

                    <!-- Tax Code -->
                    <div class="form-group">
                        <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 8px;">Mã số thuế <span class="required" style="color: #f56565;">*</span></label>
                        <input type="text" th:field="*{taxCode}" placeholder="Ví dụ: 0101234567" required style="width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px;">
                    </div>

                    <div class="form-group"></div>

                    <!-- Address -->
                    <div class="form-group full-width" style="grid-column: span 2;">
                        <label style="display: block; font-size: 14px; font-weight: 600; color: #4a5568; margin-bottom: 8px;">Địa chỉ trụ sở <span class="required" style="color: #f56565;">*</span></label>
                        <textarea th:field="*{address}" placeholder="Số nhà, tên đường, phường/xã, quận/huyện, tỉnh/thành phố..." required style="width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px; min-height: 100px; resize: vertical;"></textarea>
                    </div>
                </div>

                <!-- Actions -->
                <div class="form-actions" style="margin-top: 40px; display: flex; justify-content: flex-end; gap: 16px; padding-top: 24px; border-top: 1px solid #edf2f7;">
                    <a th:href="@{/suppliers}" class="btn btn-outline" style="padding: 12px 28px; border: 1.5px solid #e2e8f0; border-radius: 10px; color: #4a5568; text-decoration: none; font-weight: 600; transition: all 0.2s;">Hủy bỏ</a>
                    <button type="submit" class="btn btn-primary" style="padding: 12px 32px; background: #1a1a1a; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: transform 0.1s;">
                        <i class="fas fa-save" style="margin-right: 8px;"></i> Lưu thông tin
                    </button>
                </div>
            </form>
        </section>
    </main>
</th:block>

<th:block layout:fragment="extra-js">
</th:block>

</body>
</html>

            </div>

        </form>
    </section>

</main>

<script>
    lucide.createIcons();
</script>

</body>
</html>
