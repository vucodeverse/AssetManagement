<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Supplier Detail</title>
</head>
<body>

<h2>Supplier Detail</h2>

<div th:if="${error}" style="color:red;" th:text="${error}"></div>

<table border="1">
    <tr><td>Code</td><td th:text="${supplierResponse.supplierCode}"></td></tr>
    <tr><td>Name</td><td th:text="${supplierResponse.supplierName}"></td></tr>
    <tr><td>Tax Code</td><td th:text="${supplierResponse.taxCode}"></td></tr>
    <tr><td>Email</td><td th:text="${supplierResponse.email}"></td></tr>
    <tr><td>Phone</td><td th:text="${supplierResponse.phone}"></td></tr>
    <tr><td>Address</td><td th:text="${supplierResponse.address}"></td></tr>
    <tr><td>Contact Person</td><td th:text="${supplierResponse.contactPerson}"></td></tr>
    <tr>
        <td>Status</td>
        <td>
            <span th:if="${supplierResponse.status == 'ACTIVE'}"
                  style="color:green;">Active</span>
            <span th:if="${supplierResponse.status == 'INACTIVE'}"
                  style="color:red;">Inactive</span>
        </td>
    </tr>
    <tr><td>Created By</td><td th:text="${supplierResponse.createdBy}"></td></tr>
    <tr><td>Created At</td><td th:text="${supplierResponse.createdAt}"></td></tr>
    <tr><td>Updated By</td><td th:text="${supplierResponse.updatedBy}"></td></tr>
    <tr><td>Updated At</td><td th:text="${supplierResponse.updatedAt}"></td></tr>
</table>

<br>

<a th:href="@{/suppliers}">Back to List</a>

<span th:if="${supplierResponse.status == 'ACTIVE'}">
    |
    <a th:href="@{/suppliers/{code}/deactivate(code=${supplierResponse.supplierCode})}">
    Deactivate
</a>
</span>

</body>
</html>
