<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/department-layout}">

<head>
    <meta charset="UTF-8">
    <title>Danh sách yêu câu cấp phát</title>

    <!-- link CSS -->
    <link rel="stylesheet" th:href="@{/css/allocation/allocation-request-list.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
</head>

<body>
<th:block layout:fragment="content">

<div class="purchase-content-wrapper">
    <form method="get" th:action="@{${session.role == 'DEPARTMENT_MANAGER'
                    ? '/department/allocation-request/search'
                    : '/asset-manager/allocation-request/search'}}">

        <header class="top-bar">

            <h1>Danh sách yêu cầu cấp phát</h1>

            <div class="top-actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm kiếm...">
                </div>
            </div>

            <a th:if="${session.role == 'DEPARTMENT_MANAGER'}"
               th:href="@{/department/allocation-request/create}" class="btn-add">
                <i class="fas fa-plus"></i>
                Tạo yêu cầu
            </a>

        </header>

        <!-- FILTER BAR -->
        <section class="filters-bar">

            <div class="filter-group">
                <select name="status">
                    <option value="">Trạng thái: Tất cả</option>
                    <option value="PENDING_AM" th:selected="${status == 'PENDING_AM'}">ĐANG CHỜ
                    </option>
                    <option value="APPROVED" th:selected="${status == 'APPROVED'}">ĐÃ DUYỆT
                    </option>
                    <option value="REJECTED" th:selected="${status == 'REJECTED'}">TỪ CHỐI
                    </option>
                    <option value="COMPLETED" th:selected="${status == 'COMPLETED'}">HOÀN THÀNH
                    </option>
                </select>

                <select name="priority">
                    <option value="">Ưu tiên: Tất cả</option>

                    <option th:each="p : ${T(edu.fpt.groupfive.common.Priority).values()}"
                            th:value="${p.name()}"
                            th:selected="${priority != null && priority.name() == p.name()}"
                            th:text="${p.description}"></option>
                </select>

                <select th:if="${session.role == 'ASSET_MANAGER'}" name="department">
                    <option value="">Phòng bạn: Tất cả</option>

                    <option th:each="d : ${departments}"
                            th:value="${d.departmentId}"
                            th:selected="${departments != null && d.departmentId == department}"
                            th:text="${d.departmentName}">

                    </option>
                </select>

                <input type="date" name="fromDate" th:value="${fromDate}">

                <input type="date" name="toDate" th:value="${toDate}">

                <button type="submit">
                    ÁP DỤNG
                </button>

                <div th:if="${session.role == 'DEPARTMENT_MANAGER'}">
                    <a class="btn-reset" th:href="@{/department/allocation-request/list}">
                        KHÔI PHỤC
                    </a>
                </div>
                <div th:if="${session.role == 'ASSET_MANAGER'}">
                    <a class="btn-reset" th:href="@{/asset-manager/allocation-request/list}">
                        KHÔI PHỤC
                    </a>
                </div>
            </div>
        </section>

    </form>

    <!-- Success Message -->
    <div th:if="${message}" class="success-alert"
         style="background-color: #f0fdf4; border: 1px solid #16a34a; color: #166534; padding: 16px; border-radius: 4px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px;">
        <i class="fas fa-check-circle"></i>
        <span th:text="${message}" style="font-weight: 600; font-size: 14px;">Success message here</span>
    </div>

    <div th:if="${error}" class="error-alert"
         style="background-color: #fef2f2; border: 1px solid #ef4444; color: #991b1b; padding: 16px; border-radius: 4px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px;">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}" style="font-weight: 600; font-size: 14px;">Nội dung lỗi ở đây</span>
    </div>

    <!-- TABLE -->
    <div class="table-container" id="allocationTable">

        <table class="data-table">

            <thead>
            <tr>
                <th class="sort-id">ID yêu cầu</th>
                <th>Trạng thái</th>
                <th>Người tạo</th>
                <th th:if="${session.role == 'ASSET_MANAGER'}">Phòng ban</th>
                <th class="sort-needed">Ngày cần nhận</th>
                <th>Độ ưu tiên</th>
                <th class="sort-created">Ngày khởi tạo</th>
                <th>Hành động</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="x : ${requests}" class="clickable-row"
                th:attr="onclick=|window.location.href='${session.role == 'DEPARTMENT_MANAGER'
                                ? '/department/allocation-request/detail/' + x.requestId
                                : '/asset-manager/allocation-request/detail/' + x.requestId}'|">

                <!-- ID -->
                <td class="cell-id" th:text="'AR-' + ${x.requestId}">
                </td>

                <!-- STATUS -->
                <td>
                     <span th:if="${x.status == 'PENDING_AM'}"
                           class="status-badge status-PENDING_AM">
                        ĐANG CHỜ
                    </span>
                    <span th:if="${x.status == 'APPROVED'}"
                          class="status-badge status-APPROVED">
                        ĐÃ DUYỆT
                    </span>
                    <span th:if="${x.status == 'REJECTED'}"
                          class="status-badge status-REJECTED">
                        TỪ CHỐI
                    </span>
                    <span th:if="${x.status == 'COMPLETED'}"
                          class="status-badge status-COMPLETED">
                        HOÀN THÀNH
                    </span>
                </td>

                <!-- REQUESTER -->
                <td th:text="${x.userName}">
                </td>

                <!-- DEPARTMENT -->
                <td th:if="${session.role == 'ASSET_MANAGER'}" th:text="${x.requestedDepartmentName}">
                </td>

                <!-- NEEDED DATE -->
                <td>
                            <span th:if="${x.neededByDate != null}"
                                  th:text="${#temporals.format(x.neededByDate,'dd-MM-yyyy')}">
                            </span>

                    <span th:if="${x.neededByDate == null}">
                                —
                            </span>
                </td>

                <!-- PRIORITY -->
                <td>
                            <span class="pill"
                                  th:classappend="'pill-' + ${x.priority.name()}"
                                  th:text="${x.priority.getDescription()}">
                            </span>
                </td>

                <!-- CREATED AT -->
                <td>
                            <span th:text="${#temporals.format(x.createdAt,'dd-MM-yyyy')}">
                            </span>
                </td>

                <!-- ACTIONS -->
                <td onclick="event.stopPropagation();">
                    <!-- Quyền cho Trưởng phòng (DEPARTMENT_MANAGER) - Sửa/Xóa -->
                    <th:block th:if="${session.role == 'DEPARTMENT_MANAGER'}">
                        <a th:if="${x.status == 'PENDING_AM'}"
                           th:href="@{/department/allocation-request/edit/{id}(id=${x.requestId})}"
                           class="btn btn-sm btn-outline-primary" title="Sửa yêu cầu">
                            <i class="fas fa-edit"></i>
                        </a>

                        <form th:if="${x.status == 'PENDING_AM'}"
                              th:action="@{/department/allocation-request/delete/{id}(id=${x.requestId})}"
                              method="post" style="display:inline;"
                              onsubmit="return confirm('Bạn có chắc muốn xóa yêu cầu này không?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa yêu cầu">
                                <i class="far fa-trash-alt"></i>
                            </button>
                        </form>
                    </th:block>

                    <!-- Quyền cho Quản lý tài sản (ASSET_MANAGER) - Duyệt/Từ chối -->
                    <th:block th:if="${session.role == 'ASSET_MANAGER'}">
                        <!-- APPROVE -->
                        <form th:if="${x.status == 'PENDING_AM'}"
                              th:action="@{/asset-manager/allocation-request/approve/{id}(id=${x.requestId})}"
                              method="post" style="display:inline;"
                              onsubmit="return confirm('Xác nhận duyệt yêu cầu này?');">
                            <button type="submit" class="btn btn-sm btn-success" title="Duyệt yêu cầu">
                                <i class="fas fa-check"></i>
                            </button>
                        </form>

                        <!-- REJECT -->
                        <a th:if="${x.status == 'PENDING_AM'}"
                           th:href="'#reject-modal-' + ${x.requestId}"
                           class="btn btn-sm btn-danger"
                           title="Từ chối yêu cầu"
                           onclick="event.stopPropagation();">
                            <i class="fas fa-times"></i>
                        </a>
                    </th:block>
                </td>

            </tr>
            </tbody>
        </table>

        <!-- Modal từ chối cho Asset Manager -->
        <div th:each="x : ${requests}" th:if="${session.role == 'ASSET_MANAGER' and x.status == 'PENDING_AM'}"
             th:id="'reject-modal-' + ${x.requestId}" class="modal-overlay">
            <div class="reject-dialog">
                <div class="reject-dialog-header">
                    <h3 class="reject-dialog-title">
                        Từ chối yêu cầu AR-<span th:text="${x.requestId}"></span>
                    </h3>
                    <a href="#" class="modal-close">&times;</a>
                </div>
                <form th:action="@{/asset-manager/allocation-request/reject/{id}(id=${x.requestId})}" method="post">
                    <div class="reject-dialog-body">
                        <label style="width: 100%;">
                            <textarea name="reasonReject" placeholder="Nhập lý do từ chối..." required></textarea>
                        </label>
                    </div>
                    <div class="modal-actions">
                        <a href="#" class="btn-cancel">Hủy</a>
                        <button type="submit" class="btn-submit">
                            Xác nhận từ chối
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>

</div>

<script th:inline="none">
    $(document).ready(function () {

        $('.data-table').DataTable({

            pageLength: 5,
            lengthChange: false,
            searching: false,
            info: true,

            ordering: true,

            columnDefs: [
                {orderable: true, targets: 'sort-id'}, // ID yêu cầu
                {orderable: true, targets: 'sort-needed'}, // Ngày cần nhận
                {orderable: true, targets: 'sort-created'}, // Ngày khởi tạo

                // Các cột còn lại không sort
                {orderable: false, targets: '_all'}
            ],

            // Mặc định sort theo id
            order: [[0, 'asc']],

            //Ngôn ngữ
            language: {
                info: "Hiển thị _START_ đến _END_ của tổng số _TOTAL_ danh sách",
                infoEmpty: "Không có dữ liệu",
                paginate: {
                    first: "Đầu",
                    last: "Cuối",
                    next: ">",
                    previous: "<"
                },
                emptyTable: "Không có dữ liệu trong bảng",
                zeroRecords: "Không tìm thấy dữ liệu"
            }
        });

    });
</script>

</th:block>
</body>

</html>
