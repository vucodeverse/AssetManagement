<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Xử lý yêu cầu cấp phát</title>

    <!-- link CSS -->
    <link rel="stylesheet" th:href="@{/css/allocation/allocation-request-list.css}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
</head>

<body>
    <div class="purchase-content-wrapper">

        <form method="get" th:action="@{/asset-manager/allocation-request/list}">

            <header class="top-bar">

                <h1>Danh sách yêu cầu cấp phát</h1>

                <div class="top-actions">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Tìm kiếm...">
                    </div>
                </div>

            </header>


            <!-- FILTER BAR -->
            <section class="filters-bar">

                <div class="filter-group">
                    <select>
                        <option value="">Trạng thái: Tất cả</option>
                        <option value="PENDING_AM">ĐANG CHỜ</option>
                        <option value="APPROVED">ĐÃ DUYỆT</option>
                        <option value="REJECTED">TỪ CHỐI</option>
                        <option value="COMPLETED">HOÀN THÀNH</option>

                    </select>

                    <select>
                        <option value="">Ưu tiên: Tất cả</option>
                        <option value="HIGH">CAO</option>
                        <option value="MEDIUM">TRUNG BÌNH</option>
                        <option value="LOW">THẤP</option>
                    </select>

                    <input type="date">
                    <input type="date">

                    <button type="submit">
                        ÁP DỤNG
                    </button>

                    <a class="btn-reset" th:href="@{/asset-manager/allocation-request/list}">
                        CHẠY LẠI
                    </a>
                </div>
            </section>

        </form>


        <!-- TABLE -->
        <div class="table-container">

            <table class="data-table">

                <thead>
                    <tr>
                        <th>ID yêu cầu</th>
                        <th>Trạng thái</th>
                        <th>Người tạo</th>
                        <th>Phòng ban</th>
                        <th>Ngày cần nhận</th>
                        <th>Độ ưu tiên</th>
                        <th>Ngày khởi tạo</th>
                        <th>Hành động</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="x : ${requests}" class="clickable-row"
                        th:attr="onclick=|window.location.href='/department/allocation-request/detail/${x.requestId}'|">

                        <!-- ID -->
                        <td class="cell-id" th:text="'AR-' + ${x.requestId}">
                        </td>


                        <!-- STATUS -->
                        <td>
                            <span class="status-badge" th:classappend="' status-' + ${x.status}" th:text="${x.status}">
                            </span>
                        </td>

                        <!-- REQUESTER -->
                        <td th:text="${x.userName}">
                        </td>

                        <!-- DEPARTMENT -->
                        <td th:text="${x.requestedDepartmentName}">
                        </td>

                        <!-- NEEDED DATE -->
                        <td>
                            <span th:if="${x.neededByDate != null}"
                                th:text="${#temporals.format(x.neededByDate,'dd-MM-yyyy')}">
                            </span>

                            <span th:if="${x.neededByDate == null}">
                                —
                            </span>
                        </td>

                        <!-- PRIORITY -->
                        <td>
                            <span class="pill" th:classappend="'pill-' + ${x.priority}" th:text="${x.priority}">
                            </span>
                        </td>

                        <!-- CREATED AT -->
                        <td>
                            <span th:text="${#temporals.format(x.createdAt,'dd-MM-yyyy')}">
                            </span>
                        </td>

                        <!-- ACTIONS -->
                        <td onclick="event.stopPropagation();">
                            <!-- APPROVE -->
                            <form th:if="${x.status == 'PENDING_AM'}"
                                th:action="@{/asset-manager/allocation-request/approve/{id}(id=${x.requestId})}"
                                method="post" style="display:inline;"
                                onsubmit="return confirm('Xác nhận duyệt yêu cầu này?');">
                                <button type="submit" class="btn btn-sm btn-success" title="Approve">
                                    <i class="fas fa-check"></i>
                                </button>
                            </form>

                            <!-- REJECT -->
                            <a th:if="${x.status == 'PENDING_AM'}" th:href="'#reject-modal-' + ${x.requestId}"
                                class="btn btn-sm btn-danger" onclick="event.stopPropagation();">
                                <i class="fas fa-times"></i>
                            </a>
                        </td>

                    </tr>
                </tbody>
            </table>


            <div th:each="x : ${requests}" th:id="'reject-modal-' + ${x.requestId}" class="modal-overlay">
                <div class="reject-dialog">
                    <div class="reject-dialog-header">
                        <h3 class="reject-dialog-title">
                            Reject Request AR-<span th:text="${x.requestId}"></span>
                        </h3>
                        <a href="#" class="modal-close">&times;</a>
                    </div>
                    <form th:action="@{/asset-manager/allocation-request/reject/{id}(id=${x.requestId})}" method="post">
                        <div class="reject-dialog-body">
                            <textarea name="reasonReject" placeholder="Nhập lý do từ chối..." required></textarea>
                        </div>
                        <div class="modal-actions">
                            <a href="#" class="btn-cancel">Cancel</a>
                            <button type="submit" class="btn-submit">
                                Confirm Reject
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
