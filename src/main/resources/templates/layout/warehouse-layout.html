<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Quản Lý Kho - Hệ Thống Tài Sản'">Quản Lý Kho</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- CSS layout chung (reusing manager styles as they are clean) -->
    <link rel="stylesheet" th:href="@{/css/layout/manager.css}">

    <!-- Extra CSS từ page con -->
    <th:block layout:fragment="extra-css"></th:block>
</head>

<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar chuyên biệt cho Warehouse -->
        <div th:replace="~{fragment/warehouse-sidebar :: sidebar(${activeMenu}, ${userId})}"></div>

        <!-- Nội dung chính -->
        <div class="content-container">
            <main layout:fragment="content">
                <!-- Nội dung được chèn ở đây -->
            </main>
        </div>
    </div>

    <!-- Extra JS từ page con -->
    <th:block layout:fragment="extra-js"></th:block>
</body>

</html>
