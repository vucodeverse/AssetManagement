<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Hệ thống Tài sản'">Hệ thống Tài sản</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <!-- CSS layout chung -->
    <link rel="stylesheet" th:href="@{/css/layout/manager.css}">

    <!-- Extra CSS từ page con -->
    <th:block layout:fragment="extra-css"></th:block>
</head>

<body>
<div class="dashboard-wrapper">
    <!-- Sidebar fixed -->
    <div th:replace="~{fragment/manager-sidebar :: sidebar(${activeMenu}, ${activeSub})}"></div>

    <!-- Wrapper đẩy nội dung sang phải -->

    <div class="content-container">
        <main layout:fragment="content">

        </main>
    </div>
</div>


<th:block layout:fragment="extra-js"></th:block>
</body>
</html>
