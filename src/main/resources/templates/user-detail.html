<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Form</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .error-message {
            color: red;
            font-size: 0.85em;
        }
    </style>
</head>

<body class="container py-5">

<div class="form-container mx-auto" style="max-width: 800px;">

    <h2 style="text-align:center" class="mb-2"
        th:text="${mode == 'Edit' ? 'Edit User' : 'Add New User'}">
    </h2>


    <form th:action="${mode == 'Edit' ? '/admin/update' : '/admin/create'}"
          th:object="${user}"
          method="post">

        <input type="hidden" name="mode" th:value="${mode}"/>

        <!-- ===== User ID  ===== -->
        <div class="form-group" th:if="${mode == 'Edit'}">
            <div class="card-header bg-primary text-white">
                <h3>ID người dùng: <span th:text="${user.userId}"></span></h3>
                <input type="hidden" th:field="*{userId}"/>
            </div>
        </div>

        <!-- ===== Username ===== -->
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text"
                   th:field="*{username}"
                   class="form-control"
                   th:readonly="${mode == 'Edit'}">

            <span class="error-message"
                  th:if="${#fields.hasErrors('username')}"
                  th:errors="*{username}">
            </span>
        </div>

        <!-- ===== Password  ===== -->
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password"
                   th:field="*{password}"
                   class="form-control">

            <span class="error-message"
                  th:if="${#fields.hasErrors('password')}"
                  th:errors="*{password}">
            </span>
        </div>


        <div class="row form-group">
            <!-- ===== First name ===== -->
            <div class="col-md-6">
                <label>Tên</label>
                <input type="text"
                       th:field="*{firstName}"
                       class="form-control">

                <span class="error-message"
                      th:if="${#fields.hasErrors('firstName')}"
                      th:errors="*{firstName}">
                </span>
            </div>

            <!-- ===== Last name ===== -->
            <div class="col-md-6">
                <label>Họ</label>
                <input type="text"
                       th:field="*{lastName}"
                       class="form-control">

                <span class="error-message"
                      th:if="${#fields.hasErrors('lastName')}"
                      th:errors="*{lastName}">
                </span>
            </div>
        </div>

        <!-- ===== Email ===== -->
        <div class="row form-group">
            <div class="col-md-6">
                <label>Email</label>
                <input type="email"
                       th:field="*{email}"
                       class="form-control"
                       placeholder="example@gmail.com">

                <span class="error-message"
                      th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}">
            </span>
            </div>

            <!-- ===== Phone ===== -->
            <div class="col-md-6">
                <label>Số điện thoại</label>
                <input type="text"
                       th:field="*{phoneNumber}"
                       class="form-control">

                <span class="error-message"
                      th:if="${#fields.hasErrors('phoneNumber')}"
                      th:errors="*{phoneNumber}">
            </span>
            </div>
        </div>


        <!-- ---------------- -->
        <div class="row form-group">
            <!-- ===== Role =====-->
            <div class="col-md-6">
                <label>Vai trò</label>
                <select th:field="*{role}" class="form-control">
                    <option value="" hidden>Select Role</option>

                    <option th:each="r : ${roles}"
                            th:value="${r}"
                            th:text="${r.displayName}">
                    </option>
                </select>

                <span class="error-message"
                      th:if="${#fields.hasErrors('role')}"
                      th:errors="*{role}">
                </span>
            </div>

            <!-- ===== Department =====-->
            <div class="col-md-6">
                <label>Phòng ban</label>
                <select th:field="*{departmentId}" class="form-control">
                    <option value="" hidden="">Select Department</option>
                    <option th:each="d : ${departments}"
                            th:value="${d.departmentId}"
                            th:text="${d.departmentName}">
                    </option>

                </select>

                <span class="error-message"
                      th:if="${#fields.hasErrors('departmentId')}"
                      th:errors="*{departmentId}">
                </span>
            </div>
        </div>

        <div class="form-group mt-3" th:if="${mode == 'Edit'}">
            <label class="d-block">Account Status</label>
            <div class="custom-control custom-radio custom-control-inline">
                <input type="radio" id="statusActive" th:field="*{status}"
                       value="ACTIVE" class="custom-control-input">
                <label class="custom-control-label" for="statusActive">Hoạt động</label>
            </div>
            <div class="custom-control custom-radio custom-control-inline">
                <input type="radio" id="statusInactive" th:field="*{status}"
                       value="INACTIVE" class="custom-control-input">
                <label class="custom-control-label" for="statusInactive">Ngừng hoạt động</label>
            </div>

            <span class="error-message d-block"
                  th:if="${#fields.hasErrors('status')}"
                  th:errors="*{status}">
            </span>
        </div>

        <div class="mt-4 d-flex justify-content-center">
            <button type="submit"
                    class="btn btn-primary px-4 mx-3"
                    th:text="${mode == 'Edit' ? 'Sửa' : 'Thêm'}">
            </button>

            <a th:href="@{/admin/home}"
               class="btn btn-outline-secondary px-4">
                Quay lại
            </a>
        </div>

    </form>
</div>

</body>
</html>
